<style>
  :root{
    --bg:#F7F5F1;
    --surface:#FFFFFF;
    --ink:#1F2A37;
    --ink-soft:#6B7280;
    --accent:#E8720C;
    --accent-soft:#FCE4CC;
    --profit:#1F7A4D;
    --profit-soft:#E4F3EA;
    --loss:#B23A2E;
    --loss-soft:#FAE6E3;
    --border:#E5E1D8;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  #shell{ max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }
  header.top{
    position:sticky; top:0; z-index:10; background:var(--bg);
    padding:16px 16px 12px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  header.top h1{ font-size:19px; margin:0; font-weight:700; letter-spacing:-0.2px; }
  header.top .sub{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  main{ flex:1; padding:14px 14px 90px 14px; overflow-y:auto; }
  .btn{
    appearance:none; border:none; border-radius:12px; padding:12px 16px;
    font-size:15px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
  }
  .btn-accent{ background:var(--accent); color:#fff; }
  .btn-accent:active{ opacity:0.85; }
  .btn-ghost{ background:var(--surface); color:var(--ink); border:1px solid var(--border); }
  .btn-danger{ background:var(--loss-soft); color:var(--loss); }
  .btn-block{ width:100%; justify-content:center; }
  .btn-sm{ padding:8px 12px; font-size:13px; border-radius:10px; }

  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:12px; }
  .shift-card{ display:flex; gap:12px; align-items:stretch; padding:0; overflow:hidden; }
  .shift-card .bar{ width:6px; flex-shrink:0; }
  .shift-card .body{ flex:1; padding:13px 14px; }
  .shift-card .row1{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .shift-card .date{ font-weight:700; font-size:15px; padding-top:2px; }
  .shift-card .tag{ font-size:11px; padding:3px 8px; border-radius:20px; background:var(--accent-soft); color:var(--accent); font-weight:600; white-space:nowrap; }
  .shift-card .driver{ font-size:13px; color:var(--ink-soft); margin-top:3px; }
  .shift-card .row1-right{ display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
  /// Only rendered when computeShiftIssues() finds at least one missing
  /// field or cash-flow anomaly on that shift — a clean shift keeps the
  /// plain single-tag layout untouched, per spec.
  .shift-issue-btn{
    appearance:none; border:none; border-radius:20px; padding:4px 10px 4px 8px;
    font-size:10.5px; font-weight:700; background:var(--loss-soft); color:var(--loss);
    white-space:nowrap; cursor:pointer; line-height:1.4;
  }
  .shift-issue-btn:active{ opacity:0.7; }
  .shift-card .profit{ font-size:17px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:8px; }
  /// Danh sách Ca Làm Việc chia 2 cột theo tài xế (mỗi cột = 1 tài xế,
  /// giữ nguyên thứ tự mới nhất → cũ nhất bên trong từng cột) để Ông Chủ
  /// so sánh song song hoạt động của 2 tài xế thay vì phải lướt 1 danh
  /// sách dài lẫn lộn. Co giãn đều khi có 1-2 cột; tự cuộn ngang nếu có
  /// từ 3 cột trở lên (trường hợp tài xế cũ đã nghỉ vẫn còn ca lịch sử).
  .shift-columns{ display:flex; gap:10px; align-items:flex-start; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
  .shift-column{ flex:1 1 0; min-width:158px; }
  .shift-column-head{ display:flex; align-items:baseline; justify-content:space-between; gap:6px; padding:2px 4px 8px 4px; border-bottom:1.5px solid var(--border); margin-bottom:10px; }
  .shift-column-head .name{ font-weight:800; font-size:14px; color:var(--ink); }
  .shift-column-head .count{ font-size:11px; color:var(--ink-soft); white-space:nowrap; }
  .shift-column-empty{ font-size:12px; color:var(--ink-soft); text-align:center; padding:18px 6px; border:1.5px dashed var(--border); border-radius:12px; }
  .shift-column .shift-card{ margin-bottom:10px; }
  .shift-column .shift-card .body{ padding:11px 10px; }
  .shift-column .shift-card .date{ font-size:13px; }
  .shift-column .shift-card .tag{ font-size:10px; padding:2px 7px; }
  .shift-column .shift-card .profit{ font-size:15px; margin-top:6px; }
  .shift-column .shift-issue-btn{ font-size:9.5px; padding:3px 8px 3px 6px; }
  .empty{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty .big{ font-size:38px; margin-bottom:10px; }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
  .field .hint{ font-size:11px; color:var(--ink-soft); margin-top:4px; }
  /// Prominent ODO-driven / fuel-consumed stat chip — replaces the old
  /// plain-text .hint under "Đồng Hồ Km" / "Nhiên Liệu" so hai số quan
  /// trọng nhất của 1 ca (Số ODO chạy, Dầu tiêu hao) nổi bật ngay khi
  /// Ông Chủ đang nhập liệu, thay vì chìm lẫn vào chữ xám nhỏ.
  .stat-highlight{ display:flex; align-items:center; gap:9px; margin-top:9px; padding:10px 12px; background:var(--accent-soft); border-radius:10px; }
  .stat-highlight .ic{ font-size:18px; line-height:1; }
  .stat-highlight .lbl{ font-size:12.5px; color:var(--ink); font-weight:600; }
  .stat-highlight .val{ font-size:15.5px; font-weight:800; color:var(--accent); margin-left:auto; white-space:nowrap; }
  input[type=text], input[type=number], input[type=date], select, textarea{
    width:100%; font-size:16px; padding:11px 12px; border-radius:10px;
    border:1px solid var(--border); background:var(--surface); color:var(--ink); font-family:inherit;
  }
  input[type=number]{ font-variant-numeric:tabular-nums; }
  .seg{ display:flex; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .seg button{ flex:1; padding:11px 0; border:none; background:var(--surface); font-size:14px; font-weight:600; color:var(--ink-soft); }
  .seg button.active{ background:var(--accent); color:#fff; }

  section.group{ margin-bottom:18px; }
  section.group h3{ font-size:13px; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); margin:0 0 10px 2px; }

  .site-row{ background:var(--bg); border:1px dashed var(--border); border-radius:12px; padding:12px; margin-bottom:10px; }
  .site-row .site-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .site-row .site-head strong{ font-size:13px; }
  .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .summary-row{ display:flex; justify-content:space-between; padding:8px 0; font-size:14px; }
  .summary-row.total{ border-top:1px solid var(--border); margin-top:6px; padding-top:12px; font-weight:800; font-size:17px; }
  .summary-row .val{ font-variant-numeric:tabular-nums; }

  nav.tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; max-width:520px; margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabbar button{
    flex:1; border:none; background:none; padding:10px 0 8px 0;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:11px; color:var(--ink-soft); font-weight:600;
  }
  nav.tabbar button .ic{ font-size:20px; }
  nav.tabbar button.active{ color:var(--accent); }

  .toast{
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:30px;
    font-size:13px; z-index:50; opacity:0; transition:opacity .25s;
    max-width:80%; text-align:center;
  }
  .toast.show{ opacity:1; }

  .banner{ background:var(--accent-soft); color:var(--accent); border-radius:12px; padding:12px 14px; font-size:13px; margin-bottom:14px; font-weight:600; }
  .swipe-del{ text-align:right; margin-top:8px; }
  .driver-row{ display:flex; justify-content:space-between; align-items:center; }

  .switch .track:before{ content:''; position:absolute; width:20px; height:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }

  .link-btn{ background:none; border:none; color:var(--accent); font-weight:700; font-size:14px; padding:6px 0; }

  .site-detail-row:active, .partner-detail-row:active, .repair-detail-row:active{ opacity:0.7; }

  .rating-badge{ display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }

  .rating-badge.ok{ background:var(--accent-soft); color:var(--accent); }
  .rating-badge.watch{ background:#FFF3CD; color:#8A6D00; }

  .driver-cv-card{ padding:14px; }

  .driver-cv-avatar{ width:42px; height:42px; border-radius:50%; background:var(--accent); color:#fff; font-weight:800; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .driver-cv-name{ font-weight:800; font-size:16px; }
  .driver-cv-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .driver-cv-item{ display:flex; flex-direction:column; gap:2px; background:var(--bg); border-radius:10px; padding:8px 10px; }
  .driver-cv-item .k{ font-size:11px; color:var(--ink-soft); }
  .driver-cv-item .v{ font-size:13px; font-weight:700; word-break:break-word; }

  .formula-block{ padding:10px 0; }
  .formula-label{ font-size:12px; color:var(--ink-soft); margin-bottom:4px; line-height:1.4; }
  .formula-value{ font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; word-break:break-word; }
  .formula-op{ text-align:center; font-size:18px; font-weight:800; color:var(--accent); padding:2px 0; }
  .formula-result .formula-value{ color:var(--accent); font-size:24px; }
  .formula-divider{ border-top:1px solid var(--border); margin:10px 0; }

  .be-formula{ display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; padding:14px 4px 8px; }
  .be-frac{ display:flex; flex-direction:column; align-items:center; min-width:148px; }
  .be-frac .fr-num, .be-frac .fr-den{ font-size:12px; color:var(--ink-soft); text-align:center; line-height:1.35; }
  .be-frac .fr-num strong, .be-frac .fr-den strong{ display:block; font-size:15.5px; color:var(--ink); font-weight:800; margin-top:3px; font-variant-numeric:tabular-nums; }
  .be-frac .fr-line{ width:100%; height:2px; background:var(--ink); margin:7px 0; border-radius:2px; }
  .be-eq-sign{ font-size:24px; font-weight:800; color:var(--accent); }
  .be-result{ display:flex; flex-direction:column; align-items:center; min-width:82px; }
  .be-result .val{ font-size:32px; font-weight:900; color:var(--accent); line-height:1; font-variant-numeric:tabular-nums; }
  .be-result .lbl{ font-size:11px; color:var(--ink-soft); margin-top:5px; text-align:center; line-height:1.35; }

  .appraisal-compare{ display:flex; gap:12px; overflow-x:auto; padding-bottom:6px; -webkit-overflow-scrolling:touch; }
  .appraisal-compare .compare-card{ flex:0 0 230px; border:1.5px solid var(--border); border-radius:14px; padding:14px; background:var(--surface); }
  .appraisal-compare .compare-card.best{ border-color:var(--profit); box-shadow:0 0 0 1.5px var(--profit) inset; }
  .appraisal-compare .compare-card h4{ margin:0 0 8px; font-size:14px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .appraisal-compare .compare-row{ display:flex; justify-content:space-between; gap:8px; font-size:12.5px; padding:3px 0; }
  .appraisal-compare .compare-row .val{ font-variant-numeric:tabular-nums; font-weight:700; white-space:nowrap; }


  /// The HOWO truck's horizontal position and wheel spin are now driven
  /// entirely from JS (see startTruckRun()) using the Web Animations API
  /// instead of a fixed-length CSS @keyframes — a real Gemini call has no
  /// known duration up front, so a static N-second animation either
  /// finishes early and sits idle, or (worse) has to loop, which looks
  /// broken. JS eases the truck up to ~97% of the track and HOLDS it
  /// there — via Animation.fill:'forwards', the WAAPI equivalent of this
  /// old `forwards` fill-mode — for as long as the real call (including
  /// any silent background retries) actually takes, then plays one short
  /// final hop to 100% the instant the response arrives. It still runs
  /// left→right exactly once and never loops back, per spec — only the
  /// timing source changed. Only static positioning/sizing rules remain
  /// here; no `animation:` property on these two classes anymore.
  .strategy-run-line{ position:relative; overflow:hidden; }
  .howo-truck-run{
    position:absolute; top:50%; left:-4px; width:55px; height:36px;
    transform:translateY(-50%); pointer-events:none; z-index:2;
  }
  .howo-truck-run img{
    display:block; width:100%; height:100%; object-fit:contain;
    filter:drop-shadow(0 1.5px 1.5px rgba(0,0,0,.35));
    /* Source photo has the cab/windshield on its LEFT and the dump bed on
       its RIGHT. The truck element moves left→right across the screen, so
       without this flip the dump bed led the motion and the cab trailed
       behind it — reading as the truck reversing. Mirroring here makes the
       cab lead in the direction of travel, i.e. driving forward. */
    transform: scaleX(-1);
  }
  .howo-wheel{
    position:absolute; border-radius:50%;
    background: repeating-conic-gradient(#20242b 0deg 20deg, #d8a83a 20deg 40deg);
  }
  /* Positions re-measured directly on the tire hubs in the source photo,
     then mirrored (left_new = 55 − left_old − width) to match the
     scaleX(-1) flip above so each spinning dot still sits exactly on its
     wheel instead of a few px off it. */
  .howo-wheel-1{ left:29.4px; top:27.2px; width:6.9px; height:6.9px; }
  .howo-wheel-2{ left:16.4px; top:26.5px; width:6.9px; height:6.9px; }
  .howo-wheel-3{ left:5.9px; top:26.7px; width:7.4px; height:7.4px; }

  #loginScreen{
    display:none; position:fixed; inset:0; z-index:100; background:var(--bg);

  .search-bar{ display:flex; gap:8px; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:8px 10px; margin-bottom:6px; cursor:pointer; }

  table.dash{ width:100%; border-collapse:collapse; font-size:13px; }
  table.dash th, table.dash td{ padding:9px 6px; text-align:right; border-bottom:1px solid var(--border); font-variant-numeric:tabular-nums; }
  table.dash th:first-child, table.dash td:first-child{ text-align:left; font-weight:600; color:var(--ink-soft); font-variant-numeric:normal; }
  table.dash thead th{ color:var(--ink-soft); font-size:11px; text-transform:uppercase; letter-spacing:.02em; border-bottom:2px solid var(--border); }
  table.dash tbody tr:last-child td{ border-bottom:none; }
  .dash-wrap{ overflow-x:auto; }
  .dash-highlight td{ font-weight:800; color:var(--ink); }

  .modal-backdrop{
    position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.45);

  }
  .modal-sheet{
    background:var(--bg); width:100%; max-width:520px; max-height:88vh; overflow-y:auto;

  }

  .modal-close-row{ display:flex; justify-content:flex-end; margin-bottom:6px; }

  .modal-step .st-body{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; }
  .modal-step .st-formula{ font-family:ui-monospace,Menlo,monospace; font-size:12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px 10px; margin-top:6px; word-break:break-word; }

  .resp-badge{ display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-left:6px; vertical-align:middle; }
  .resp-badge.driver_full{ background:var(--loss-soft); color:var(--loss); }
  .resp-badge.split{ background:#FFF3CD; color:#8A6D00; }
  .resp-badge.owner_full{ background:var(--accent-soft); color:var(--accent); }
</style>

///    through every retry, with no restart/jump/loop, satisfying "giữ
///    trạng thái mượt mà" through the retry loop.
///  - "arrival": on finish(), the approach is snapped to its 97% end
///    state and one short 260ms hop covers the last stretch to 100%, so
///    the truck visibly finishes AT THE MOMENT the real data comes back,
///    never before and never with a lingering gap after.
/// The 3 wheels spin on their own infinite loop the whole time, entirely
/// decoupled from how long the approach/arrival phases take.
/// Returns null (no-op finish()) if the truck element isn't in the DOM,
/// so callers never need to null-check before use.
function startTruckRun(container){
  const truckEl = container ? container.querySelector('.howo-truck-run') : null;
  if(!truckEl) return { finish: ()=>Promise.resolve() };

  container.querySelectorAll('.howo-wheel').forEach(wheelEl=>{
    wheelEl.animate(
      [{ transform:'rotate(0deg)' }, { transform:'rotate(360deg)' }],
      { duration:550, iterations:Infinity, easing:'linear' }
    );
  });

  const approach = truckEl.animate(
    [
      { left:'-4px',              offset:0    },
      { left:'calc(55% - 20px)',  offset:0.35 },
      { left:'calc(80% - 25px)',  offset:0.7  },
      { left:'calc(97% - 30px)',  offset:1    }
    ],
    { duration:45000, easing:'cubic-bezier(0,.6,.25,1)', fill:'forwards' }
  );

  return {
    finish(){
      approach.finish();
      const arrival = truckEl.animate(
        [{ left:'calc(97% - 30px)' }, { left:'calc(100% - 58px)' }],
        { duration:260, easing:'ease-in', fill:'forwards' }
      );
      return arrival.finished.catch(()=>{});
    }
  };
}

/// Returns TODAY as "YYYY-MM-DD" using the PHONE'S LOCAL date/time zone.
/// `new Date().toISOString()` is UTC-based and silently rolls back to the
/// previous day during Vietnam's early-morning hours (UTC+7) — this is
/// the correct replacement everywhere the app needs "today's date".
function todayLocalDateStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// ========================= DOCUMENTS & MAINTENANCE WARNINGS =========================
// Deterministic (no AI, no guessing) tracking of hard deadlines: vehicle
// paperwork (đăng kiểm, bảo hiểm, phù hiệu vận tải) and driver paperwork
// (GPLX, khám sức khỏe), PLUS distance-based maintenance intervals (thay
// dầu, đảo lốp...). All warnings surface as an in-app banner on the very
// first tab the person sees every time they open the app — since a plain
// web app cannot reliably send push notifications while closed (iOS
// Safari's web-push support is inconsistent even when installed to the
// home screen), "nhắc mỗi tuần" is honestly implemented as: the warning
// re-appears EVERY time the app is opened for as long as the deadline is
// within 30 days, which for someone logging shifts daily easily satisfies
// "at least once a week" — just without a true background notification.

const DOCUMENT_TYPE_OPTIONS = {
  vehicle: ['Đăng Kiểm', 'Bảo Hiểm', 'Phù Hiệu Vận Tải', 'Khác (Xe)'],
  driver: ['GPLX', 'Khám Sức Khoẻ Lái Xe', 'Khác (Tài Xế)']
};

function daysUntilLocal(dateStr){
  const today = new Date(todayLocalDateStr()+'T00:00:00');
  const target = new Date(dateStr+'T00:00:00');
  return Math.round((target-today)/86400000);
}

function urgencyFromDays(daysLeft, warnThreshold, urgentThreshold){
  if(daysLeft < 0) return { label:'ĐÃ HẾT HẠN', className:'risk' };
  if(daysLeft <= urgentThreshold) return { label:`Còn ${daysLeft} ngày — GẤP`, className:'risk' };
  if(daysLeft <= warnThreshold) return { label:`Còn ${daysLeft} ngày`, className:'warn' };
  return { label:`Còn ${daysLeft} ngày`, className:'good' };
}

/// Every document within 30 days of expiry (or already expired), soonest first.
function computeDocumentWarnings(){
  return state.documents
    .map(doc=>{
      const daysLeft = daysUntilLocal(doc.expiryDate);
      return { ...doc, daysLeft, urgency: urgencyFromDays(daysLeft, 30, 7),
        driverName: doc.scope==='driver' ? (driverById(doc.driverId)?.name || '(tài xế đã xoá)') : null };
    })
    .filter(d=>d.daysLeft<=30)
    .sort((a,b)=>a.daysLeft-b.daysLeft);
}

/// Latest known odometer reading across every logged shift — the "current
/// km" used to compute how far each maintenance item still has to go.
function currentOdometer(){
  if(state.shifts.length===0) return 0;
  const sorted = [...state.shifts].sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));
  return sorted[0].odoEnd || 0;
}

function computeMaintenanceStatus(schedule){
  const current = currentOdometer();
  const nextDueOdo = (Number(schedule.lastDoneOdo)||0) + (Number(schedule.intervalKm)||0);
  const kmRemaining = Math.round(nextDueOdo - current);
  let urgency;
  if(kmRemaining<=0) urgency = { label:'ĐÃ QUÁ HẠN', className:'risk' };
  else if(kmRemaining<=300) urgency = { label:`Còn ${kmRemaining} km — GẤP`, className:'risk' };
  else if(kmRemaining<=1000) urgency = { label:`Còn ${kmRemaining} km`, className:'warn' };
  else urgency = { label:`Còn ${kmRemaining} km`, className:'good' };
  return { ...schedule, currentOdo: current, nextDueOdo, kmRemaining, urgency };
}

/// Every maintenance item within 1000km of being due (or already overdue),
/// most urgent first.
function computeMaintenanceWarnings(){
  return state.maintenanceSchedules
    .map(computeMaintenanceStatus)
    .filter(m=>m.kmRemaining<=1000)
    .sort((a,b)=>a.kmRemaining-b.kmRemaining);
}

function computeAllWarnings(){
  const docs = computeDocumentWarnings();
  const maint = computeMaintenanceWarnings();
  return { docs, maint, total: docs.length + maint.length };
}

// ========================= PER-SHIFT ACTION-NEEDED VALIDATION =========================
// Separate from computeAllWarnings() above (vehicle paperwork / maintenance
// deadlines): this scans ONE shift's own fields for missing required data
// or cash-flow numbers that don't add up, so the Shift List can surface a
// [Cảnh Báo Hành Động] button on exactly the ca that need fixing — and stay
// silent on every ca that's already clean, per spec. Never rendered in the
// Kết Quả Kinh Doanh tab; that tab has its own, purely-financial warning
// engine (computeFinancialWarnings, further below).

/// Returns an array of short Vietnamese issue descriptions for one shift.
/// Empty array = the shift is complete and internally consistent.
function computeShiftIssues(sh){
  // Gate: the scan only ever runs on an actually-operational ca (status
  // 'active' = "Hoạt Động"). Every idle/off status (Nghỉ Mưa, Nghỉ Phép,
  // Bảo Trì / Sửa Chữa, Nằm Bãi) has no odo/fuel/trip data to validate in
  // the first place, so it's skipped outright — keeps the Shift List free
  // of false-positive [Cảnh Báo Hành Động] buttons on ca that were never
  // meant to have those numbers filled in.
  if(sh.status !== 'active') return [];

  const issues = [];

  if(!driverById(sh.driverId)) issues.push('Chưa chọn tài xế (hoặc tài xế đã bị xoá)');

  if(!(Number(sh.odoEnd) > 0)){
    issues.push('Chưa nhập ODO cuối ca');
  } else if(Number(sh.odoEnd) < Number(sh.odoStart)){
    issues.push('ODO cuối nhỏ hơn ODO đầu — kiểm tra lại số công tơ mét');
  }

  if(!(Number(sh.fuelEnd) > 0)){
    issues.push('Chưa nhập lượng dầu cuối ca');
  } else {
    const consumed = (Number(sh.fuelStart)||0) + (Number(sh.fuelAdded)||0) - Number(sh.fuelEnd);
    if(consumed < 0) issues.push('Dầu cuối ca lớn hơn dầu đầu ca cộng dầu đổ thêm — số liệu dầu bị sai');
  }
  if(Number(sh.fuelAdded) > 0 && !(Number(sh.fuelUnitPrice) > 0)){
    issues.push('Có đổ dầu nhưng chưa nhập đơn giá dầu');
  }

  // Note: a ca with NO công trình/chuyến at all (xe chạy ra rồi phải quay
  // đầu về vì mưa gió, sự cố...) is intentionally NOT flagged here — chỉ
  // ODO / nhiên liệu / tài xế mới là các trường bắt buộc phải có. Nếu Ông
  // Chủ đã nhập công trình thì các trường con bên trong công trình đó vẫn
  // được kiểm tra như cũ.
  const siteLogs = sh.siteLogs || [];
  siteLogs.forEach((s,idx)=>{
    const label = s.siteName ? `"${s.siteName}"` : `Công trình #${idx+1}`;
    if(!s.siteName) issues.push(`Công trình #${idx+1} chưa nhập tên công trình`);
    if(!(Number(s.trips) > 0)) issues.push(`${label}: chưa nhập số chuyến`);
    if(!(Number(s.volumePerTrip) > 0)) issues.push(`${label}: chưa nhập khối lượng/chuyến`);
    if(!(Number(s.materialUnitPrice) > 0)) issues.push(`${label}: chưa nhập đơn giá vật liệu`);
  });

  if(Number(sh.incidentalCost) < 0) issues.push('Chi phí phát sinh đang âm — kiểm tra lại số liệu');
  if(Number(sh.advanceAmount) < 0) issues.push('Số tiền tạm ứng/phạt đang âm — kiểm tra lại số liệu');

  return issues;
}
function shiftHasIssues(sh){ return computeShiftIssues(sh).length > 0; }

// ========================= EXCLUDE INCOMPLETE "REALTIME" CA FROM AGGREGATES =========================
// A ca vừa mới chạy xong thường chưa kịp nhập ODO cuối ca / dầu cuối ca —
// nhưng shiftFuelConsumed()/shiftOdoDriven() vẫn âm thầm trả về số liệu
// (thường là SAI, ví dụ dầu tiêu hao bị tính vống lên vì fuelEnd=0) nếu cứ
// cộng thẳng vào "bài toán vận hành chung". Quy tắc: chỉ xét 2 ca có
// chronoKey mới nhất trên toàn bộ sổ ca — nếu ca đó vẫn còn thiếu dữ liệu
// bắt buộc (computeShiftIssues) thì tạm loại nó khỏi MỌI phép tính tổng
// hợp (Kết Quả Kinh Doanh, Điểm Hoà Vốn, số lít dầu TB dùng cho Thẩm Định
// Công Trình...), y hệt như một ca "Nghỉ" — không cộng, không trừ. Ca vẫn
// hiện đầy đủ trên tab Ca Làm Việc kèm nút [⚠️ Cảnh Báo Hành Động]; ngay
// khi Ông Chủ điền xong, computeShiftIssues() trả về rỗng và ca đó tự
// động rơi lại vào phép tính chung như bất kỳ ca nào khác — không cần
// thao tác "khôi phục" riêng.
function getExcludedRecentShiftIds(){
  const sorted = [...state.shifts].sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));
  const excluded = new Set();
  sorted.slice(0,2).forEach(sh=>{ if(computeShiftIssues(sh).length>0) excluded.add(sh.id); });
  return excluded;
}
/// Full shift list minus the currently-excluded newest-but-incomplete ca
/// above. Every fleet-wide historical average (tiêu hao dầu, lương
/// chuyến, tiền ăn...) should read from THIS, never straight from
/// state.shifts, so a half-filled ca can't quietly skew the numbers used
/// to judge công trình mới hay kỳ kinh doanh hiện tại.
function operationalShifts(){
  const excluded = getExcludedRecentShiftIds();
  return excluded.size===0 ? state.shifts : state.shifts.filter(sh=>!excluded.has(sh.id));
}

async function handleRestoreFile(file){
  if(!file) return;
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(!backup || !Array.isArray(backup.drivers) || !Array.isArray(backup.shifts)){
      showToast('File này không đúng định dạng sao lưu.');
      return;
    }
    const confirmMsg = `File sao lưu này có ${backup.drivers.length} tài xế và ${backup.shifts.length} ca, xuất lúc ${new Date(backup.exportedAt).toLocaleString('vi-VN')}.\n\nPhục hồi sẽ THAY THẾ toàn bộ dữ liệu hiện tại trên máy này. Chắc chắn muốn tiếp tục?`;
    if(!confirm(confirmMsg)) return;
    state.drivers = backup.drivers;
    state.shifts = backup.shifts;
    state.repairs = Array.isArray(backup.repairs) ? backup.repairs : [];
    state.sitePayments = Array.isArray(backup.sitePayments) ? backup.sitePayments : [];
    state.documents = Array.isArray(backup.documents) ? backup.documents : [];
    state.maintenanceSchedules = Array.isArray(backup.maintenanceSchedules) ? backup.maintenanceSchedules : [];
    state.siteContracts = Array.isArray(backup.siteContracts) ? backup.siteContracts : [];
    if(backup.settings) state.settings = Object.assign(state.settings, backup.settings);
    await saveDrivers(); await saveShifts(); await saveRepairs(); await saveSitePayments();
    await saveDocuments(); await saveMaintenanceSchedules(); await saveSiteContracts(); await saveSettings();
    renderAll();
    showToast('Đã phục hồi dữ liệu thành công.');
  }catch(e){
    showToast('Không đọc được file này. Kiểm tra lại đúng file sao lưu chưa.');
  }
}

// ========================= FORMAT & COMPUTE =========================

function fmtVND(n){
  n = Number(n)||0;
  return Math.round(n).toLocaleString('vi-VN') + 'đ';
}
function toIntSafe(v){ return Math.round(Number(v)||0); }
/// Attaches live "1.540.000"-style thousands-separator formatting to a
/// text input representing a money amount. Digits typed are parsed as an
/// integer VND amount; the field always displays the grouped form.
function attachMoneyInput(el, initialValue, onChange){
  if(!el) return;
  el.value = initialValue ? toIntSafe(initialValue).toLocaleString('vi-VN') : '';
  if(!el.placeholder) el.placeholder = '0';
  el.addEventListener('input', ()=>{
    const digits = el.value.replace(/[^\d]/g,'');
    const num = digits==='' ? 0 : parseInt(digits,10);
    el.value = digits==='' ? '' : num.toLocaleString('vi-VN');
    onChange(num);
  });
}
/// For plain (non-money) numeric inputs: shows blank instead of a literal
/// "0" so the person can type straight away without deleting a placeholder
/// zero first. Use in template `value="${blankIfZero(x)}"` together with
/// `placeholder="0"` on the input tag.
function blankIfZero(v){
  const n = Number(v);
  return (!n || n===0) ? '' : v;
}
function statusLabel(key){ return (STATUS_OPTIONS.find(s=>s.key===key)||{}).label || key; }
/// Màu nền riêng cho từng trạng thái ca trong Danh Sách Ca, chữ trắng trên
/// nền màu — tông trầm/hài hoà (không sặc sỡ) nhưng đủ tương phản để chữ
/// trắng luôn dễ đọc và mỗi trạng thái dễ nhận diện ngay từ xa:
///  - Hoạt Động: xanh lá (trùng tông --profit đã dùng cho lãi trong app)
///  - Nghỉ Phép: đỏ (trùng tông --loss đã dùng cho lỗ trong app)
///  - Nghỉ Mưa: xám trung tính
///  - Bảo Trì / Sửa Chữa & Nằm Bãi: vàng đậm (mustard) — đủ tối để chữ
///    trắng vẫn tương phản tốt, tránh vàng chanh chói mắt kém đọc được.
function statusColorStyle(key){
  const map = {
    active:      '#2F8F5B',
    onLeave:     '#B23A2E',
    weatherOff:  '#6B7280',
    maintenance: '#B8860B',
    idle:        '#B8860B'
  };
  const bg = map[key] || '#6B7280';
  return `background:${bg}; color:#FFFFFF;`;
}
function shiftTypeLabel(key){ return (SHIFT_TYPES.find(s=>s.key===key)||{}).label || key; }

function driverById(id){ return state.drivers.find(d=>d.id===id); }

function daysInMonth(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}
function dailyBaseSalary(driver){
  const days = state.settings.standardWorkDaysPerMonth || 1;
  return (driver.monthlyBaseSalary||0) / days;
}
function dailyHousing(driver, dateStr){
  const dim = daysInMonth(dateStr) || 30;
  return (driver.monthlyHousingBudget||0) / dim;
}

function siteRevenue(s){ return (Number(s.volumePerTrip)||0) * (Number(s.materialUnitPrice)||0) * (Number(s.trips)||0); }
function siteEffectiveWageTrips(s){
  return (s.wageQualifyingTripsOverride===null || s.wageQualifyingTripsOverride===undefined)
    ? (Number(s.trips)||0) : (Number(s.wageQualifyingTripsOverride)||0);
}
function siteWageTotal(s){ return siteEffectiveWageTrips(s) * (Number(s.driverWagePerTrip)||0); }

function shiftOdoDriven(sh){ return Math.max(0, (Number(sh.odoEnd)||0) - (Number(sh.odoStart)||0)); }
function shiftFuelConsumed(sh){ return Math.max(0, ((Number(sh.fuelStart)||0)+(Number(sh.fuelAdded)||0)) - (Number(sh.fuelEnd)||0)); }
function shiftFuelCost(sh){ return shiftFuelConsumed(sh) * (Number(sh.fuelUnitPrice)||0); }
function shiftTotalRevenue(sh){ return (sh.siteLogs||[]).reduce((sum,s)=>sum+siteRevenue(s),0); }
function shiftTotalTripWage(sh){ return (sh.siteLogs||[]).reduce((sum,s)=>sum+siteWageTotal(s),0); }
/// Tiền tip/thưởng THỰC TẾ của riêng ca này (Ông Chủ nhập tay theo đúng
/// cung đường đã chạy trong ca — mỗi cung đường tip khác nhau nên KHÔNG
/// thể suy ra từ mức tip/chuyến bình quân ở hồ sơ tài xế). Giá trị
/// `driver.tipPerTrip` ở hồ sơ tài xế chỉ mang tính THAM KHẢO hiển thị,
/// không dùng để tính toán ở đây hay bất kỳ đâu khác trong chi phí thật.
function shiftTipCost(sh){ return Number(sh.actualTip)||0; }
function shiftTotalCost(sh){
  return shiftFuelCost(sh) + shiftTotalTripWage(sh) + (Number(sh.baseSalaryAllocation)||0)
       + (Number(sh.foodAllowance)||0) + (Number(sh.housingAllocation)||0) + (Number(sh.incidentalCost)||0)
       + shiftTipCost(sh);
}
function shiftNetProfit(sh){ return shiftTotalRevenue(sh) - shiftTotalCost(sh); }

// ---- Repair/depreciation responsibility (who pays for a breakage) ----
const REPAIR_RESPONSIBILITY_OPTIONS = [
  { key:'owner_full', label:'Chủ xe chịu 100% (hao mòn/lỗi kỹ thuật thông thường)' },
  { key:'driver_full', label:'Do tài xế làm hỏng — Tài xế chịu 100%' },
  { key:'custom', label:'Tùy chọn — Nhập tay số tiền tài xế phải chịu' }
];
function repairResponsibilityLabel(key){
  return (REPAIR_RESPONSIBILITY_OPTIONS.find(o=>o.key===key)||REPAIR_RESPONSIBILITY_OPTIONS[0]).label;
}
/// Portion of a repair's cost that gets deducted from the RESPONSIBLE
/// driver's pay:
///  - owner_full (default): 0 — chủ xe chịu toàn bộ.
///  - driver_full: toàn bộ số tiền hoá đơn.
///  - custom: số tiền chủ xe tự nhập tay (driverCustomAmount), không được
///    vượt quá số tiền hoá đơn — phần còn lại ngầm hiểu là chủ xe/bên thứ
///    ba chịu, không tạo tiền lệ khoá cứng 50/50.
function repairDriverResponsibleAmount(r){
  const amt = Number(r.amount)||0;
  const resp = r.responsibility || 'owner_full';
  if(resp==='driver_full') return amt;
  if(resp==='custom') return Math.max(0, Math.min(amt, Number(r.driverCustomAmount)||0));
  return 0;
}
/// All-time total deducted from ONE driver across every repair record
/// where they were marked responsible — surfaced on their CV card as a
/// running "hồ sơ lỗi" figure.
function driverResponsibleRepairTotal(driverId){
  return state.repairs
    .filter(r=>r.responsibleDriverId===driverId && (r.responsibility==='driver_full' || r.responsibility==='custom'))
    .reduce((s,r)=>s+repairDriverResponsibleAmount(r),0);
}
/// Same total but scoped to [from, to] — used when building the payroll
/// export sheet for a specific period, so the deduction only reflects
/// breakages actually dated within that payroll period.
function driverResponsibleRepairTotalInRange(driverId, from, to){
  return state.repairs
    .filter(r=>r.responsibleDriverId===driverId && r.date>=from && r.date<=to && (r.responsibility==='driver_full' || r.responsibility==='custom'))
    .reduce((s,r)=>s+repairDriverResponsibleAmount(r),0);
}

function chronoKey(dateStr, shiftType){
  const days = Math.floor(new Date(dateStr+'T00:00:00').getTime()/86400000);
  return days*2 + (shiftType==='night' ? 1 : 0);
}
function findPreviousShift(dateStr, shiftType, excludeId){
  const targetKey = chronoKey(dateStr, shiftType);
  let best=null, bestKey=-Infinity;
  for(const s of state.shifts){
    if(s.id===excludeId) continue;
    const k = chronoKey(s.date, s.shiftType);
    if(k<targetKey && k>bestKey){ best=s; bestKey=k; }
  }
  return best;
}

function allSiteNames(){
  const seen=new Set(), out=[];
  const sorted=[...state.shifts].sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));
  for(const sh of sorted){
    for(const s of (sh.siteLogs||[])){
      const n=(s.siteName||'').trim();
      if(n && !seen.has(n)){ seen.add(n); out.push(n); }
    }
  }
  return out;
}

// ========================= SHIFT LIST =========================
/// Gộp một danh sách ca (đã lọc + sắp xếp sẵn) thành các CỘT theo tài
/// xế — mỗi cột đại diện đúng 1 tài xế, tiêu đề cột là tên tài xế đó,
/// bên trong giữ nguyên thứ tự ca đã truyền vào (mới nhất trước, y hệt
/// danh sách gộp cũ) để Ông Chủ nhìn thấy rõ song song hoạt động của
/// từng người. Cột được "mồi" sẵn theo đúng thứ tự hồ sơ Tài Xế hiện có
/// (kể cả khi tài xế đó chưa có ca nào trong khoảng đang lọc, để cột
/// không bị nhảy vị trí khi đổi ngày tìm kiếm); ca của tài xế đã bị xoá
/// khỏi hồ sơ vẫn được gom vào 1 cột riêng theo tên đã lưu lúc ghi ca
/// (driverNameSnapshot), xếp sau cùng, để không mất dữ liệu lịch sử.
function groupShiftsIntoDriverColumns(list){
  const columns = [];
  const indexByKey = new Map();
  function ensureColumn(key, name){
    if(!indexByKey.has(key)){
      indexByKey.set(key, columns.length);
      columns.push({ key, name, shifts: [] });
    }
    return columns[indexByKey.get(key)];
  }
  state.drivers.forEach(d=>ensureColumn(d.id, d.name||'(chưa đặt tên)'));
  list.forEach(sh=>{
    const d = driverById(sh.driverId);
    const key = d ? d.id : ('_orphan_'+(sh.driverNameSnapshot||'chưa chọn tài xế'));
    const name = d ? d.name : (sh.driverNameSnapshot || '(chưa chọn tài xế)');
    ensureColumn(key, name).shifts.push(sh);
  });
  // Chỉ giữ cột của tài xế hiện có (kể cả 0 ca, để layout ổn định) hoặc
  // cột "tài xế cũ" có ít nhất 1 ca thật — không hiện cột rỗng vô ích.
  return columns.filter(c=>c.shifts.length>0 || state.drivers.some(d=>d.id===c.key));
}
/// Card 1 ca dùng chung cho cả layout cột — bỏ dòng "Tài xế: ..." so với
/// bản gộp cũ vì tên tài xế giờ đã là tiêu đề cột, tránh lặp lại 2 lần.
function renderShiftCard(sh){
  const profit=shiftNetProfit(sh);
  const positive = profit>=0;
  const issues = computeShiftIssues(sh);
  return `
    <div class="card shift-card" data-id="${sh.id}" onclick="openShift('${sh.id}')">
      <div class="bar" style="background:${positive?'var(--profit)':'var(--loss)'}"></div>
      <div class="body">
        <div class="row1">
          <span class="date">${formatDateVN(sh.date)} · ${shiftTypeLabel(sh.shiftType)}</span>
          <div class="row1-right">
            <span class="tag" style="${statusColorStyle(sh.status)}">${statusLabel(sh.status)}</span>
            ${issues.length>0 ? `<button class="shift-issue-btn" data-id="${sh.id}" data-issues="${escapeHtml(issues.join(' | '))}">⚠️ Cảnh Báo Hành Động</button>` : ''}
          </div>
        </div>
        <div class="profit" style="color:${positive?'var(--profit)':'var(--loss)'}">${positive?'+':''}${fmtVND(profit)}</div>
      </div>
    </div>`;
}
function renderShiftList(){
  const app=document.getElementById('app');

  const warnings = computeAllWarnings();
  const warningsBannerHtml = warnings.total===0 ? '' : `
    <div class="card" style="border:1.5px solid var(--loss); margin-bottom:14px;">
      <div style="font-weight:800; color:var(--loss); margin-bottom:8px;">⚠️ ${warnings.total} Việc Cần Chú Ý</div>
      ${warnings.docs.map(d=>`
        <div class="kv" style="padding:4px 0;">
          <span>${escapeHtml(d.type)}${d.driverName?' — '+escapeHtml(d.driverName):' (xe)'}</span>
          <span class="rating-badge ${d.urgency.className}">${d.urgency.label}</span>
        </div>`).join('')}
      ${warnings.maint.map(m=>`
        <div class="kv" style="padding:4px 0;">
          <span>🔧 ${escapeHtml(m.name)}</span>
          <span class="rating-badge ${m.urgency.className}">${m.urgency.label}</span>
        </div>`).join('')}
      <button class="link-btn" id="warningsGoToSettingsBtn" style="margin-top:6px;">Quản lý giấy tờ / bảo dưỡng →</button>
    </div>`;

  // Search bar is deliberately date-picker-only (no free-text/realtime
  // filter-as-you-type) — tapping ANYWHERE on the bar opens the native
  // lịch (calendar) so Ông Chủ chọn đúng 1 ngày muốn xem lại. Để trống
  // vẫn hiển thị toàn bộ ca theo thứ tự mới nhất như bình thường.
  const searchBarHtml = `
    <div class="search-bar" id="shiftSearchBar">
      <span class="ic">🔍</span>
      <input type="date" id="searchDateInput" value="${state.searchDate||''}">
      ${state.searchDate ? '<button id="clearSearchBtn">Xoá</button>' : ''}
    </div>
    <div class="search-bar-hint">${state.searchDate ? `Đang lọc đúng ngày ${formatDateVN(state.searchDate)}.` : 'Bấm để mở lịch chọn 1 ngày cụ thể — để trống sẽ xem tất cả ca, mới nhất trước.'}</div>`;

  if(state.shifts.length===0){
    app.innerHTML = warningsBannerHtml + searchBarHtml + `
      <div class="banner">Bước đầu tiên: bấm "+ Tài Xế" ở tab Tài Xế để thêm người lái, rồi quay lại đây bấm "+ Ca Mới".</div>
      <div class="empty"><div class="big">🚛</div>Chưa có ca nào được ghi.<br>Bấm "+ Ca Mới" ở góc trên để bắt đầu.</div>`;
    bindSearchBar();
    bindWarningsBanner();
    return;
  }

  let list = [...state.shifts];
  if(state.searchDate){ list = list.filter(sh=>sh.date===state.searchDate); }
  list.sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));

  const driverColumns = groupShiftsIntoDriverColumns(list);

  const cardsHtml = list.length===0
    ? `<div class="empty"><div class="big">📅</div>Không có ca nào vào ngày ${state.searchDate?formatDateVN(state.searchDate):''}.</div>`
    : `<div class="shift-columns">
        ${driverColumns.map(col=>`
          <div class="shift-column">
            <div class="shift-column-head"><span class="name">${escapeHtml(col.name)}</span><span class="count">${col.shifts.length} ca</span></div>
            ${col.shifts.length===0
              ? `<div class="shift-column-empty">Chưa có ca nào${state.searchDate?' vào ngày này':''}.</div>`
              : col.shifts.map(renderShiftCard).join('')}
          </div>`).join('')}
      </div>`;

  app.innerHTML = warningsBannerHtml + searchBarHtml + cardsHtml;
  bindSearchBar();
  bindWarningsBanner();
  bindShiftIssueButtons();
}
/// Tapping the badge jumps straight into the shift (same destination as
/// tapping the card) but first toasts the single most relevant issue —
/// stopPropagation keeps the card's own onclick from also double-firing.
function bindShiftIssueButtons(){
  document.querySelectorAll('.shift-issue-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      const issuesList = (btn.dataset.issues||'').split(' | ').filter(Boolean);
      if(issuesList.length>0){
        showToast(issuesList[0] + (issuesList.length>1 ? ` (+${issuesList.length-1} việc khác)` : ''));
      }
      openShift(btn.dataset.id);
    });
  });
}
function bindSearchBar(){
  const bar = document.getElementById('shiftSearchBar');
  const input = document.getElementById('searchDateInput');
  if(input) input.addEventListener('change', e=>{ state.searchDate = e.target.value || null; renderShiftList(); });
  // Tapping anywhere on the bar (icon, padding, empty space) opens the
  // calendar — not just the few pixels of the native input itself — so
  // it reliably behaves like "bấm vào là ra lịch" on iOS Safari.
  if(bar) bar.addEventListener('click', (e)=>{
    if(e.target.tagName==='BUTTON') return; // đừng chặn nút "Xoá"
    if(!input) return;
    if(typeof input.showPicker === 'function'){ try{ input.showPicker(); return; }catch(_ignored){} }
    input.focus();
  });
  const clearBtn = document.getElementById('clearSearchBtn');
  if(clearBtn) clearBtn.addEventListener('click', (e)=>{ e.stopPropagation(); state.searchDate=null; renderShiftList(); });
}
function bindWarningsBanner(){
  const btn = document.getElementById('warningsGoToSettingsBtn');
  if(btn) btn.addEventListener('click', ()=>{ state.currentTab='settings'; renderAll(); });
}
function formatDateVN(dateStr){
  const [y,m,d]=dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openShift(id){
  const sh = state.shifts.find(s=>s.id===id);
  if(!sh) return;
  state.draftShift = JSON.parse(JSON.stringify(sh));
  state.draftShift.isNew=false;
  state.view='form';
  renderAll();
}

function startNewShift(){
  if(state.drivers.length===0){
    showToast('Hãy thêm tài xế trước ở tab "Tài Xế".');
    return;
  }
  const today=new Date();
  const dateStr=todayLocalDateStr();
  const shiftType='day';
  const prev = findPreviousShift(dateStr, shiftType, null);
  const driver = state.drivers[0];
  const policy = state.settings.costPolicies.active;
  const draft = {
    id: uid('shift'),
    isNew: true,
    date: dateStr,
    shiftType,
    driverId: driver.id,
    driverNameSnapshot: driver.name,
    status: 'active',
    odoStart: prev ? prev.odoEnd : 0,
    odoEnd: 0,
    fuelStart: prev ? prev.fuelEnd : 0,
    fuelEnd: 0,
    fuelAdded: 0,
    fuelUnitPrice: 0,
    baseSalaryAllocation: policy.baseSalary ? dailyBaseSalary(driver) : 0,
    foodAllowance: policy.food ? driver.dailyFoodAllowance : 0,
    housingAllocation: policy.housing ? dailyHousing(driver, dateStr) : 0,
    actualTip: 0,
    incidentalCost: 0,
    incidentalNotes: '',
    advanceAmount: 0,
    advanceRecipientName: '',
    notes: '',
    siteLogs: []
  };
  state.draftShift = draft;
  state.view='form';
  renderAll();
}

function reapplyCostPolicyToDraft(){
  const sh = state.draftShift;
  const driver = driverById(sh.driverId);
  const policy = state.settings.costPolicies[sh.status] || {baseSalary:false,food:false,housing:false,operations:true};
  if(!driver){ sh.baseSalaryAllocation=0; sh.foodAllowance=0; sh.housingAllocation=0; return; }
  sh.baseSalaryAllocation = policy.baseSalary ? dailyBaseSalary(driver) : 0;
  sh.foodAllowance = policy.food ? driver.dailyFoodAllowance : 0;
  sh.housingAllocation = policy.housing ? dailyHousing(driver, sh.date) : 0;
}

/// Khi Ông Chủ sửa Lương cứng/tháng, Tiền ăn/ngày hoặc Tiền nhà/tháng của
/// MỘT tài xế ở màn hình Sửa Tài Xế, tính lại 3 khoản phân bổ tương ứng
/// (baseSalaryAllocation, foodAllowance, housingAllocation) cho TOÀN BỘ
/// ca ĐÃ LƯU của đúng tài xế đó — mọi thời điểm, quá khứ lẫn hiện tại —
/// theo số tiền MỚI vừa sửa. Dùng lại đúng công thức gốc đã có sẵn
/// (dailyBaseSalary, dailyHousing) và đúng chính sách chi phí theo trạng
/// thái ca (costPolicies[sh.status]) — y hệt logic reapplyCostPolicyToDraft()
/// đang dùng cho ca mới — nên KHÔNG đụng vào bất kỳ hàm tính toán gốc nào.
/// Các ca của tài xế KHÁC không bị ảnh hưởng.
function recalcDriverShiftAllocations(driverId){
  const driver = driverById(driverId);
  if(!driver) return;
  state.shifts.forEach(sh=>{
    if(sh.driverId!==driverId) return;
    const policy = state.settings.costPolicies[sh.status] || {baseSalary:false,food:false,housing:false,operations:true};
    sh.baseSalaryAllocation = policy.baseSalary ? dailyBaseSalary(driver) : 0;
    sh.foodAllowance = policy.food ? driver.dailyFoodAllowance : 0;
    sh.housingAllocation = policy.housing ? dailyHousing(driver, sh.date) : 0;
  });
}

/// Recomputes Odo Start / Fuel Start inheritance from the chronologically
/// previous shift, based on the CURRENT date + shift type selected in the
/// form. Only applies to a brand-new (never-saved) shift — re-opening an
/// EXISTING saved shift to edit must never silently overwrite its already
/// recorded odo/fuel history, even if the person changes the date field.
function reapplyOdoFuelInheritance(){
  const sh = state.draftShift;
  if(!sh.isNew) return;
  const prev = findPreviousShift(sh.date, sh.shiftType, sh.id);
  const inheritedOdo = prev ? prev.odoEnd : 0;
  const inheritedFuel = prev ? prev.fuelEnd : 0;
  sh.odoStart = inheritedOdo;
  sh.odoEnd = 0;
  sh.fuelStart = inheritedFuel;
}

/// Refreshes the on-screen Odo/Fuel Start/End inputs to match the current
/// draft shift values (used right after reapplyOdoFuelInheritance()).
function refreshOdoFuelInputs(){
  const sh = state.draftShift;
  const os=document.getElementById('f_odoStart'), oe=document.getElementById('f_odoEnd'), fs=document.getElementById('f_fuelStart');
  if(os) os.value = blankIfZero(sh.odoStart);
  if(oe) oe.value = blankIfZero(sh.odoEnd);
  if(fs) fs.value = blankIfZero(sh.fuelStart);
}

function bindFormEvents(){
  const sh = state.draftShift;

  document.getElementById('f_date').addEventListener('change', e=>{
    sh.date=e.target.value;
    reapplyCostPolicyToDraft();
    reapplyOdoFuelInheritance();
    refreshFixedCostInputs();
    refreshOdoFuelInputs();
    updateSummary();
  });

  document.querySelectorAll('#f_shiftType button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      sh.shiftType = btn.dataset.val;
      document.querySelectorAll('#f_shiftType button').forEach(b=>b.classList.toggle('active', b===btn));
      reapplyOdoFuelInheritance();
      refreshOdoFuelInputs();
      updateSummary();
    });
  });

  document.getElementById('f_status').addEventListener('change', e=>{
    sh.status = e.target.value; reapplyCostPolicyToDraft(); refreshFixedCostInputs(); updateSummary();
  });
  document.getElementById('f_driver').addEventListener('change', e=>{
    const driver = driverById(e.target.value);
    sh.driverId = e.target.value; sh.driverNameSnapshot = driver ? driver.name : '';
    reapplyCostPolicyToDraft(); refreshFixedCostInputs(); updateSummary();
  });

  const bindNum=(id,field)=>document.getElementById(id).addEventListener('input', e=>{ sh[field]=Number(e.target.value); updateSummary(); });
  bindNum('f_odoStart','odoStart'); bindNum('f_odoEnd','odoEnd');
  bindNum('f_fuelStart','fuelStart'); bindNum('f_fuelEnd','fuelEnd');
  bindNum('f_fuelAdded','fuelAdded');
  attachMoneyInput(document.getElementById('f_fuelPrice'), sh.fuelUnitPrice, v=>{ sh.fuelUnitPrice=v; updateSummary(); });
  attachMoneyInput(document.getElementById('f_baseSalary'), sh.baseSalaryAllocation, v=>{ sh.baseSalaryAllocation=v; updateSummary(); });
  attachMoneyInput(document.getElementById('f_food'), sh.foodAllowance, v=>{ sh.foodAllowance=v; updateSummary(); });
  attachMoneyInput(document.getElementById('f_housing'), sh.housingAllocation, v=>{ sh.housingAllocation=v; updateSummary(); });
  attachMoneyInput(document.getElementById('f_incidental'), sh.incidentalCost, v=>{ sh.incidentalCost=v; updateSummary(); });
  attachMoneyInput(document.getElementById('f_advance'), sh.advanceAmount, v=>{ sh.advanceAmount=v; updateSummary(); });

  document.getElementById('f_incidentalNotes').addEventListener('input', e=>{ sh.incidentalNotes=e.target.value; });
  document.getElementById('f_advanceRecipient').addEventListener('input', e=>{ sh.advanceRecipientName=e.target.value; });
  document.getElementById('f_notes').addEventListener('input', e=>{ sh.notes=e.target.value; });

  document.getElementById('addSiteBtn').addEventListener('click', ()=>{
    sh.siteLogs.push({ siteName:'', volumePerTrip:0, materialUnitPrice:0, trips:0, driverWagePerTrip:0, wageQualifyingTripsOverride:null });
    renderSiteRows(); updateSummary();
  });

  document.getElementById('saveShiftBtn').addEventListener('click', saveDraftShift);

  const delBtn=document.getElementById('deleteShiftBtn');
  if(delBtn) delBtn.addEventListener('click', ()=>{
    if(confirm('Xoá ca này? Không thể hoàn tác.')){
      state.shifts = state.shifts.filter(s=>s.id!==sh.id);
      saveShifts();
      state.view='list'; state.draftShift=null;
      renderAll();
      showToast('Đã xoá ca.');
    }
  });
}

function refreshFixedCostInputs(){
  const sh = state.draftShift;
  const fb=document.getElementById('f_baseSalary'), ff=document.getElementById('f_food'), fh=document.getElementById('f_housing');
  if(fb) fb.value = toIntSafe(sh.baseSalaryAllocation).toLocaleString('vi-VN');
  if(ff) ff.value = toIntSafe(sh.foodAllowance).toLocaleString('vi-VN');
  if(fh) fh.value = toIntSafe(sh.housingAllocation).toLocaleString('vi-VN');
}

async function saveDraftShift(){
  const sh = state.draftShift;
  if(!sh.driverId){ showToast('Hãy chọn tài xế trước khi lưu.'); return; }
  // Guard against the exact class of bug that silently understates the fleet's
  // total fuel cost: a shift with real fuel consumed but fuelUnitPrice left
  // at 0 contributes 0đ to shiftFuelCost() (consumed × 0), which drags every
  // period total/average down without any visible error. Since Tổng tiền dầu
  // = Σ(Dầu tiêu hao mỗi ca × Đơn giá dầu mỗi ca), each ca's price MUST be
  // entered before that ca is allowed to save.
  // Chỉ chặn lưu khi ca đã thực sự có số liệu dầu cuối ca (sh.fuelEnd > 0) —
  // tức là một ca ĐÃ CHẠY XONG và có tiêu hao dầu thật nhưng bị bỏ trống đơn
  // giá. Một ca vừa xuất phát (xe mới đi làm, chưa có dầu cuối ca — fuelEnd
  // vẫn = 0) KHÔNG bị chặn lưu nữa: Ông Chủ vẫn lưu bình thường để giữ dữ
  // liệu đầu ca, và ca này sẽ tự hiện nút "⚠️ Cảnh Báo Hành Động" ở Danh
  // Sách Ca cho tới khi bổ sung đủ số liệu cuối ca.
  if(Number(sh.fuelEnd) > 0 && shiftFuelConsumed(sh) > 0 && (Number(sh.fuelUnitPrice)||0) <= 0){
    showToast('Ca này có dầu tiêu hao nhưng chưa nhập Đơn giá dầu/lít — nhập đơn giá thực tế trước khi lưu (nếu không tổng tiền dầu của kỳ sẽ bị tính thiếu).');
    return;
  }
  const idx = state.shifts.findIndex(s=>s.id===sh.id);
  const cleanShift = JSON.parse(JSON.stringify(sh));
  delete cleanShift.isNew;
  if(idx>=0) state.shifts[idx]=cleanShift; else state.shifts.push(cleanShift);
  await saveShifts();
  state.view='list'; state.draftShift=null;
  renderAll();
  showToast('Đã lưu ca thành công.');
}

// ========================= SMART INBOX: GOOGLE GEMINI API =========================
// Replaces the old Apple Vision/Tesseract OCR layer entirely. Each photo is
// sent directly to the Gemini API (multimodal — it reads the image itself,
// no separate OCR step), which returns ONE structured JSON object covering
// both classification AND field extraction in a single call. This runs
// from plain JavaScript (fetch), so it works on any phone/browser — no
// native SDK, no Mac/Xcode required.
//
// The AI's output is a BEST-EFFORT SUGGESTION ONLY. Every field it fills
// stays fully editable in the shift form before saving, by design — never
// auto-saved without review.

const GEMINI_MODEL = 'gemini-3.5-flash'; // Google retires model names frequently (1.5-flash, then 2.5-flash, both already shut down for new API keys as of July 2026). This is the current stable "flash" tier with no announced shutdown date. If it ever errors with "model not found", change ONLY this one line to whatever Google's current recommended flash model is.

// ========================= PERSISTENT RETRY (SHARED BY BOTH GEMINI CALLS) =========================
// Error codes that will NEVER succeed by simply retrying the exact same
// request — a missing/invalid API key, a corrupt image, or a rejected key
// need Ông Chủ to fix something in Cài Đặt, not the network to recover.
// Everything else (connection drop, timeout, Gemini 429/5xx, empty or
// unparseable model output) is treated as transient and retried FOREVER
// with capped exponential backoff — per spec, never surface a mid-stream
// error that forces a manual re-tap of the analyze button.
const GEMINI_NON_RETRYABLE_CODES = new Set(['MISSING_KEY','BAD_IMAGE','HTTP_400','HTTP_401','HTTP_403']);

/// Runs one Gemini attempt (`attemptFn`) and keeps retrying on transient
/// failure with capped exponential backoff (1.5s → 3s → 6s → … → capped at
/// 20s), indefinitely, until it either succeeds or hits a non-retryable
/// error above. `onRetry(attemptNumber, error, waitMs)` fires right before
/// each wait so the caller can keep its loading UI (the truck animation)
/// alive and, after enough attempts, let Ông Chủ know it's still working
/// rather than silently stuck — without ever showing a dead-end error.
async function callGeminiWithRetry(attemptFn, onRetry){
  let attempt = 0;
  while(true){
    attempt++;
    try {
      return await attemptFn();
    } catch(err){
      if(GEMINI_NON_RETRYABLE_CODES.has(err.code)) throw err;
      const waitMs = Math.min(1500 * Math.pow(2, attempt-1), 20000);
      if(onRetry){ try{ onRetry(attempt, err, waitMs); }catch(_ignored){} }
      await new Promise(resolve=>setTimeout(resolve, waitMs));
    }
  }
}

// ========================= STRATEGY ASSISTANT (7/30-DAY AI ANALYSIS) =========================
// Gathers the last 7 or 30 days of operating data into a compact summary,
// sends it to Gemini with an accountant/logistics-optimization persona,
// and renders the structured JSON insights it returns as organized cards:
// fuel-efficiency warnings per driver, most/least profitable site, a
// maintenance-scheduling suggestion based on cumulative km since the last
// logged repair, and free-form expert remarks.

/// Builds the compact numeric summary sent to Gemini — deliberately NOT
/// the full raw shift log (keeps the prompt small/fast/cheap); every
/// number here is already computed by the app's own verified formulas.
function aggregateStrategyData(from, to){
  const inRange = state.shifts.filter(sh=>sh.date>=from && sh.date<=to);
  const periodDays = Math.max(1, Math.round((new Date(to+'T00:00:00') - new Date(from+'T00:00:00'))/86400000) + 1);

  const byDriver = {};
  for(const sh of inRange){
    const name = driverById(sh.driverId)?.name || sh.driverNameSnapshot || '(chưa gán tài xế)';
    if(!byDriver[name]) byDriver[name] = { km:0, fuelLiters:0, fuelCost:0, shifts:0 };
    byDriver[name].km += shiftOdoDriven(sh);
    byDriver[name].fuelLiters += shiftFuelConsumed(sh);
    byDriver[name].fuelCost += shiftFuelCost(sh);
    byDriver[name].shifts += 1;
  }
  const driverStats = Object.entries(byDriver).map(([name,d])=>({
    name, shifts:d.shifts, totalKm: Math.round(d.km), totalFuelLiters: Math.round(d.fuelLiters),
    fuelPerKm: d.km>0 ? +(d.fuelLiters/d.km).toFixed(3) : 0
  }));

  const siteRanking = computeSiteRanking(inRange).map(s=>({
    name: s.name, revenue: Math.round(s.revenue), trips: s.trips, revenuePerTrip: Math.round(s.revenuePerTrip)
  }));

  const sortedRepairs = [...state.repairs].sort((a,b)=>b.date.localeCompare(a.date));
  const lastRepair = sortedRepairs[0] || null;
  const kmSinceLastRepair = lastRepair
    ? Math.round(state.shifts.filter(sh=>sh.date>lastRepair.date).reduce((s,sh)=>s+shiftOdoDriven(sh),0))
    : Math.round(state.shifts.reduce((s,sh)=>s+shiftOdoDriven(sh),0));

  const gTotal = computeResultsGroup(inRange);

  return {
    periodDays, from, to,
    totalRevenue: Math.round(gTotal.revenue),
    totalCost: Math.round(gTotal.opCost),
    grossProfit: Math.round(gTotal.grossProfit),
    totalKm: Math.round(gTotal.totalKm),
    totalTrips: gTotal.totalTrips,
    driverStats,
    siteRanking,
    lastRepairDate: lastRepair ? lastRepair.date : null,
    lastRepairItem: lastRepair ? lastRepair.item : null,
    kmSinceLastRepair
  };
}

/// output so the result can be rendered as organized cards, not a wall of
/// text.

/// Text-only Gemini call (no image) — same API, just omits the inline_data
/// image part.
async function callGeminiText(promptText, onRetry){
  const apiKey = (state.settings.geminiApiKey || '').trim();
  if(!apiKey){ const e = new Error('Chưa có Gemini API Key — vào tab Cài Đặt để thêm.'); e.code='MISSING_KEY'; throw e; }

  const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const requestBody = {
    contents: [{ parts: [{ text: promptText }] }],
    generationConfig: { responseMimeType: 'application/json', temperature: 0.3 }
  };

  return callGeminiWithRetry(async ()=>{
    let response;
    try {
      response = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(requestBody) });
    } catch(networkErr) {
      const e = new Error('Không kết nối được tới Gemini — kiểm tra mạng.'); e.code='NETWORK'; throw e;
    }
    if(!response.ok){
      let detail = '';
      try{ detail = (await response.json()).error?.message || ''; }catch(e){}
      const e = new Error(`Gemini báo lỗi (${response.status})${detail ? ': ' + detail : ''}`); e.code='HTTP_'+response.status; throw e;
    }
    const payload = await response.json();
    const textOut = payload?.candidates?.[0]?.content?.parts?.[0]?.text;
    if(!textOut){ const e = new Error('Gemini không trả về nội dung.'); e.code='EMPTY'; throw e; }
    try { return JSON.parse(textOut); }
    catch(parseErr){ const e = new Error('Gemini trả về dữ liệu không đọc được.'); e.code='PARSE'; throw e; }
  }, onRetry);
}

/// Handle for whichever HOWO truck run is currently live in the DOM for
/// the Strategy tab — intentionally NOT part of `state` (a live WAAPI
/// Animation object isn't serializable app data, just a UI detail).
/// renderStrategy() replaces this every time it draws the loading button,
/// so runStrategyAnalysis() below always finishes the truck that's
/// actually on screen right now, even if Ông Chủ switched tabs away and
/// back while a long retry chain was still running in the background.
let activeStrategyTruckRun = null;

async function runStrategyAnalysis(){
  const sa = state.strategyAnalysis;
  sa.loading = true; sa.error = null;
  renderStrategy();
  try{
    const summary = aggregateStrategyData(sa.from, sa.to);
    if(summary.driverStats.length===0 && summary.siteRanking.length===0){
      sa.error = 'Chưa có ca nào trong khoảng thời gian này để phân tích.';
      sa.loading = false;
      if(activeStrategyTruckRun) await activeStrategyTruckRun.finish();
      if(state.currentTab==='strategy' && state.strategyView==='ai') renderStrategy();
      return;
    }
    const prompt = buildStrategyPrompt(summary);
    const result = await callGeminiText(prompt, (attempt)=>{
      // Silent for the first couple of attempts — the truck itself is
      // already the "still working" cue. Only after a retry chain runs
      // long enough to look suspicious does a status line appear, so
      // Ông Chủ never wonders if the app has frozen.
      if(attempt>=3){
        const hintEl = document.getElementById('strategyRetryHint');
        if(hintEl) hintEl.textContent = `Mạng đang chập chờn — đang tự động thử kết nối lại với Gemini (lần ${attempt})...`;
      }
    });
    sa.result = result;
    sa.generatedAt = new Date().toISOString();
  }catch(e){
    sa.error = e.message || 'Không phân tích được — thử lại.';
  }
  sa.loading = false;
  if(activeStrategyTruckRun) await activeStrategyTruckRun.finish();
  if(state.currentTab==='strategy' && state.strategyView==='ai') renderStrategy();
}
