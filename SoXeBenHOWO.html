<style>
  :root{
    --bg:#F7F5F1;
    --surface:#FFFFFF;
    --ink:#1F2A37;
    --ink-soft:#6B7280;
    --accent:#E8720C;
    --accent-soft:#FCE4CC;
    --profit:#1F7A4D;
    --profit-soft:#E4F3EA;
    --loss:#B23A2E;
    --loss-soft:#FAE6E3;
    --border:#E5E1D8;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  #shell{ max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }
  header.top{
    position:sticky; top:0; z-index:10; background:var(--bg);
    padding:16px 16px 12px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  header.top h1{ font-size:19px; margin:0; font-weight:700; letter-spacing:-0.2px; }
  header.top .sub{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  main{ flex:1; padding:14px 14px 90px 14px; overflow-y:auto; }
  .btn{
    appearance:none; border:none; border-radius:12px; padding:12px 16px;
    font-size:15px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
  }
  .btn-accent{ background:var(--accent); color:#fff; }
  .btn-accent:active{ opacity:0.85; }
  .btn-ghost{ background:var(--surface); color:var(--ink); border:1px solid var(--border); }
  .btn-danger{ background:var(--loss-soft); color:var(--loss); }
  .btn-block{ width:100%; justify-content:center; }
  .btn-sm{ padding:8px 12px; font-size:13px; border-radius:10px; }

  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:12px; }
  .shift-card{ display:flex; gap:12px; align-items:stretch; padding:0; overflow:hidden; }
  .shift-card .bar{ width:6px; flex-shrink:0; }
  .shift-card .body{ flex:1; padding:13px 14px; }
  .shift-card .row1{ display:flex; justify-content:space-between; align-items:baseline; }
  .shift-card .date{ font-weight:700; font-size:15px; }
  .shift-card .tag{ font-size:11px; padding:3px 8px; border-radius:20px; background:var(--accent-soft); color:var(--accent); font-weight:600; }
  .shift-card .driver{ font-size:13px; color:var(--ink-soft); margin-top:3px; }
  .shift-card .profit{ font-size:17px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:8px; }
  .empty{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty .big{ font-size:38px; margin-bottom:10px; }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
  .field .hint{ font-size:11px; color:var(--ink-soft); margin-top:4px; }
  input[type=text], input[type=number], input[type=date], select, textarea{
    width:100%; font-size:16px; padding:11px 12px; border-radius:10px;
    border:1px solid var(--border); background:var(--surface); color:var(--ink); font-family:inherit;
  }
  input[type=number]{ font-variant-numeric:tabular-nums; }
  .seg{ display:flex; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .seg button{ flex:1; padding:11px 0; border:none; background:var(--surface); font-size:14px; font-weight:600; color:var(--ink-soft); }
  .seg button.active{ background:var(--accent); color:#fff; }

  section.group{ margin-bottom:18px; }
  section.group h3{ font-size:13px; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); margin:0 0 10px 2px; }

  .site-row{ background:var(--bg); border:1px dashed var(--border); border-radius:12px; padding:12px; margin-bottom:10px; }
  .site-row .site-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .site-row .site-head strong{ font-size:13px; }
  .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .summary-row{ display:flex; justify-content:space-between; padding:8px 0; font-size:14px; }
  .summary-row.total{ border-top:1px solid var(--border); margin-top:6px; padding-top:12px; font-weight:800; font-size:17px; }
  .summary-row .val{ font-variant-numeric:tabular-nums; }

  nav.tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; max-width:520px; margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabbar button{
    flex:1; border:none; background:none; padding:10px 0 8px 0;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:11px; color:var(--ink-soft); font-weight:600;
  }
  nav.tabbar button .ic{ font-size:20px; }
  nav.tabbar button.active{ color:var(--accent); }

  .toast{
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:30px;
    font-size:13px; z-index:50; opacity:0; transition:opacity .25s;
    max-width:80%; text-align:center;
  }
  .toast.show{ opacity:1; }

  .banner{ background:var(--accent-soft); color:var(--accent); border-radius:12px; padding:12px 14px; font-size:13px; margin-bottom:14px; font-weight:600; }
  .swipe-del{ text-align:right; margin-top:8px; }
  .driver-row{ display:flex; justify-content:space-between; align-items:center; }
  .toggle-row{ display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .toggle-row:last-child{ border-bottom:none; }
  .switch{ position:relative; width:44px; height:26px; }
  .switch input{ display:none; }
  .switch .track{ position:absolute; inset:0; background:var(--border); border-radius:20px; transition:.2s; }
  .switch .track:before{ content:''; position:absolute; width:20px; height:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
  .switch input:checked + .track{ background:var(--accent); }
  .switch input:checked + .track:before{ transform:translateX(18px); }
  .link-btn{ background:none; border:none; color:var(--accent); font-weight:700; font-size:14px; padding:6px 0; }

  .inbox-drop{
    border:2px dashed var(--border); border-radius:16px; padding:28px 16px; text-align:center;
    color:var(--ink-soft); margin-bottom:14px; background:var(--surface);
  }
  .inbox-drop .big{ font-size:34px; margin-bottom:8px; }
  .inbox-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
  .inbox-thumb{ position:relative; border-radius:12px; overflow:hidden; aspect-ratio:1; background:var(--bg); border:1px solid var(--border); }
  .inbox-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .inbox-thumb .badge{
    position:absolute; left:4px; bottom:4px; font-size:10px; font-weight:700; padding:3px 7px;
    border-radius:20px; color:#fff; background:var(--ink-soft);
  }
  .inbox-thumb .badge.odometer{ background:#2E7D32; }
  .inbox-thumb .badge.fuel{ background:var(--accent); }
  .inbox-thumb .badge.maintenance{ background:#7B3FA0; }
  .inbox-thumb .badge.driverReport{ background:#1976D2; }
  .inbox-thumb .badge.unknown{ background:#9AA0A6; }
  .inbox-thumb .badge.processing{ background:#5B6472; }
  .inbox-thumb .rm{
    position:absolute; top:4px; right:4px; width:22px; height:22px; border-radius:50%;
    background:rgba(0,0,0,0.55); color:#fff; border:none; font-size:13px; line-height:22px; text-align:center; padding:0;
  }
  .inbox-extract-card{ font-size:12px; }
  .inbox-extract-card .kv{ display:flex; justify-content:space-between; padding:3px 0; }

  .site-detail-row, .partner-detail-row{ cursor:pointer; }
  .site-detail-row:active, .partner-detail-row:active{ opacity:0.7; }

  .rating-badge{ display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
  .rating-badge.good{ background:var(--profit-soft); color:var(--profit); }
  .rating-badge.ok{ background:var(--accent-soft); color:var(--accent); }
  .rating-badge.watch{ background:#FFF3CD; color:#8A6D00; }
  .rating-badge.warn{ background:var(--loss-soft); color:var(--loss); }
  .rating-badge.risk{ background:var(--loss); color:#fff; }

  .driver-cv-card{ padding:14px; }
  .driver-cv-head{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .driver-cv-avatar{ width:42px; height:42px; border-radius:50%; background:var(--accent); color:#fff; font-weight:800; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .driver-cv-name{ font-weight:800; font-size:16px; }

<script>
// ========================= DATA & CONSTANTS =========================

const STATUS_OPTIONS = [

const SHIFT_TYPES = [{key:'day', label:'Ca Ngày'}, {key:'night', label:'Ca Đêm'}];
// (Per-shift payment status removed — payment tracking now lives at the
// site/partner level, see the "Đối Tác & Công Nợ" module below.)

let state = {
  drivers: [],

  settings: { standardWorkDaysPerMonth: 28, costPolicies: defaultCostPolicies(),
              defaultMonthlyBaseSalary: 15000000, defaultDailyFoodAllowance: 150000, defaultMonthlyHousingBudget: 5000000,
              monthlyFixedRoadFee: 25000000, geminiApiKey: '' },
  currentTab: 'shifts',

  resultsRoadFeeOverride: null, // if set, overrides settings.monthlyFixedRoadFee for the current results period

  sitePayments: [], // {id, siteName, date, partnerName, amount, notes} — money RECEIVED from a construction site's client
  strategyAnalysis: { from: null, to: null, loading: false, error: null, result: null, generatedAt: null },
  documents: [], // {id, scope:'vehicle'|'driver', driverId (if scope='driver'), type, expiryDate, notes}
  maintenanceSchedules: [], // {id, name, intervalKm, lastDoneOdo, lastDoneDate, notes}

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/// Scroll-position retention: the app re-renders the whole #app innerHTML
/// on every navigation, which naturally resets scroll to the top. These
/// two helpers save the scrollable <main> element's position right before
/// drilling into a detail view, and restore it after coming back — so
/// "Back" returns to where the person was, not the top of the page.
let savedMainScrollTop = 0;
function saveMainScroll(){
  const main = document.querySelector('main');
  if(main) savedMainScrollTop = main.scrollTop;
}
function restoreMainScroll(){
  requestAnimationFrame(()=>{
    const main = document.querySelector('main');
    if(main) main.scrollTop = savedMainScrollTop;
  });
}

/// Lightweight bottom-sheet modal used for explainer/detail popups (e.g.
/// the break-even accounting walkthrough) that shouldn't replace the whole
/// screen or disturb the underlying scroll position.
function openModal(innerHtml){
  const root = document.getElementById('modalRoot');
  if(!root) return;
  root.innerHTML = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal-sheet">${innerHtml}</div></div>`;
  document.getElementById('modalBackdrop').addEventListener('click', e=>{
    if(e.target.id==='modalBackdrop') closeModal();
  });
  const closeBtn = document.getElementById('modalCloseBtn');
  if(closeBtn) closeBtn.addEventListener('click', closeModal);
}
function closeModal(){
  const root = document.getElementById('modalRoot');
  if(root) root.innerHTML = '';
}

/// Returns TODAY as "YYYY-MM-DD" using the PHONE'S LOCAL date/time zone.
/// `new Date().toISOString()` is UTC-based and silently rolls back to the
/// previous day during Vietnam's early-morning hours (UTC+7) — this is
/// the correct replacement everywhere the app needs "today's date".
function todayLocalDateStr(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// ========================= DOCUMENTS & MAINTENANCE WARNINGS =========================
// Deterministic (no AI, no guessing) tracking of hard deadlines: vehicle
// paperwork (đăng kiểm, bảo hiểm, phù hiệu vận tải) and driver paperwork
// (GPLX, khám sức khỏe), PLUS distance-based maintenance intervals (thay
// dầu, đảo lốp...). All warnings surface as an in-app banner on the very
// first tab the person sees every time they open the app — since a plain
// web app cannot reliably send push notifications while closed (iOS
// Safari's web-push support is inconsistent even when installed to the
// home screen), "nhắc mỗi tuần" is honestly implemented as: the warning
// re-appears EVERY time the app is opened for as long as the deadline is
// within 30 days, which for someone logging shifts daily easily satisfies
// "at least once a week" — just without a true background notification.

const DOCUMENT_TYPE_OPTIONS = {
  vehicle: ['Đăng Kiểm', 'Bảo Hiểm', 'Phù Hiệu Vận Tải', 'Khác (Xe)'],
  driver: ['GPLX', 'Khám Sức Khoẻ Lái Xe', 'Khác (Tài Xế)']
};

function daysUntilLocal(dateStr){
  const today = new Date(todayLocalDateStr()+'T00:00:00');
  const target = new Date(dateStr+'T00:00:00');
  return Math.round((target-today)/86400000);
}

function urgencyFromDays(daysLeft, warnThreshold, urgentThreshold){
  if(daysLeft < 0) return { label:'ĐÃ HẾT HẠN', className:'risk' };
  if(daysLeft <= urgentThreshold) return { label:`Còn ${daysLeft} ngày — GẤP`, className:'risk' };
  if(daysLeft <= warnThreshold) return { label:`Còn ${daysLeft} ngày`, className:'warn' };
  return { label:`Còn ${daysLeft} ngày`, className:'good' };
}

/// Every document within 30 days of expiry (or already expired), soonest first.
function computeDocumentWarnings(){
  return state.documents
    .map(doc=>{
      const daysLeft = daysUntilLocal(doc.expiryDate);
      return { ...doc, daysLeft, urgency: urgencyFromDays(daysLeft, 30, 7),
        driverName: doc.scope==='driver' ? (driverById(doc.driverId)?.name || '(tài xế đã xoá)') : null };
    })
    .filter(d=>d.daysLeft<=30)
    .sort((a,b)=>a.daysLeft-b.daysLeft);
}

/// Latest known odometer reading across every logged shift — the "current
/// km" used to compute how far each maintenance item still has to go.
function currentOdometer(){
  if(state.shifts.length===0) return 0;
  const sorted = [...state.shifts].sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));
  return sorted[0].odoEnd || 0;
}

function computeMaintenanceStatus(schedule){
  const current = currentOdometer();
  const nextDueOdo = (Number(schedule.lastDoneOdo)||0) + (Number(schedule.intervalKm)||0);
  const kmRemaining = Math.round(nextDueOdo - current);
  let urgency;
  if(kmRemaining<=0) urgency = { label:'ĐÃ QUÁ HẠN', className:'risk' };
  else if(kmRemaining<=300) urgency = { label:`Còn ${kmRemaining} km — GẤP`, className:'risk' };
  else if(kmRemaining<=1000) urgency = { label:`Còn ${kmRemaining} km`, className:'warn' };
  else urgency = { label:`Còn ${kmRemaining} km`, className:'good' };
  return { ...schedule, currentOdo: current, nextDueOdo, kmRemaining, urgency };
}

/// Every maintenance item within 1000km of being due (or already overdue),
/// most urgent first.
function computeMaintenanceWarnings(){
  return state.maintenanceSchedules
    .map(computeMaintenanceStatus)
    .filter(m=>m.kmRemaining<=1000)
    .sort((a,b)=>a.kmRemaining-b.kmRemaining);
}

function computeAllWarnings(){
  const docs = computeDocumentWarnings();
  const maint = computeMaintenanceWarnings();
  return { docs, maint, total: docs.length + maint.length };
}

// ========================= FIREBASE: CLOUD STORAGE (NO LOGIN) =========================

//
// TRADE-OFF: because there's no login, this data is only as private as
// the link/app itself — anyone who finds this exact web address could, in

// open access (allow read, write: if true) for this fixed path for the
// app to work. Acceptable for a single small business's own operational
// log; not meant for sensitive data.
const firebaseConfig = {
  apiKey: "AIzaSyAtT93cEftDeSbzYrMt5LUprPwzq6bFcxw",
  authDomain: "so-xe-ben-howo.firebaseapp.com",
  projectId: "so-xe-ben-howo",
  storageBucket: "so-xe-ben-howo.firebasestorage.app",

};

firebase.initializeApp(firebaseConfig);

// Fixed shared "account" path — every device using this app reads/writes

const SHARED_SPACE_ID = 'howo-29e-69112';

async function loadAll(){
  try {
    const [dSnap, sSnap, rSnap, stSnap, pSnap, docSnap, maintSnap, contractSnap] = await Promise.all([

      sharedDataRef('shifts').get(),
      sharedDataRef('repairs').get(),
      sharedDataRef('settings').get(),
      sharedDataRef('sitePayments').get(),
      sharedDataRef('documents').get(),
      sharedDataRef('maintenanceSchedules').get(),
      sharedDataRef('siteContracts').get()
    ]);

    const sData = sSnap.exists ? sSnap.data() : null;
    const rData = rSnap.exists ? rSnap.data() : null;
    const pData = pSnap.exists ? pSnap.data() : null;
    const docData = docSnap.exists ? docSnap.data() : null;

}

// ========================= FULL BACKUP / RESTORE (JSON FILE) =========================
// This is the safety net against losing the phone: export everything to one
// file the person saves elsewhere (Zalo Cloud, Email to self, Google Drive),
// and can load back on any phone via "Phục Hồi Từ File Sao Lưu".

function exportBackupFile(){
  const backup = {
    appName: 'SoXeBenHOWO',
    backupVersion: 4,
    exportedAt: new Date().toISOString(),
    drivers: state.drivers,
    shifts: state.shifts,
    repairs: state.repairs,
    sitePayments: state.sitePayments,
    documents: state.documents,
    maintenanceSchedules: state.maintenanceSchedules,
    siteContracts: state.siteContracts,
    settings: state.settings
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`SaoLuu_SoXeBenHOWO_${todayLocalDateStr()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Đã tạo file sao lưu. Nhớ gửi file này qua Zalo/Email cho chính mình để cất giữ.');
}

function triggerRestoreFilePicker(){
  const input = document.getElementById('restoreFileInput');
  if(input) input.click();
}

async function handleRestoreFile(file){
  if(!file) return;
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(!backup || !Array.isArray(backup.drivers) || !Array.isArray(backup.shifts)){
      showToast('File này không đúng định dạng sao lưu.');
      return;
    }
    const confirmMsg = `File sao lưu này có ${backup.drivers.length} tài xế và ${backup.shifts.length} ca, xuất lúc ${new Date(backup.exportedAt).toLocaleString('vi-VN')}.\n\nPhục hồi sẽ THAY THẾ toàn bộ dữ liệu hiện tại trên máy này. Chắc chắn muốn tiếp tục?`;
    if(!confirm(confirmMsg)) return;
    state.drivers = backup.drivers;
    state.shifts = backup.shifts;
    state.repairs = Array.isArray(backup.repairs) ? backup.repairs : [];
    state.sitePayments = Array.isArray(backup.sitePayments) ? backup.sitePayments : [];
    state.documents = Array.isArray(backup.documents) ? backup.documents : [];
    state.maintenanceSchedules = Array.isArray(backup.maintenanceSchedules) ? backup.maintenanceSchedules : [];
    state.siteContracts = Array.isArray(backup.siteContracts) ? backup.siteContracts : [];
    if(backup.settings) state.settings = Object.assign(state.settings, backup.settings);
    await saveDrivers(); await saveShifts(); await saveRepairs(); await saveSitePayments();
    await saveDocuments(); await saveMaintenanceSchedules(); await saveSiteContracts(); await saveSettings();
    renderAll();
    showToast('Đã phục hồi dữ liệu thành công.');
  }catch(e){
    showToast('Không đọc được file này. Kiểm tra lại đúng file sao lưu chưa.');
  }
}

// ========================= FORMAT & COMPUTE =========================

function fmtVND(n){
  n = Number(n)||0;
  return Math.round(n).toLocaleString('vi-VN') + 'đ';
}
function toIntSafe(v){ return Math.round(Number(v)||0); }
/// Attaches live "1.540.000"-style thousands-separator formatting to a
/// text input representing a money amount. Digits typed are parsed as an
/// integer VND amount; the field always displays the grouped form.
function attachMoneyInput(el, initialValue, onChange){
  if(!el) return;
  el.value = initialValue ? toIntSafe(initialValue).toLocaleString('vi-VN') : '';
  if(!el.placeholder) el.placeholder = '0';
  el.addEventListener('input', ()=>{
    const digits = el.value.replace(/[^\d]/g,'');
    const num = digits==='' ? 0 : parseInt(digits,10);
    el.value = digits==='' ? '' : num.toLocaleString('vi-VN');
    onChange(num);
  });
}
/// For plain (non-money) numeric inputs: shows blank instead of a literal
/// "0" so the person can type straight away without deleting a placeholder
/// zero first. Use in template `value="${blankIfZero(x)}"` together with
/// `placeholder="0"` on the input tag.
function blankIfZero(v){
  const n = Number(v);
  return (!n || n===0) ? '' : v;
}
function statusLabel(key){ return (STATUS_OPTIONS.find(s=>s.key===key)||{}).label || key; }
function shiftTypeLabel(key){ return (SHIFT_TYPES.find(s=>s.key===key)||{}).label || key; }

function driverById(id){ return state.drivers.find(d=>d.id===id); }

function daysInMonth(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}
function dailyBaseSalary(driver){
  const days = state.settings.standardWorkDaysPerMonth || 1;
  return (driver.monthlyBaseSalary||0) / days;
}
function dailyHousing(driver, dateStr){
  const dim = daysInMonth(dateStr) || 30;
  return (driver.monthlyHousingBudget||0) / dim;
}

function siteRevenue(s){ return (Number(s.volumePerTrip)||0) * (Number(s.materialUnitPrice)||0) * (Number(s.trips)||0); }
function siteEffectiveWageTrips(s){
  return (s.wageQualifyingTripsOverride===null || s.wageQualifyingTripsOverride===undefined)
    ? (Number(s.trips)||0) : (Number(s.wageQualifyingTripsOverride)||0);
}
function siteWageTotal(s){ return siteEffectiveWageTrips(s) * (Number(s.driverWagePerTrip)||0); }

function shiftOdoDriven(sh){ return Math.max(0, (Number(sh.odoEnd)||0) - (Number(sh.odoStart)||0)); }
function shiftFuelConsumed(sh){ return Math.max(0, ((Number(sh.fuelStart)||0)+(Number(sh.fuelAdded)||0)) - (Number(sh.fuelEnd)||0)); }
function shiftFuelCost(sh){ return shiftFuelConsumed(sh) * (Number(sh.fuelUnitPrice)||0); }
function shiftTotalRevenue(sh){ return (sh.siteLogs||[]).reduce((sum,s)=>sum+siteRevenue(s),0); }
function shiftTotalTripWage(sh){ return (sh.siteLogs||[]).reduce((sum,s)=>sum+siteWageTotal(s),0); }
function shiftTotalCost(sh){
  return shiftFuelCost(sh) + shiftTotalTripWage(sh) + (Number(sh.baseSalaryAllocation)||0)
       + (Number(sh.foodAllowance)||0) + (Number(sh.housingAllocation)||0) + (Number(sh.incidentalCost)||0);
}
function shiftNetProfit(sh){ return shiftTotalRevenue(sh) - shiftTotalCost(sh); }

// ---- Repair/depreciation responsibility (who pays for a breakage) ----
const REPAIR_RESPONSIBILITY_OPTIONS = [
  { key:'owner_full', label:'Chủ xe chịu 100% (hao mòn/lỗi kỹ thuật thông thường)' },
  { key:'driver_full', label:'Do tài xế làm hỏng — Tài xế chịu 100%' },
  { key:'custom', label:'Tùy chọn — Nhập tay số tiền tài xế phải chịu' }
];
function repairResponsibilityLabel(key){
  return (REPAIR_RESPONSIBILITY_OPTIONS.find(o=>o.key===key)||REPAIR_RESPONSIBILITY_OPTIONS[0]).label;
}
/// Portion of a repair's cost that gets deducted from the RESPONSIBLE
/// driver's pay:
///  - owner_full (default): 0 — chủ xe chịu toàn bộ.
///  - driver_full: toàn bộ số tiền hoá đơn.
///  - custom: số tiền chủ xe tự nhập tay (driverCustomAmount), không được
///    vượt quá số tiền hoá đơn — phần còn lại ngầm hiểu là chủ xe/bên thứ
///    ba chịu, không tạo tiền lệ khoá cứng 50/50.
function repairDriverResponsibleAmount(r){
  const amt = Number(r.amount)||0;
  const resp = r.responsibility || 'owner_full';
  if(resp==='driver_full') return amt;
  if(resp==='custom') return Math.max(0, Math.min(amt, Number(r.driverCustomAmount)||0));
  return 0;
}
/// All-time total deducted from ONE driver across every repair record
/// where they were marked responsible — surfaced on their CV card as a
/// running "hồ sơ lỗi" figure.
function driverResponsibleRepairTotal(driverId){
  return state.repairs
    .filter(r=>r.responsibleDriverId===driverId && (r.responsibility==='driver_full' || r.responsibility==='custom'))
    .reduce((s,r)=>s+repairDriverResponsibleAmount(r),0);
}
/// Same total but scoped to [from, to] — used when building the payroll
/// export sheet for a specific period, so the deduction only reflects
/// breakages actually dated within that payroll period.
function driverResponsibleRepairTotalInRange(driverId, from, to){
  return state.repairs
    .filter(r=>r.responsibleDriverId===driverId && r.date>=from && r.date<=to && (r.responsibility==='driver_full' || r.responsibility==='custom'))
    .reduce((s,r)=>s+repairDriverResponsibleAmount(r),0);
}

function chronoKey(dateStr, shiftType){
  const days = Math.floor(new Date(dateStr+'T00:00:00').getTime()/86400000);
  return days*2 + (shiftType==='night' ? 1 : 0);
}
function findPreviousShift(dateStr, shiftType, excludeId){
  const targetKey = chronoKey(dateStr, shiftType);
  let best=null, bestKey=-Infinity;
  for(const s of state.shifts){
    if(s.id===excludeId) continue;
    const k = chronoKey(s.date, s.shiftType);
    if(k<targetKey && k>bestKey){ best=s; bestKey=k; }
  }
  return best;
}

function allSiteNames(){
  const seen=new Set(), out=[];
  const sorted=[...state.shifts].sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));
  for(const sh of sorted){
    for(const s of (sh.siteLogs||[])){
      const n=(s.siteName||'').trim();
      if(n && !seen.has(n)){ seen.add(n); out.push(n); }
    }
  }
  return out;
}

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 2200);
}

function renderHeader(){

  if(state.currentTab==='shifts'){
    if(state.view==='form'){

      const back=document.createElement('button');

    } else {
      title.textContent='Ca Làm Việc';
      sub.textContent = state.shifts.length + ' ca đã ghi';
      const add=document.createElement('button');
      add.className='btn btn-accent btn-sm'; add.textContent='+ Ca Mới';
      add.onclick=startNewShift;
      action.appendChild(add);
    }
  } else if(state.currentTab==='drivers'){
    title.textContent='Tài Xế'; sub.textContent=state.drivers.length+' tài xế';
  } else if(state.currentTab==='inbox'){
    title.textContent='Hộp Nhận Dữ Liệu'; sub.textContent='Nạp ảnh, app tự đọc';
  } else if(state.currentTab==='strategy'){
    title.textContent='Trợ Lý Chiến Lược'; sub.textContent='Phân tích sâu bằng AI';
  } else if(state.currentTab==='results'){
    title.textContent='Kết Quả Kinh Doanh'; sub.textContent='Theo khoảng thời gian';
  } else {
    title.textContent='Cài Đặt'; sub.textContent='Định mức & tuỳ chỉnh';
  }
}

function renderShiftList(){
  const app=document.getElementById('app');

  const warnings = computeAllWarnings();
  const warningsBannerHtml = warnings.total===0 ? '' : `
    <div class="card" style="border:1.5px solid var(--loss); margin-bottom:14px;">
      <div style="font-weight:800; color:var(--loss); margin-bottom:8px;">⚠️ ${warnings.total} Việc Cần Chú Ý</div>
      ${warnings.docs.map(d=>`
        <div class="kv" style="padding:4px 0;">
          <span>${escapeHtml(d.type)}${d.driverName?' — '+escapeHtml(d.driverName):' (xe)'}</span>
          <span class="rating-badge ${d.urgency.className}">${d.urgency.label}</span>
        </div>`).join('')}
      ${warnings.maint.map(m=>`
        <div class="kv" style="padding:4px 0;">
          <span>🔧 ${escapeHtml(m.name)}</span>
          <span class="rating-badge ${m.urgency.className}">${m.urgency.label}</span>
        </div>`).join('')}
      <button class="link-btn" id="warningsGoToSettingsBtn" style="margin-top:6px;">Quản lý giấy tờ / bảo dưỡng →</button>
    </div>`;

  const searchBarHtml = `
    <div class="search-bar">
      <span class="ic">🔎</span>
      <input type="date" id="searchDateInput" value="${state.searchDate||''}">
      ${state.searchDate ? '<button id="clearSearchBtn">Xoá</button>' : ''}
    </div>`;

  if(state.shifts.length===0){
    app.innerHTML = warningsBannerHtml + searchBarHtml + `
      <div class="banner">Bước đầu tiên: bấm "+ Tài Xế" ở tab Tài Xế để thêm người lái, rồi quay lại đây bấm "+ Ca Mới".</div>
      <div class="empty"><div class="big">🚛</div>Chưa có ca nào được ghi.<br>Bấm "+ Ca Mới" ở góc trên để bắt đầu.</div>`;
    bindSearchBar();
    bindWarningsBanner();
    return;
  }

  let list = [...state.shifts];
  if(state.searchDate){ list = list.filter(sh=>sh.date===state.searchDate); }
  list.sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));

  const cardsHtml = list.length===0
    ? `<div class="empty"><div class="big">📅</div>Không có ca nào vào ngày ${state.searchDate?formatDateVN(state.searchDate):''}.</div>`
    : list.map(sh=>{
        const profit=shiftNetProfit(sh);
        const positive = profit>=0;
        const driverName = driverById(sh.driverId)?.name || sh.driverNameSnapshot || '(chưa chọn tài xế)';
        return `
          <div class="card shift-card" data-id="${sh.id}" onclick="openShift('${sh.id}')">
            <div class="bar" style="background:${positive?'var(--profit)':'var(--loss)'}"></div>
            <div class="body">
              <div class="row1">
                <span class="date">${formatDateVN(sh.date)} · ${shiftTypeLabel(sh.shiftType)}</span>
                <span class="tag">${statusLabel(sh.status)}</span>
              </div>
              <div class="driver">Tài xế: ${escapeHtml(driverName)}</div>
              <div class="profit" style="color:${positive?'var(--profit)':'var(--loss)'}">${positive?'+':''}${fmtVND(profit)}</div>
            </div>
          </div>`;
      }).join('');

  app.innerHTML = warningsBannerHtml + searchBarHtml + cardsHtml;
  bindSearchBar();
  bindWarningsBanner();
}
function bindSearchBar(){
  const input = document.getElementById('searchDateInput');
  if(input) input.addEventListener('change', e=>{ state.searchDate = e.target.value || null; renderShiftList(); });
  const clearBtn = document.getElementById('clearSearchBtn');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{ state.searchDate=null; renderShiftList(); });
}
function bindWarningsBanner(){
  const btn = document.getElementById('warningsGoToSettingsBtn');
  if(btn) btn.addEventListener('click', ()=>{ state.currentTab='settings'; renderAll(); });
}
function formatDateVN(dateStr){
  const [y,m,d]=dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openShift(id){
  const sh = state.shifts.find(s=>s.id===id);
  if(!sh) return;
  state.draftShift = JSON.parse(JSON.stringify(sh));
  state.draftShift.isNew=false;
  state.view='form';
  renderAll();
}

function startNewShift(){
  if(state.drivers.length===0){
    showToast('Hãy thêm tài xế trước ở tab "Tài Xế".');
    return;
  }
  const today=new Date();
  const dateStr=todayLocalDateStr();
  const shiftType='day';
  const prev = findPreviousShift(dateStr, shiftType, null);
  const driver = state.drivers[0];
  const policy = state.settings.costPolicies.active;
  const draft = {
    id: uid('shift'),
    isNew: true,
    date: dateStr,
    shiftType,
    driverId: driver.id,
    driverNameSnapshot: driver.name,
    status: 'active',
    odoStart: prev ? prev.odoEnd : 0,
    odoEnd: 0,
    fuelStart: prev ? prev.fuelEnd : 0,
    fuelEnd: 0,
    fuelAdded: 0,
    fuelUnitPrice: 0,
    baseSalaryAllocation: policy.baseSalary ? dailyBaseSalary(driver) : 0,
    foodAllowance: policy.food ? driver.dailyFoodAllowance : 0,
    housingAllocation: policy.housing ? dailyHousing(driver, dateStr) : 0,
    incidentalCost: 0,
    incidentalNotes: '',
    advanceAmount: 0,
    advanceRecipientName: '',
    notes: '',
    siteLogs: []
  };
  state.draftShift = draft;
  state.view='form';
  renderAll();
}

function reapplyCostPolicyToDraft(){
  const sh = state.draftShift;
  const driver = driverById(sh.driverId);
  const policy = state.settings.costPolicies[sh.status] || {baseSalary:false,food:false,housing:false,operations:true};
  if(!driver){ sh.baseSalaryAllocation=0; sh.foodAllowance=0; sh.housingAllocation=0; return; }
  sh.baseSalaryAllocation = policy.baseSalary ? dailyBaseSalary(driver) : 0;
  sh.foodAllowance = policy.food ? driver.dailyFoodAllowance : 0;
  sh.housingAllocation = policy.housing ? dailyHousing(driver, sh.date) : 0;
}

/// Recomputes Odo Start / Fuel Start inheritance from the chronologically
/// previous shift, based on the CURRENT date + shift type selected in the
/// form. Only applies to a brand-new (never-saved) shift — re-opening an
/// EXISTING saved shift to edit must never silently overwrite its already
/// recorded odo/fuel history, even if the person changes the date field.
function reapplyOdoFuelInheritance(){
  const sh = state.draftShift;
  if(!sh.isNew) return;
  const prev = findPreviousShift(sh.date, sh.shiftType, sh.id);
  const inheritedOdo = prev ? prev.odoEnd : 0;
  const inheritedFuel = prev ? prev.fuelEnd : 0;
  sh.odoStart = inheritedOdo;
  sh.odoEnd = 0;
  sh.fuelStart = inheritedFuel;
}

/// Refreshes the on-screen Odo/Fuel Start/End inputs to match the current
/// draft shift values (used right after reapplyOdoFuelInheritance()).
function refreshOdoFuelInputs(){
  const sh = state.draftShift;
  const os=document.getElementById('f_odoStart'), oe=document.getElementById('f_odoEnd'), fs=document.getElementById('f_fuelStart');
  if(os) os.value = blankIfZero(sh.odoStart);
  if(oe) oe.value = blankIfZero(sh.odoEnd);
  if(fs) fs.value = blankIfZero(sh.fuelStart);
}

        </div>
        <div class="field">
          <label>Đơn giá vật liệu</label>
          <input type="text" inputmode="decimal" class="site-input site-money" data-idx="${i}" data-field="materialUnitPrice" placeholder="0" value="${s.materialUnitPrice ? toIntSafe(s.materialUnitPrice).toLocaleString('vi-VN') : ''}">
        </div>
      </div>
      <div class="two-col">
        <div class="field">
          <label>Số chuyến</label>
          <input type="number" inputmode="numeric" class="site-input" data-idx="${i}" data-field="trips" placeholder="0" value="${blankIfZero(s.trips)}">
        </div>
        <div class="field">
          <label>Lương / chuyến</label>
          <input type="text" inputmode="decimal" class="site-input site-money" data-idx="${i}" data-field="driverWagePerTrip" placeholder="0" value="${s.driverWagePerTrip ? toIntSafe(s.driverWagePerTrip).toLocaleString('vi-VN') : ''}">
        </div>
      </div>
      <div class="hint site-calc" data-idx="${i}"></div>
    </div>
  `).join('');
  sh.siteLogs.forEach((s,i)=>updateSiteCalc(i));

  wrap.querySelectorAll('.site-input:not(.site-money)').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const idx = Number(inp.dataset.idx), field=inp.dataset.field;
      const s = sh.siteLogs[idx];
      s[field] = (field==='siteName') ? inp.value : Number(inp.value);
      updateSiteCalc(idx);
      updateSummary();
    });
  });
  wrap.querySelectorAll('.site-money').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const idx = Number(inp.dataset.idx), field=inp.dataset.field;
      const digits = inp.value.replace(/[^\d]/g,'');
      const num = digits==='' ? 0 : parseInt(digits,10);
      inp.value = digits==='' ? '' : num.toLocaleString('vi-VN');
      sh.siteLogs[idx][field] = num;
      updateSiteCalc(idx);
      updateSummary();
    });
  });
  wrap.querySelectorAll('.removeSiteBtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const idx = Number(btn.dataset.idx);
      sh.siteLogs.splice(idx,1);
      renderSiteRows();
      updateSummary();
    });
  });
}

function refreshFixedCostInputs(){

  if(fh) fh.value = toIntSafe(sh.housingAllocation).toLocaleString('vi-VN');
}

async function saveDraftShift(){
  const sh = state.draftShift;
  if(!sh.driverId){ showToast('Hãy chọn tài xế trước khi lưu.'); return; }
  const idx = state.shifts.findIndex(s=>s.id===sh.id);
  const cleanShift = JSON.parse(JSON.stringify(sh));
  delete cleanShift.isNew;
  if(idx>=0) state.shifts[idx]=cleanShift; else state.shifts.push(cleanShift);
  await saveShifts();
  state.view='list'; state.draftShift=null;
  renderAll();
  showToast('Đã lưu ca thành công.');
}

// ========================= SMART INBOX: GOOGLE GEMINI API =========================
// Replaces the old Apple Vision/Tesseract OCR layer entirely. Each photo is
// sent directly to the Gemini API (multimodal — it reads the image itself,
// no separate OCR step), which returns ONE structured JSON object covering
// both classification AND field extraction in a single call. This runs
// from plain JavaScript (fetch), so it works on any phone/browser — no
// native SDK, no Mac/Xcode required.
//
// The AI's output is a BEST-EFFORT SUGGESTION ONLY. Every field it fills
// stays fully editable in the shift form before saving, by design — never
// auto-saved without review.

const GEMINI_MODEL = 'gemini-3.5-flash'; // Google retires model names frequently (1.5-flash, then 2.5-flash, both already shut down for new API keys as of July 2026). This is the current stable "flash" tier with no announced shutdown date. If it ever errors with "model not found", change ONLY this one line to whatever Google's current recommended flash model is.

const INBOX_CATEGORY_LABELS = {
  odometer: 'Ảnh Đồng Hồ Km',
  fuel: 'Hoá Đơn Dầu',
  maintenance: 'Hoá Đơn Sửa Chữa',
  driverReport: 'Báo Cáo Tài Xế',
  unknown: 'Chưa Rõ Loại'
};
const GEMINI_VALID_CATEGORIES = ['odometer','fuel','maintenance','driverReport','unknown'];

/// Builds the instruction sent to Gemini alongside each image. Includes
/// the live driver roster so the model can match a name it reads in a
/// chat screenshot against an EXACT existing driver record, rather than
/// inventing a new spelling.
function buildGeminiInboxPrompt(driversList){
  const names = driversList.map(d=>d.name).join(', ') || '(chưa có tài xế nào)';
  return `Bạn là trợ lý xử lý dữ liệu vận hành cho một xe ben HOWO 4 chân. Phân tích kỹ bức ảnh được cung cấp và xác định nó thuộc loại nào trong các loại sau:
- "odometer": ảnh chụp đồng hồ công tơ mét / màn hình hiển thị số km trên xe
- "fuel": hoá đơn mua xăng/dầu
- "maintenance": hoá đơn sửa chữa, thay thế phụ tùng, bảo dưỡng xe (thay nhớt, vá lốp, sửa máy...)
- "driverReport": ảnh chụp màn hình tin nhắn (ví dụ Zalo) tài xế báo cáo ca làm việc, số chuyến, công trình
- "unknown": không thuộc loại nào ở trên, hoặc ảnh không đọc được

Danh sách tên tài xế đang có trong hệ thống: ${names}

CHỈ trả về DUY NHẤT một object JSON hợp lệ đúng cấu trúc dưới đây — không kèm lời giải thích, không dùng markdown, không có chữ nào khác ngoài JSON:
{
  "category": "odometer" | "fuel" | "maintenance" | "driverReport" | "unknown",
  "odoEnd": <số nguyên số km đọc được, hoặc null>,
  "fuelAddedLiters": <số lít đổ thêm, có thể là số thập phân, hoặc null>,
  "totalAmount": <tổng số tiền trên hoá đơn (VND, số nguyên), hoặc null>,
  "suggestedFuelUnitPrice": <đơn giá dầu ước tính = totalAmount / fuelAddedLiters nếu tính được, hoặc null>,
  "maintenanceItemsText": <mô tả ngắn gọn danh mục sửa chữa/phụ tùng đọc được, hoặc null>,
  "matchedDriverName": <PHẢI khớp CHÍNH XÁC một trong các tên tài xế liệt kê ở trên, hoặc null nếu không chắc chắn>,
  "totalTrips": <tổng số chuyến đọc được từ báo cáo, số nguyên, hoặc null>,
  "shiftType": "day" | "night" | null,
  "siteNameGuess": <tên công trình đọc được nếu có, hoặc null>,
  "rawSummary": "<tóm tắt 1 câu ngắn gọn bằng tiếng Việt về nội dung ảnh>"
}`;
}

/// Converts a data: URL image into the { mimeType, base64Data } pair
/// Gemini's inline_data field expects.
function splitDataUrl(dataUrl){
  const m = dataUrl.match(/^data:(image\/[a-zA-Z0-9.+-]+);base64,(.+)$/);
  if(!m) return null;
  return { mimeType: m[1], base64Data: m[2] };
}

/// Sends one image + the classification/extraction prompt to the Gemini
/// API and returns the parsed structured JSON result. This is the entire
/// "GeminiManager" — a single focused network call, since JS has no
/// native SDK requirement the way Swift would.
async function callGeminiVision(dataUrl, promptText){
  const apiKey = (state.settings.geminiApiKey || '').trim();
  if(!apiKey){ const e = new Error('Chưa có Gemini API Key — vào tab Cài Đặt để thêm.'); e.code='MISSING_KEY'; throw e; }

  const parts = splitDataUrl(dataUrl);
  if(!parts){ const e = new Error('Ảnh không đúng định dạng.'); e.code='BAD_IMAGE'; throw e; }

  const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const requestBody = {
    contents: [{
      parts: [
        { text: promptText },
        { inline_data: { mime_type: parts.mimeType, data: parts.base64Data } }
      ]
    }],
    generationConfig: { responseMimeType: 'application/json', temperature: 0.2 }
  };

  let response;
  try {
    response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });
  } catch(networkErr) {
    const e = new Error('Không kết nối được tới Gemini — kiểm tra mạng.'); e.code='NETWORK'; throw e;
  }

  if(!response.ok){
    let detail = '';
    try{ detail = (await response.json()).error?.message || ''; }catch(e){ /* ignore parse failure */ }
    const e = new Error(`Gemini báo lỗi (${response.status})${detail ? ': ' + detail : ''}`); e.code='HTTP_'+response.status; throw e;
  }

  const payload = await response.json();
  const textOut = payload?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!textOut){ const e = new Error('Gemini không trả về nội dung.'); e.code='EMPTY'; throw e; }

  try {
    return JSON.parse(textOut);
  } catch(parseErr) {
    const e = new Error('Gemini trả về dữ liệu không đọc được.'); e.code='PARSE'; throw e;
  }
}

/// Processes one queued inbox image end-to-end: send to Gemini → store the
/// structured result on the image entry → re-render.
async function processInboxImage(entry){
  try{
    const prompt = buildGeminiInboxPrompt(state.drivers);
    const result = await callGeminiVision(entry.dataUrl, prompt);
    entry.category = GEMINI_VALID_CATEGORIES.includes(result.category) ? result.category : 'unknown';
    entry.extracted = result;
    entry.status = 'done';
  }catch(e){
    entry.status = 'error';
    entry.errorMessage = e.message || 'Không phân tích được ảnh này.';
  }
  if(state.currentTab==='inbox') renderInbox();
}

/// Merges every successfully-processed image's extracted fields into ONE
/// combined draft shift (since a single shift is usually documented by
/// several photos: odo + fuel receipt + driver report together), seeds a
/// new draft via the normal odo/fuel-inheritance path, then opens the
/// existing Shift Form for the person to review and correct before saving.
function buildDraftShiftFromInbox(){
  const doneImages = state.inboxImages.filter(im=>im.status==='done');
  if(doneImages.length===0){ showToast('Chưa có ảnh nào phân tích xong.'); return; }

  let driverId = null, shiftTypeGuess = 'day', odoEndGuess = null, fuelAddedGuess = null,
      fuelUnitPriceGuess = null, maintenanceAmount = 0, maintenanceNotes = [], driverReportTripsTotal = null,
      siteNameGuess = '', summaryNotes = [];

  for(const im of doneImages){
    const ex = im.extracted || {};
    if(im.category==='odometer' && ex.odoEnd) odoEndGuess = ex.odoEnd;
    if(im.category==='fuel'){
      if(ex.fuelAddedLiters) fuelAddedGuess = ex.fuelAddedLiters;
      if(ex.suggestedFuelUnitPrice) fuelUnitPriceGuess = ex.suggestedFuelUnitPrice;
    }
    if(im.category==='maintenance'){
      if(ex.totalAmount) maintenanceAmount += ex.totalAmount;
      if(ex.maintenanceItemsText) maintenanceNotes.push(ex.maintenanceItemsText);
    }
    if(im.category==='driverReport'){
      if(ex.matchedDriverName){
        const matched = state.drivers.find(d=>d.name===ex.matchedDriverName);
        if(matched) driverId = matched.id;
      }
      if(ex.shiftType==='day' || ex.shiftType==='night') shiftTypeGuess = ex.shiftType;
      if(ex.totalTrips) driverReportTripsTotal = ex.totalTrips;
      if(ex.siteNameGuess) siteNameGuess = ex.siteNameGuess;
    }
    if(ex.rawSummary) summaryNotes.push(`[${INBOX_CATEGORY_LABELS[im.category]||im.category}] ${ex.rawSummary}`);
  }

  const dateStr = todayLocalDateStr();
  const driver = driverId ? driverById(driverId) : (state.drivers[0] || null);
  if(!driver){ showToast('Hãy thêm tài xế trước ở tab "Tài Xế".'); return; }

  const prev = findPreviousShift(dateStr, shiftTypeGuess, null);
  const policy = state.settings.costPolicies.active;

  const draft = {
    id: uid('shift'),
    isNew: true,
    date: dateStr,
    shiftType: shiftTypeGuess,
    driverId: driver.id,
    driverNameSnapshot: driver.name,
    status: 'active',
    odoStart: prev ? prev.odoEnd : 0,
    odoEnd: odoEndGuess !== null ? odoEndGuess : 0,
    fuelStart: prev ? prev.fuelEnd : 0,
    fuelEnd: 0,
    fuelAdded: fuelAddedGuess !== null ? fuelAddedGuess : 0,
    fuelUnitPrice: fuelUnitPriceGuess !== null ? fuelUnitPriceGuess : 0,
    baseSalaryAllocation: policy.baseSalary ? dailyBaseSalary(driver) : 0,
    foodAllowance: policy.food ? driver.dailyFoodAllowance : 0,
    housingAllocation: policy.housing ? dailyHousing(driver, dateStr) : 0,
    incidentalCost: maintenanceAmount,
    incidentalNotes: maintenanceNotes.length ? ('[Đọc từ hoá đơn] ' + maintenanceNotes.join(' | ')) : '',
    advanceAmount: 0,
    notes: summaryNotes.length ? summaryNotes.join(' | ').slice(0,600) : '',
    siteLogs: driverReportTripsTotal ? [{ siteName: siteNameGuess||'', volumePerTrip:0, materialUnitPrice:0, trips:driverReportTripsTotal, driverWagePerTrip:0, wageQualifyingTripsOverride:null }] : []
  };

  state.draftShift = draft;
  state.currentTab = 'shifts';
  state.view = 'form';
  state.inboxImages = []; // clear the inbox batch once turned into a draft
  renderAll();
  showToast('Đã tạo dự thảo từ ảnh — kiểm tra kỹ rồi bấm Lưu Ca Này.');
}

function handleInboxFiles(fileList){
  const files = Array.from(fileList || []);
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = () => {
      const entry = { id: uid('img'), dataUrl: reader.result, status: 'processing', category: null, extracted: {}, errorMessage: '' };
      state.inboxImages.push(entry);
      if(state.currentTab==='inbox') renderInbox();
      processInboxImage(entry);
    };
    reader.readAsDataURL(file);
  });
  if(state.currentTab==='inbox') renderInbox();
}

  const ex = im.extracted || {};

    rows = `<div class="kv"><span>Số Km đọc được</span><span>${ex.odoEnd ?? '(không đọc được)'}</span></div>`;
  } else if(im.category==='fuel'){
    rows = `

      <div class="kv"><span>Tổng tiền hoá đơn</span><span>${ex.totalAmount ? fmtVND(ex.totalAmount) : '(không đọc được)'}</span></div>
      <div class="kv"><span>Đơn giá gợi ý</span><span>${ex.suggestedFuelUnitPrice ? fmtVND(ex.suggestedFuelUnitPrice) : '—'}</span></div>`;
  } else if(im.category==='maintenance'){
    rows = `
      <div class="kv"><span>Tổng tiền hoá đơn</span><span>${ex.totalAmount ? fmtVND(ex.totalAmount) : '(không đọc được)'}</span></div>
      <div class="hint" style="margin-top:4px;">${escapeHtml(ex.maintenanceItemsText||'(không đọc được danh mục)')}</div>`;
  } else if(im.category==='driverReport'){
    rows = `
      <div class="kv"><span>Tài xế nhận diện</span><span>${escapeHtml(ex.matchedDriverName || '(không khớp tên nào)')}</span></div>
      <div class="kv"><span>Tổng số chuyến đọc được</span><span>${ex.totalTrips ?? '(không đọc được)'}</span></div>
      <div class="kv"><span>Ca</span><span>${ex.shiftType ? shiftTypeLabel(ex.shiftType) : '(không rõ)'}</span></div>

// ========================= STRATEGY ASSISTANT (7/30-DAY AI ANALYSIS) =========================
// Gathers the last 7 or 30 days of operating data into a compact summary,
// sends it to Gemini with an accountant/logistics-optimization persona,
// and renders the structured JSON insights it returns as organized cards:
// fuel-efficiency warnings per driver, most/least profitable site, a
// maintenance-scheduling suggestion based on cumulative km since the last
// logged repair, and free-form expert remarks.

/// Builds the compact numeric summary sent to Gemini — deliberately NOT
/// the full raw shift log (keeps the prompt small/fast/cheap); every
/// number here is already computed by the app's own verified formulas.
function aggregateStrategyData(from, to){
  const inRange = state.shifts.filter(sh=>sh.date>=from && sh.date<=to);
  const periodDays = Math.max(1, Math.round((new Date(to+'T00:00:00') - new Date(from+'T00:00:00'))/86400000) + 1);

  const byDriver = {};
  for(const sh of inRange){
    const name = driverById(sh.driverId)?.name || sh.driverNameSnapshot || '(chưa gán tài xế)';
    if(!byDriver[name]) byDriver[name] = { km:0, fuelLiters:0, fuelCost:0, shifts:0 };
    byDriver[name].km += shiftOdoDriven(sh);
    byDriver[name].fuelLiters += shiftFuelConsumed(sh);
    byDriver[name].fuelCost += shiftFuelCost(sh);
    byDriver[name].shifts += 1;
  }
  const driverStats = Object.entries(byDriver).map(([name,d])=>({
    name, shifts:d.shifts, totalKm: Math.round(d.km), totalFuelLiters: Math.round(d.fuelLiters),
    fuelPerKm: d.km>0 ? +(d.fuelLiters/d.km).toFixed(3) : 0
  }));

  const siteRanking = computeSiteRanking(inRange).map(s=>({
    name: s.name, revenue: Math.round(s.revenue), trips: s.trips, revenuePerTrip: Math.round(s.revenuePerTrip)
  }));

  const sortedRepairs = [...state.repairs].sort((a,b)=>b.date.localeCompare(a.date));
  const lastRepair = sortedRepairs[0] || null;
  const kmSinceLastRepair = lastRepair
    ? Math.round(state.shifts.filter(sh=>sh.date>lastRepair.date).reduce((s,sh)=>s+shiftOdoDriven(sh),0))
    : Math.round(state.shifts.reduce((s,sh)=>s+shiftOdoDriven(sh),0));

  const gTotal = computeResultsGroup(inRange);

  return {
    periodDays, from, to,
    totalRevenue: Math.round(gTotal.revenue),
    totalCost: Math.round(gTotal.opCost),
    grossProfit: Math.round(gTotal.grossProfit),
    totalKm: Math.round(gTotal.totalKm),
    totalTrips: gTotal.totalTrips,
    driverStats,
    siteRanking,
    lastRepairDate: lastRepair ? lastRepair.date : null,
    lastRepairItem: lastRepair ? lastRepair.item : null,
    kmSinceLastRepair
  };
}

/// Text-only Gemini call (no image) — same API, just omits the inline_data
/// image part.
async function callGeminiText(promptText){
  const apiKey = (state.settings.geminiApiKey || '').trim();
  if(!apiKey){ const e = new Error('Chưa có Gemini API Key — vào tab Cài Đặt để thêm.'); e.code='MISSING_KEY'; throw e; }

  const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const requestBody = {
    contents: [{ parts: [{ text: promptText }] }],
    generationConfig: { responseMimeType: 'application/json', temperature: 0.3 }
  };

  let response;
  try {
    response = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(requestBody) });
  } catch(networkErr) {
    const e = new Error('Không kết nối được tới Gemini — kiểm tra mạng.'); e.code='NETWORK'; throw e;
  }
  if(!response.ok){
    let detail = '';
    try{ detail = (await response.json()).error?.message || ''; }catch(e){}
    const e = new Error(`Gemini báo lỗi (${response.status})${detail ? ': ' + detail : ''}`); e.code='HTTP_'+response.status; throw e;
  }
  const payload = await response.json();
  const textOut = payload?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!textOut){ const e = new Error('Gemini không trả về nội dung.'); e.code='EMPTY'; throw e; }
  try { return JSON.parse(textOut); }
  catch(parseErr){ const e = new Error('Gemini trả về dữ liệu không đọc được.'); e.code='PARSE'; throw e; }
}

async function runStrategyAnalysis(){
  const sa = state.strategyAnalysis;
  sa.loading = true; sa.error = null;
  renderStrategy();
  try{
    const summary = aggregateStrategyData(sa.from, sa.to);
    if(summary.driverStats.length===0 && summary.siteRanking.length===0){
      sa.error = 'Chưa có ca nào trong khoảng thời gian này để phân tích.';
      sa.loading = false;
      renderStrategy();
      return;
    }
    const prompt = buildStrategyPrompt(summary);
    const result = await callGeminiText(prompt);
    sa.result = result;
    sa.generatedAt = new Date().toISOString();
  }catch(e){
    sa.error = e.message || 'Không phân tích được — thử lại.';
  }
  sa.loading = false;
  renderStrategy();
}

// ========================= RESULTS / DASHBOARD TAB =========================

function currentMonthRange(){
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  const last = new Date(now.getFullYear(), now.getMonth()+1, 0);
  const toLocalISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return { from: toLocalISO(first), to: toLocalISO(last) };
}

function computeResultsGroup(shifts){
  const revenue = shifts.reduce((s,sh)=>s+shiftTotalRevenue(sh),0);
  const opCost = shifts.reduce((s,sh)=>s+shiftTotalCost(sh),0);
  const grossProfit = revenue - opCost;
  const margin = revenue>0 ? (grossProfit/revenue*100) : 0;
  const totalKm = shifts.reduce((s,sh)=>s+shiftOdoDriven(sh),0);
  const totalTrips = shifts.reduce((s,sh)=>s+(sh.siteLogs||[]).reduce((x,l)=>x+(Number(l.trips)||0),0),0);
  const fuelLiters = shifts.reduce((s,sh)=>s+shiftFuelConsumed(sh),0);
  const fuelCost = shifts.reduce((s,sh)=>s+shiftFuelCost(sh),0);
  const fuelPerKm = totalKm>0 ? fuelCost/totalKm : 0;
  const revenuePerKm = totalKm>0 ? revenue/totalKm : 0;
  const profitPerTrip = totalTrips>0 ? grossProfit/totalTrips : 0;
  return { revenue, opCost, grossProfit, margin, totalKm, totalTrips, fuelLiters, fuelCost, fuelPerKm, revenuePerKm, profitPerTrip };
}

function fmtShortVND(n){
  n = Number(n)||0;
  const abs = Math.abs(n);
  if(abs>=1000000) return (n/1000000).toLocaleString('vi-VN',{maximumFractionDigits:1})+'tr';
  if(abs>=1000) return (n/1000).toLocaleString('vi-VN',{maximumFractionDigits:0})+'k';
  return Math.round(n).toLocaleString('vi-VN');
}

// ---- Per-day breakdown within the selected range ----
/// Break-even: how many trips this period needs, at the period's own
/// average revenue/trip and fuel-cost/trip, to cover its fixed costs
/// (allocated base salary + housing across all shifts in range, plus the
/// road-fee figure already resolved for the period).
/// Full break-even analysis for the period, restructured per proper
/// transport-accounting practice:
///  - Revenue & trip volume split by Ca Ngày / Ca Đêm (production overview)
///  - Costs split into FIXED (doesn't move with trip count: allocated base
///    salary, housing, monthly road fee, repair/depreciation booked this
///    period) vs VARIABLE (moves with each trip run: fuel, trip wage, food
///    allowance, incidental cost)
///  - Gross profit = Revenue − Variable cost (the "contribution margin"
///    pool available to cover fixed cost)
///  - Break-even trips = Fixed cost ÷ average contribution margin per trip
function computeBreakEvenDetailed(inRangeShifts, roadFee, repairTotal){
  const dayShifts = inRangeShifts.filter(sh=>sh.shiftType==='day');
  const nightShifts = inRangeShifts.filter(sh=>sh.shiftType==='night');
  const tripsOf = shifts => shifts.reduce((s,sh)=>s+(sh.siteLogs||[]).reduce((x,l)=>x+(Number(l.trips)||0),0),0);
  const revenueOf = shifts => shifts.reduce((s,sh)=>s+shiftTotalRevenue(sh),0);

  const dayTrips = tripsOf(dayShifts), nightTrips = tripsOf(nightShifts);
  const dayRevenue = revenueOf(dayShifts), nightRevenue = revenueOf(nightShifts);
  const totalTrips = dayTrips + nightTrips;
  const totalRevenue = dayRevenue + nightRevenue;

  const fixedCost = inRangeShifts.reduce((s,sh)=>s+(Number(sh.baseSalaryAllocation)||0)+(Number(sh.housingAllocation)||0),0) + roadFee + repairTotal;
  const variableCost = inRangeShifts.reduce((s,sh)=>s+shiftFuelCost(sh)+shiftTotalTripWage(sh)+(Number(sh.foodAllowance)||0)+(Number(sh.incidentalCost)||0),0);
  const grossProfit = totalRevenue - variableCost;

  const base = { dayTrips, nightTrips, dayRevenue, nightRevenue, totalTrips, totalRevenue, fixedCost, variableCost, grossProfit, roadFee, repairTotal };

  if(totalTrips===0) return { ...base, breakEvenTrips:null, note:'Chưa có chuyến nào trong kỳ để tính điểm hoà vốn.' };
  const avgRevenuePerTrip = totalRevenue/totalTrips;
  const avgVariableCostPerTrip = variableCost/totalTrips;
  const marginPerTrip = avgRevenuePerTrip - avgVariableCostPerTrip;
  if(marginPerTrip<=0) return { ...base, avgRevenuePerTrip, avgVariableCostPerTrip, breakEvenTrips:null, note:'Doanh thu/chuyến hiện đang thấp hơn chi phí biến đổi/chuyến — không thể hoà vốn với cơ cấu giá hiện tại, dù chạy bao nhiêu chuyến.' };
  const breakEvenTrips = Math.ceil(fixedCost/marginPerTrip);
  return { ...base, avgRevenuePerTrip, avgVariableCostPerTrip, marginPerTrip, breakEvenTrips, actualTrips: totalTrips, surplusTrips: totalTrips-breakEvenTrips, note:null };
}

/// Cost-per-km for each of the last N calendar months (ALL shifts, not
/// filtered by the Results tab's selected period — a trend needs its own
/// fixed time axis) — surfaces whether operating cost is drifting up.
function computeCostPerKmTrend(monthsBack){
  const now = new Date();
  const buckets = [];
  for(let i=monthsBack-1;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const label = `${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    const monthStart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    const monthEndDate = new Date(d.getFullYear(), d.getMonth()+1, 0);
    const monthEnd = `${monthEndDate.getFullYear()}-${String(monthEndDate.getMonth()+1).padStart(2,'0')}-${String(monthEndDate.getDate()).padStart(2,'0')}`;
    const shiftsInMonth = state.shifts.filter(sh=>sh.date>=monthStart && sh.date<=monthEnd);
    const totalKm = shiftsInMonth.reduce((s,sh)=>s+shiftOdoDriven(sh),0);
    const totalCost = shiftsInMonth.reduce((s,sh)=>s+shiftTotalCost(sh),0);
    buckets.push({ label, costPerKm: totalKm>0 ? totalCost/totalKm : 0, totalKm, totalCost });
  }
  return buckets;
}

function computeDailyBreakdown(inRangeShifts){
  const byDate = {};
  for(const sh of inRangeShifts){
    if(!byDate[sh.date]) byDate[sh.date] = [];
    byDate[sh.date].push(sh);
  }
  return Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const shifts = byDate[date];
    const revenue = shifts.reduce((s,sh)=>s+shiftTotalRevenue(sh),0);
    const cost = shifts.reduce((s,sh)=>s+shiftTotalCost(sh),0);
    return { date, revenue, cost, profit: revenue-cost, shiftCount: shifts.length };
  });
}

function computeSiteRanking(inRangeShifts){
  const bySite = {};
  for(const sh of inRangeShifts){
    for(const s of (sh.siteLogs||[])){
      const name = (s.siteName||'(chưa đặt tên)').trim() || '(chưa đặt tên)';
      if(!bySite[name]) bySite[name] = { name, revenue:0, trips:0 };
      bySite[name].revenue += siteRevenue(s);

/// Full drill-down for ONE construction site within [from, to]: total
/// billed (revenue), total collected from the client/contractor, still
/// owed, a driver × trips breakdown, and a day-by-day activity log —
/// mirrors the original spreadsheet's per-site cash-flow view.
function computeSiteDetail(siteName, from, to){
  // Trip/driver activity respects the requested period (useful for browsing
  // a specific window of work), but every FINANCIAL total (billed,
  // collected, owed) is always ALL-TIME — debt is a running balance, not a
  // period concept, and mixing the two produced inconsistent "owed"
  // numbers between this view and the Đối Tác & Công Nợ overview.
  const inRange = state.shifts.filter(sh=>sh.date>=from && sh.date<=to);
  const tripsByDriver = {};
  const dailyActivity = [];
  for(const sh of inRange){
    const driverName = driverById(sh.driverId)?.name || sh.driverNameSnapshot || '(chưa gán tài xế)';
    for(const s of (sh.siteLogs||[])){
      const name = (s.siteName||'(chưa đặt tên)').trim() || '(chưa đặt tên)';
      if(name !== siteName) continue;
      const rev = siteRevenue(s);
      const cost = siteWageTotal(s);
      if(!tripsByDriver[driverName]) tripsByDriver[driverName] = { trips:0, revenue:0, cost:0 };
      tripsByDriver[driverName].trips += Number(s.trips)||0;
      tripsByDriver[driverName].revenue += rev;
      tripsByDriver[driverName].cost += cost;
      dailyActivity.push({ date: sh.date, driverName, trips: Number(s.trips)||0, volumePerTrip: s.volumePerTrip||0, revenue: rev, cost });
    }
  }
  dailyActivity.sort((a,b)=>a.date.localeCompare(b.date));

  const allTimeBilledEvents = computeAllSiteBilledEvents()[siteName] || [];
  const billed = allTimeBilledEvents.reduce((s,e)=>s+e.amount,0);
  const payments = state.sitePayments.filter(p=>p.siteName===siteName).sort((a,b)=>a.date.localeCompare(b.date));
  const collected = payments.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const owed = billed - collected;
  return { siteName, billed, collected, owed, tripsByDriver, dailyActivity, payments };
}

// ========================= PARTNERS & RECEIVABLES (ALL-TIME AR AGING) =========================
// Distinct from the period-filtered "Công Nợ Công Trình" block above (which
// answers "how much did I bill THIS period"), this module answers "how
// much is CURRENTLY owed, and since when" — a running balance that never
// resets with the Results date filter, computed with proper FIFO ageing
// (each payment received pays off the OLDEST outstanding billed amount
// first, exactly like real accounts-receivable bookkeeping) plus a
// reliability rating per business partner built from that ageing.

const ALL_TIME_FROM = '1900-01-01';
const ALL_TIME_TO = '2999-12-31';

/// Every construction site's full, all-time list of billed amounts —
/// one entry per shift-site contribution, dated by the shift's date.
function computeAllSiteBilledEvents(){
  const map = {};
  for(const sh of state.shifts){
    for(const s of (sh.siteLogs||[])){
      const name = (s.siteName||'(chưa đặt tên)').trim() || '(chưa đặt tên)';
      const rev = siteRevenue(s);
      if(rev<=0) continue;
      if(!map[name]) map[name] = [];
      map[name].push({ date: sh.date, amount: rev });
    }
  }
  return map;
}

/// FIFO ageing: applies the total pool of payments received against the
/// oldest billed amounts first. Returns which billed amounts remain
/// (fully or partially) unpaid, the oldest unpaid billing date, and the
/// resulting total still owed.
function computeFifoAging(billedEvents, paymentEvents){
  const billed = [...billedEvents].sort((a,b)=>a.date.localeCompare(b.date)).map(e=>({date:e.date, remaining:e.amount}));
  let paymentPool = paymentEvents.reduce((s,p)=>s+(Number(p.amount)||0),0);
  for(const b of billed){
    if(paymentPool<=0) break;
    const applied = Math.min(paymentPool, b.remaining);
    b.remaining -= applied;
    paymentPool -= applied;
  }
  const unpaidBuckets = billed.filter(b=>b.remaining > 0.5);
  const oldestUnpaidDate = unpaidBuckets.length ? unpaidBuckets[0].date : null;
  const totalOwed = unpaidBuckets.reduce((s,b)=>s+b.remaining,0);
  const today = todayLocalDateStr();
  const daysOutstanding = oldestUnpaidDate ? Math.floor((new Date(today) - new Date(oldestUnpaidDate)) / 86400000) : 0;
  return { totalOwed, oldestUnpaidDate, daysOutstanding, unpaidBuckets };
}

/// Picks the most-frequently-used partner name among a site's logged
/// payments — sites are usually tied to one ongoing contractor, so this
/// is a reliable proxy without needing a separate "assign partner" step.
function derivePartnerForSite(siteName){
  const payments = state.sitePayments.filter(p=>p.siteName===siteName);
  const counts = {};
  payments.forEach(p=>{ const n=(p.partnerName||'').trim(); if(n) counts[n] = (counts[n]||0)+1; });
  const names = Object.keys(counts);
  if(names.length===0) return null;
  names.sort((a,b)=>counts[b]-counts[a]);
  return names[0];
}

/// Deterministic reliability rating from the ageing result — the more
/// overdue the oldest unpaid amount, the higher the risk flag.
function partnerReliabilityRating(daysOutstanding, totalOwed){
  if(totalOwed <= 0) return { label:'Tốt — Không nợ', className:'good' };
  if(daysOutstanding <= 30) return { label:'Bình thường', className:'ok' };
  if(daysOutstanding <= 60) return { label:'Cần chú ý', className:'watch' };
  if(daysOutstanding <= 90) return { label:'Cảnh báo — Nợ lâu', className:'warn' };
  return { label:'Rủi ro cao — Nợ quá hạn', className:'risk' };
}

/// Full all-time roster of business partners derived from every site's
/// billed history + payment log, each with FIFO-aged outstanding balance,
/// payment-history statistics, and a reliability rating.
function computePartnersOverview(){
  const siteBilled = computeAllSiteBilledEvents();
  const partners = {};

  for(const siteName of Object.keys(siteBilled)){
    const partnerName = derivePartnerForSite(siteName) || siteName;
    const payments = state.sitePayments.filter(p=>p.siteName===siteName).map(p=>({date:p.date, amount:Number(p.amount)||0}));
    const aging = computeFifoAging(siteBilled[siteName], payments);
    const billedTotal = siteBilled[siteName].reduce((s,e)=>s+e.amount,0);
    const collectedTotal = payments.reduce((s,p)=>s+p.amount,0);
    const lastPaymentDate = payments.length ? payments.map(p=>p.date).sort().slice(-1)[0] : null;

    if(!partners[partnerName]) partners[partnerName] = {
      name: partnerName, sites: [], totalBilled:0, totalCollected:0, totalOwed:0,
      oldestUnpaidDate: null, paymentCount: 0, lastPaymentDate: null
    };
    const P = partners[partnerName];
    P.sites.push({ siteName, billed: billedTotal, collected: collectedTotal, owed: aging.totalOwed, daysOutstanding: aging.daysOutstanding });
    P.totalBilled += billedTotal;
    P.totalCollected += collectedTotal;
    P.totalOwed += aging.totalOwed;
    P.paymentCount += payments.length;
    if(aging.oldestUnpaidDate && (!P.oldestUnpaidDate || aging.oldestUnpaidDate < P.oldestUnpaidDate)) P.oldestUnpaidDate = aging.oldestUnpaidDate;
    if(lastPaymentDate && (!P.lastPaymentDate || lastPaymentDate > P.lastPaymentDate)) P.lastPaymentDate = lastPaymentDate;
  }

  const today = todayLocalDateStr();
  return Object.values(partners).map(P=>{
    const daysOutstanding = P.oldestUnpaidDate ? Math.floor((new Date(today)-new Date(P.oldestUnpaidDate))/86400000) : 0;
    return { ...P, daysOutstanding, rating: partnerReliabilityRating(daysOutstanding, P.totalOwed) };
  }).sort((a,b)=>b.totalOwed-a.totalOwed);
}

// ---- Strategic advisory engine (deterministic rules on real numbers) ----
function generateInsights({gDay, gNight, gTotal, finalNetProfit, repairTotal, roadFee, inRangeShifts, from, to, siteRanking}){
  const insights = [];

  // 1. Final profit status
  if(gTotal.revenue===0 && inRangeShifts.length===0){
    insights.push({icon:'ℹ️', title:'Chưa có dữ liệu trong kỳ này', text:'Hãy chọn lại khoảng thời gian có ca đã ghi, hoặc ghi ca mới ở tab "Ca Làm Việc".'});
    return insights;
  }
  if(finalNetProfit < 0){
    insights.push({icon:'🔴', title:'Đang LỖ thực tế trong kỳ này', text:`Lợi nhuận gộp vận hành ${fmtVND(gTotal.grossProfit)} không đủ bù chi phí sửa chữa (${fmtVND(repairTotal)}) và chi phí luật đường (${fmtVND(roadFee)}). Lỗ ròng ${fmtVND(Math.abs(finalNetProfit))}. Cần tăng số chuyến/doanh thu, hoặc xem lại chi phí luật đường có đàm phán giảm được không.`});
  } else {
    const marginFinal = gTotal.revenue>0 ? (finalNetProfit/gTotal.revenue*100) : 0;
    insights.push({icon:'🟢', title:'Đang có LÃI thực tế trong kỳ này', text:`Sau khi trừ hết sửa chữa và luật đường, lãi ròng ${fmtVND(finalNetProfit)}, tương đương ${marginFinal.toFixed(1)}% trên doanh thu. Duy trì nhịp độ vận hành hiện tại.`});
  }

  // 2. Day vs Night margin comparison
  if(gDay.revenue>0 && gNight.revenue>0){
    const diff = gNight.margin - gDay.margin;
    if(Math.abs(diff) >= 8){
      const better = diff>0 ? 'Ca Đêm' : 'Ca Ngày';
      const betterM = diff>0 ? gNight.margin : gDay.margin;
      const worseM = diff>0 ? gDay.margin : gNight.margin;
      insights.push({icon: diff>0?'🌙':'☀️', title:`${better} đang hiệu quả hơn rõ rệt`, text:`Biên lợi nhuận ${better} đạt ${betterM.toFixed(1)}%, cao hơn ca còn lại (${worseM.toFixed(1)}%). Nếu tài xế và công trình cho phép, nên ưu tiên sắp thêm ${better.toLowerCase()}.`});
    }
  }

  // 3. Fixed cost burden ratio
  if(gTotal.revenue>0){
    const fixedRatio = (repairTotal+roadFee)/gTotal.revenue*100;
    if(fixedRatio >= 15){
      insights.push({icon:'⚠️', title:'Chi phí cố định đang chiếm tỷ trọng cao', text:`Sửa chữa + luật đường đang chiếm ${fixedRatio.toFixed(1)}% doanh thu trong kỳ. Nếu tỷ lệ này kéo dài, lợi nhuận thực tế sẽ khó dương. Cân nhắc tăng tần suất chạy xe để san đều chi phí cố định, hoặc kiểm tra lại các khoản sửa chữa có bất thường không.`});
    }
  }

  // 4. Utilization (operating days vs calendar days in range)
  const operatingDates = new Set(inRangeShifts.map(sh=>sh.date));
  const totalDaysInRange = Math.round((new Date(to+'T00:00:00') - new Date(from+'T00:00:00'))/86400000) + 1;
  if(totalDaysInRange > 0){
    const utilization = operatingDates.size/totalDaysInRange*100;
    if(utilization < 70){
      insights.push({icon:'📉', title:'Tỷ lệ ngày hoạt động còn thấp', text:`Xe chỉ có ca chạy ${operatingDates.size}/${totalDaysInRange} ngày trong kỳ (${utilization.toFixed(0)}%). Vì chi phí luật đường là cố định theo tháng dù chạy nhiều hay ít, tăng số ngày hoạt động sẽ giúp giảm chi phí cố định tính trên mỗi chuyến.`});
    }
  }

  // 5. Site profitability ranking
  if(siteRanking.length >= 2){
    const best = siteRanking[0], worst = siteRanking[siteRanking.length-1];
    if(best.revenuePerTrip > 0 && worst.revenuePerTrip < best.revenuePerTrip*0.7){
      insights.push({icon:'🏗️', title:'Chênh lệch hiệu quả giữa các công trình', text:`"${best.name}" đang cho doanh thu/chuyến cao nhất (${fmtVND(best.revenuePerTrip)}), trong khi "${worst.name}" thấp hơn nhiều (${fmtVND(worst.revenuePerTrip)}). Nếu được chọn, nên ưu tiên nhận thêm việc ở công trình có doanh thu/chuyến cao.`});
    }
  }

  if(insights.length === 0){
    insights.push({icon:'✅', title:'Các chỉ số đang cân bằng', text:'Không phát hiện điểm bất thường rõ rệt trong kỳ này. Tiếp tục theo dõi định kỳ để phát hiện sớm biến động.'});
  }

  return insights;
}

function openSiteDetail(siteName, from, to){
  const app = document.getElementById('app');
  const det = computeSiteDetail(siteName, from, to);
  const driverRows = Object.entries(det.tripsByDriver).sort((a,b)=>b[1].trips-a[1].trips);

  const contract = state.siteContracts.find(c=>c.siteName===siteName) || null;
  const contractValue = contract ? Number(contract.totalContractValue)||0 : 0;
  const contractPercent = contractValue>0 ? Math.min(999, (det.billed/contractValue*100)) : null;
  const contractRemaining = contractValue>0 ? Math.max(0, contractValue-det.billed) : null;

  app.innerHTML = `
    <section class="group">
      <button class="btn btn-ghost btn-sm" id="siteDetailBackBtn">← Quay Lại Kết Quả</button>
    </section>

    <section class="group">
      <h3>🏗️ ${escapeHtml(siteName)}</h3>
      <div class="card">
        <div class="summary-row"><span>Tổng tiền công (đã chạy)</span><span class="val">${fmtVND(det.billed)}</span></div>
        <div class="summary-row"><span>Đã thu về</span><span class="val">${fmtVND(det.collected)}</span></div>
        <div class="summary-row total"><span>${det.owed>0?'CÒN NỢ':'ĐÃ THU ĐỦ (DƯ)'}</span><span class="val" style="color:${det.owed>0?'var(--loss)':'var(--profit)'}">${fmtVND(Math.abs(det.owed))}</span></div>
      </div>
    </section>

    <section class="group">
      <h3>📑 Giá Trị Hợp Đồng Công Trình</h3>
      <div class="card">
        <div class="field" style="margin-bottom:${contractValue>0?'14px':'0'};">
          <label>Tổng giá trị hợp đồng đã ký (để trống nếu chưa có/không cố định)</label>
          <input type="text" inputmode="decimal" id="contract_value">
        </div>
        ${contractValue>0 ? `
        <div class="summary-row"><span>Đã thực hiện (toàn bộ, không tính theo kỳ)</span><span class="val">${fmtVND(det.billed)}</span></div>
        <div class="summary-row"><span>Tiến độ hoàn thành</span><span class="val">${contractPercent.toFixed(1)}%</span></div>
        <div class="summary-row total" style="margin-bottom:0;"><span>Còn lại theo hợp đồng</span><span class="val">${fmtVND(contractRemaining)}</span></div>
        ` : ''}
      </div>
      <div class="hint" style="margin-top:8px;">Dùng để biết công trình này sắp hết khối lượng hợp đồng chưa, để chủ động tìm mối mới trước khi xe nằm không.</div>
      <button class="btn btn-ghost btn-block" id="saveContractBtn" style="margin-top:10px;">Lưu Giá Trị Hợp Đồng</button>
    </section>

    <section class="group">
      <h3>Tài Xế Chạy Công Trình Này</h3>
      <div class="card dash-wrap" style="padding:0;">
        <table class="dash">
          <thead><tr><th>Tài Xế</th><th>Số Chuyến</th><th>Doanh Thu</th><th>Chi Phí</th></tr></thead>
          <tbody>
            ${driverRows.length===0 ? '<tr><td colspan="4">Chưa có dữ liệu</td></tr>' : driverRows.map(([name,d])=>`
              <tr><td>${escapeHtml(name)}</td><td>${d.trips}</td><td>${fmtVND(d.revenue)}</td><td>${fmtVND(d.cost)}</td></tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </section>

    <section class="group">
      <h3>Nhật Ký Từng Ngày</h3>
      <div class="card dash-wrap" style="padding:0;">
        <table class="dash">
          <thead><tr><th>Ngày</th><th>Tài Xế</th><th>Chuyến</th><th>Doanh Thu</th></tr></thead>
          <tbody>
            ${det.dailyActivity.length===0 ? '<tr><td colspan="4">Chưa có dữ liệu</td></tr>' : det.dailyActivity.map(a=>`
              <tr><td>${formatDateVN(a.date)}</td><td>${escapeHtml(a.driverName)}</td><td>${a.trips}</td><td>${fmtVND(a.revenue)}</td></tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </section>

    <div class="hint" style="margin:0 16px 16px;">Ghi nhận khoản đã thu tiền từ đối tác được thực hiện ở màn hình <strong>Chi Tiết Đối Tác</strong> (mục Đối Tác &amp; Công Nợ) — vì một đối tác có thể phụ trách nhiều công trình, dòng tiền thu về được quản lý tập trung tại đó.</div>
