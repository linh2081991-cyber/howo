// ========================= PRE-PROJECT APPRAISAL MODULE =========================
// "BẢNG THẨM ĐỊNH VÀ SO SÁNH HIỆU QUẢ CÔNG TRÌNH TRƯỚC KHI NHẬN CHẠY".
// Fully isolated from the shift log / P&L engine: it only READS existing
// data through the existing getters (shiftFuelConsumed, shiftOdoDriven,
// chronoKey) to pull the fleet's real historical fuel efficiency — it
// never writes into state.shifts, never touches a single shift record,
// and lives in its own separate state array + Firestore collection
// (state.siteAppraisals / 'siteAppraisals'). None of the P&L, fuel-cost,
// or debt-offset formulas above are read from or altered by anything in
// this section.

/// Most recent ca with a real đơn giá dầu entered — used as the fallback
/// "real-time" fuel price when Ông Chủ hasn't set one on the appraisal
/// screen yet.
function latestKnownFuelUnitPrice(){
  const priced = state.shifts.filter(sh=>Number(sh.fuelUnitPrice)>0);
  if(priced.length===0) return 0;
  priced.sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));
  return Number(priced[0].fuelUnitPrice)||0;
}
/// The price actually used to run a simulation: the "Đơn giá dầu dùng để
/// mô phỏng" field on the "Thẩm Định Công Trình" screen (tab Trợ Lý) takes
/// priority; if that's still 0 (never set), falls back to the most recent
/// real đơn giá dầu recorded on any ca.
function currentFuelUnitPriceForAppraisal(){
  return (Number(state.settings.currentFuelUnitPrice)||0) || latestKnownFuelUnitPrice();
}
/// Fleet-wide historical average lít/km, computed over every ca ever
/// logged (read-only — reuses the exact same shiftFuelConsumed/
/// shiftOdoDriven getters the frozen P&L math uses, never redefines them).
function historicalAvgFuelPerKm(){
  const shifts = operationalShifts();
  const totalKm = shifts.reduce((s,sh)=>s+shiftOdoDriven(sh),0);
  const totalFuel = shifts.reduce((s,sh)=>s+shiftFuelConsumed(sh),0);
  return totalKm>0 ? totalFuel/totalKm : 0;
}
/// Fleet-wide historical average lương/chuyến (đ/chuyến) — same read-only,
/// frozen-getter pattern as historicalAvgFuelPerKm(), weighted by số
/// chuyến thực tế (không phải trung bình cộng đơn giá nhập tay) nên phản
/// ánh đúng chi phí nhân công thực tế của đội xe. Dùng để mô phỏng công
/// trình dự kiến theo đúng "thông số hiện tại đang vận hành".
function historicalAvgWagePerTrip(){
  const shifts = operationalShifts();
  const totalTrips = shifts.reduce((s,sh)=>s+(sh.siteLogs||[]).reduce((x,l)=>x+(Number(l.trips)||0),0),0);
  const totalWage = shifts.reduce((s,sh)=>s+shiftTotalTripWage(sh),0);
  return totalTrips>0 ? totalWage/totalTrips : 0;
}
/// Fleet-wide historical average tiền ăn/ca (đ/ca) — trung bình trên các
/// ca Hoạt Động đã thực sự có ghi nhận tiền ăn, dùng cho mô phỏng công
/// trình dự kiến vì tiền ăn tính theo CA chứ không theo chuyến.
function historicalAvgFoodPerShift(){
  const shifts = operationalShifts().filter(sh=>sh.status==='active' && Number(sh.foodAllowance)>0);
  if(shifts.length===0) return 0;
  const total = shifts.reduce((s,sh)=>s+(Number(sh.foodAllowance)||0),0);
  return total/shifts.length;
}
/// Chi phí cố định THẬT, quy về mỗi THÁNG, lấy thẳng từ dữ liệu Ông Chủ
/// đã có sẵn trong app (không phải số áng chừng) — dùng để TỰ ĐỘNG điền
/// sẵn 3 mục khó đoán nhất khi thêm công trình dự kiến mới:
///  - Lương cứng: cộng dồn monthlyBaseSalary của TẤT CẢ tài xế đang hoạt
///    động (đúng số mỗi tháng thực trả, đọc thẳng từ hồ sơ tài xế).
///  - Nhà ở: tương tự, cộng dồn monthlyHousingBudget.
///  - Khấu hao/sửa chữa: lấy TOÀN BỘ sổ Sửa Chữa/Khấu Hao (chỉ phần chủ
///    xe chịu, đã trừ phần tài xế đền bù — đúng theo repairDriverResponsibleAmount
///    hiện có) rồi chia cho số tháng thực tế trải dài từ khoản ghi đầu
///    tiên tới khoản mới nhất, ra mức TRUNG BÌNH/THÁNG thực tế.
/// Đây chỉ là SỐ GỢI Ý MẶC ĐỊNH — Ông Chủ vẫn sửa lại tự do cho từng
/// công trình như bình thường, không có gì bị khoá cứng.
function historicalMonthlyFixedCostReal(){
  const activeDrivers = state.drivers.filter(d=>d.isActive!==false);
  const baseSalaryMonthly = activeDrivers.reduce((s,d)=>s+(Number(d.monthlyBaseSalary)||0),0);
  const housingMonthly = activeDrivers.reduce((s,d)=>s+(Number(d.monthlyHousingBudget)||0),0);

  let depreciationMonthly = 0;
  if(state.repairs.length>0){
    const sorted = [...state.repairs].sort((a,b)=>a.date.localeCompare(b.date));
    const ownerTotal = sorted.reduce((s,r)=>s+((Number(r.amount)||0)-repairDriverResponsibleAmount(r)),0);
    const firstMs = new Date(sorted[0].date).getTime();
    const lastMs = new Date(sorted[sorted.length-1].date).getTime();
    const monthsSpan = Math.max(1, (lastMs-firstMs)/(1000*60*60*24*30.44));
    depreciationMonthly = Math.max(0, ownerTotal)/monthsSpan;
  }
  return { baseSalaryMonthly, housingMonthly, depreciationMonthly };
}
/// Core simulation for ONE prospective project. Everything downstream
/// (list cards, side-by-side comparison, live preview in the editor) is
/// rendered from this single function so all three views can never drift
/// out of sync with each other.
///
/// Rebuilt to follow the EXACT same FIXED-vs-VARIABLE accounting logic
/// the app already uses for real kỳ vận hành (xem computeBreakEvenDetailed
/// ở Kết Quả Kinh Doanh):
///  - FIXED (đóng THEO THÁNG, không nhân theo chuyến): chi phí cố định
///    phân bổ (lương cứng + nhà + sửa chữa/khấu hao) CỘNG tiền luật
///    đường — tiền luật đường luôn là khoản đóng cả tháng ngoài đời
///    thật, KHÔNG PHẢI chi phí phát sinh mỗi chuyến.
///  - VARIABLE (di chuyển theo mỗi chuyến): dầu + lương chuyến — cả hai
///    đều lấy từ số liệu vận hành thực tế trung bình toàn đội xe
///    (historicalAvgFuelPerKm/historicalAvgWagePerTrip), không phải số
///    áng chừng, đúng yêu cầu "căn cứ vào thông số hiện tại đang vận
///    hành". Tiền ăn tính theo CA (không nhân theo chuyến).
///  - "Số chuyến dự tính chạy được trong ca" (estimatedTripsPerShift) là
///    chỉ số bản lề: nó quy đổi "số chuyến hoà vốn" thành "số CA hoà
///    vốn", rồi so với ngày công chuẩn/tháng (Cài Đặt) để biết công
///    trình này có KHẢ THI trong 1 tháng thực tế hay không — đây chính
///    là câu trả lời "lãi lỗ ra sao" mà Ông Chủ cần trước khi nhận việc.
function computeAppraisalMetrics(p){
  const fuelPerKm = historicalAvgFuelPerKm();
  const fuelPrice = currentFuelUnitPriceForAppraisal();
  // Số TB thực tế toàn đội xe — giữ lại CHỈ để hiển thị tham khảo (gợi ý
  // điền mặc định khi tạo công trình mới) — KHÔNG còn dùng trực tiếp
  // trong công thức lãi gộp/chuyến nữa. Từ nay lương chuyến + tiền ăn là
  // số Ông Chủ tự nhập riêng cho từng công trình (ap_wagePerTrip /
  // ap_foodPerTrip) để hạch toán đúng đặc thù công trình đó.
  const avgWagePerTripReal = historicalAvgWagePerTrip();
  const avgFoodPerShiftReal = historicalAvgFoodPerShift();

  const kmPerTrip = (Number(p.kmOneWay)||0) + (Number(p.kmReturn)||0);
  const fuelLitersPerTrip = fuelPerKm * kmPerTrip;
  const fuelCostPerTrip = fuelLitersPerTrip * fuelPrice; // "chi phí dầu thực tế" — tiêu hao TB thực tế × đơn giá hiện hành

  const grossCargoRevenuePerTrip = (Number(p.loadPerTrip)||0) * (Number(p.cargoUnitPrice)||0);
  const vatRate = (Number(state.settings.vatRatePercent)||0)/100;
  const netRevenuePerTrip = p.priceIncludesVat ? grossCargoRevenuePerTrip/(1+vatRate) : grossCargoRevenuePerTrip;

  const tripsPerShift = Math.max(0, Number(p.estimatedTripsPerShift)||0);
  const standardWorkDays = Number(state.settings.standardWorkDaysPerMonth)||0;
  const monthlyTripsEstimate = (tripsPerShift>0 && standardWorkDays>0) ? tripsPerShift*standardWorkDays : 0;

  // ----- Chi phí biến đổi/chuyến (đúng yêu cầu: dầu + lương chuyến + tiền
  // ăn + tiền luật đường), lấy trực tiếp từ các trường Ông Chủ tự nhập -----
  const wagePerTrip = Number(p.wagePerTripEstimate)||0;
  const foodPerTrip = Number(p.foodPerTripEstimate)||0;
  const roadFeeMonthly = Number(p.roadFeeEstimate)||0;
  // Tiền luật đường đóng THEO THÁNG ngoài đời thật, nên quy đổi về tương
  // đương mỗi chuyến bằng số chuyến ước tính chạy được cả tháng (số
  // chuyến/ca × ngày công chuẩn) — chỉ quy đổi được khi đã nhập đủ 2 số
  // này, nếu chưa thì tạm để 0 (sẽ nêu rõ ở hasRoadFeeBasis).
  const roadFeePerTripEquivalent = monthlyTripsEstimate>0 ? roadFeeMonthly/monthlyTripsEstimate : 0;

  const variableCostPerTrip = fuelCostPerTrip + wagePerTrip + foodPerTrip + roadFeePerTripEquivalent;
  // LỢI NHUẬN GỘP/CHUYẾN = Doanh thu thuần chưa VAT − (dầu + lương chuyến + tiền ăn + luật đường)
  const grossProfitPerTrip = netRevenuePerTrip - variableCostPerTrip;

  // Lãi gộp/ca = lãi gộp/chuyến (đã gồm đủ tiền ăn + luật đường quy đổi)
  // nhân số chuyến/ca — không trừ thêm lần nào nữa để tránh tính trùng.
  const grossProfitPerShift = tripsPerShift>0 ? (tripsPerShift*grossProfitPerTrip) : null;

  // ----- Chi phí CỐ ĐỊNH dự kiến phân bổ cho công trình (đóng THEO
  // THÁNG, không nhân theo chuyến) — liệt kê đủ các khoản mục cố định
  // app đang theo dõi cho cả đội xe (lương cứng, nhà ở, sửa chữa/khấu
  // hao) cộng thêm gốc+lãi vay ngân hàng, bảo hiểm, đăng kiểm/đăng ký và
  // một dòng "khác" dự phòng. Tiền luật đường KHÔNG cộng vào đây nữa vì
  // đã quy đổi thẳng vào lãi gộp/chuyến ở trên (tránh tính trùng 2 lần).
  const fixedBaseSalaryMonthly = Number(p.fixedBaseSalaryMonthly)||0;
  const fixedHousingMonthly = Number(p.fixedHousingMonthly)||0;
  const fixedDepreciationMonthly = Number(p.fixedDepreciationMonthly)||0;
  const fixedLoanMonthly = Number(p.fixedLoanMonthly)||0;
  const fixedInsuranceMonthly = Number(p.fixedInsuranceMonthly)||0;
  const fixedRegistrationMonthly = Number(p.fixedRegistrationMonthly)||0;
  const fixedOtherMonthly = Number(p.fixedOtherMonthly)||0;
  const fixedCostMonthly = fixedBaseSalaryMonthly + fixedHousingMonthly + fixedDepreciationMonthly
    + fixedLoanMonthly + fixedInsuranceMonthly + fixedRegistrationMonthly + fixedOtherMonthly;

  const breakEvenTrips = grossProfitPerTrip>0 ? Math.ceil(fixedCostMonthly/grossProfitPerTrip) : null;
  const breakEvenShifts = (breakEvenTrips!==null && tripsPerShift>0) ? Math.ceil(breakEvenTrips/tripsPerShift) : null;

  const feasible = (breakEvenShifts!==null && standardWorkDays>0) ? (breakEvenShifts<=standardWorkDays) : null;
  const shortfallShifts = (feasible===false) ? (breakEvenShifts-standardWorkDays) : 0;

  // Lợi nhuận dự kiến/tháng nếu chạy đủ ngày công chuẩn đã cấu hình ở
  // Cài Đặt — con số quyết định cuối cùng, không chỉ dừng ở "lãi/chuyến".
  const projectedMonthlyProfit = (grossProfitPerShift!==null && standardWorkDays>0)
    ? (standardWorkDays*grossProfitPerShift - fixedCostMonthly) : null;
  const roiPercent = (fixedCostMonthly>0 && projectedMonthlyProfit!==null)
    ? (projectedMonthlyProfit/fixedCostMonthly*100) : null;

  // Cờ cảnh báo: Ông Chủ chưa tự nhập lương chuyến/tiền ăn riêng cho công
  // trình này — nếu để trống (=0) thì lãi gộp/chuyến đang bị TÍNH CAO HƠN
  // thực tế vì thiếu 2 khoản chi phí quan trọng.
  const hasWageBasis = wagePerTrip>0;
  const hasFoodBasis = foodPerTrip>0;
  const hasRoadFeeBasis = monthlyTripsEstimate>0;

  return { fuelPerKm, fuelPrice, avgWagePerTripReal, avgFoodPerShiftReal, hasWageBasis, hasFoodBasis, hasRoadFeeBasis,
           kmPerTrip, fuelLitersPerTrip, fuelCostPerTrip, grossCargoRevenuePerTrip, netRevenuePerTrip,
           wagePerTrip, foodPerTrip, roadFeePerTripEquivalent, monthlyTripsEstimate,
           variableCostPerTrip, grossProfitPerTrip, tripsPerShift, grossProfitPerShift,
           roadFeeMonthly, fixedBaseSalaryMonthly, fixedHousingMonthly, fixedDepreciationMonthly,
           fixedLoanMonthly, fixedInsuranceMonthly, fixedRegistrationMonthly, fixedOtherMonthly, fixedCostMonthly,
           breakEvenTrips, breakEvenShifts, standardWorkDays, feasible, shortfallShifts,
           projectedMonthlyProfit, roiPercent };
}

/// Full-screen module: intro card (fuel efficiency + price source), the
/// list of saved prospective projects, and — once 2 or more exist — the
/// side-by-side comparison grid. Reached from a button in the "Trợ Lý" tab
/// and returns there via renderAll()+restoreMainScroll(), matching every
/// other full-screen drill-down in the app (openPartnerDetail, etc).
function renderProjectAppraisal(){
  state.strategyView = 'appraisal';
  const app = document.getElementById('app');
  const fuelPerKm = historicalAvgFuelPerKm();
  const fuelPrice = currentFuelUnitPriceForAppraisal();
  const avgFoodPerShift = historicalAvgFoodPerShift();
  const projects = state.siteAppraisals || [];
  const metricsById = {};
  projects.forEach(p=>{ metricsById[p.id] = computeAppraisalMetrics(p); });
  const hasKey = !!(state.settings.geminiApiKey || '').trim();
  const aa = state.appraisalAnalysis;

  // Ưu tiên xếp hạng theo lợi nhuận dự kiến/tháng (đã tính đủ số chuyến/
  // ca + toàn bộ chi phí cố định lẫn biến đổi) — chỉ số quyết định cuối
  // cùng. Công trình nào chưa nhập "số chuyến dự tính/ca" thì chưa đủ
  // căn cứ để so ở mức tháng, tạm xếp sau theo lãi gộp/chuyến.
  let bestId = null;
  const withMonthlyProfit = projects.filter(p=>metricsById[p.id].projectedMonthlyProfit!==null && metricsById[p.id].projectedMonthlyProfit>0);
  if(withMonthlyProfit.length>0){
    bestId = withMonthlyProfit.reduce((a,b)=>metricsById[b.id].projectedMonthlyProfit>metricsById[a.id].projectedMonthlyProfit?b:a).id;
  } else {
    const withTripProfit = projects.filter(p=>metricsById[p.id].grossProfitPerTrip>0);
    if(withTripProfit.length>0){
      bestId = withTripProfit.reduce((a,b)=>metricsById[b.id].grossProfitPerTrip>metricsById[a.id].grossProfitPerTrip?b:a).id;
    }
  }

  app.innerHTML = `
    <section class="group">
      <button class="btn btn-ghost btn-sm" id="appraisalBackBtn">← Quay Lại</button>
    </section>

    <section class="group">
      <h3>🧮 Thẩm Định &amp; So Sánh Công Trình Trước Khi Nhận</h3>
      <div class="card">
        <div class="hint" style="margin-bottom:8px;">Các thông số dưới đây lấy trực tiếp từ số liệu vận hành thực tế của đội xe (đã loại ca gần nhất còn thiếu dữ liệu) — dùng làm SỐ GỢI Ý mặc định khi thêm công trình mới. Mức tiêu hao dầu vẫn tự động áp cho mọi công trình; riêng tiền ăn, Ông Chủ tự nhập/sửa lại riêng cho từng công trình ở màn hình Thêm/Sửa để phản ánh đúng đặc thù công trình đó. Lương chuyến luôn do Ông Chủ tự nhập tay vì phụ thuộc từng cung đường, không lấy số bình quân.</div>
        <div class="summary-row"><span>Mức tiêu hao dầu trung bình thực tế</span><span class="val">${fuelPerKm>0?fuelPerKm.toFixed(2)+' lít/km':'Chưa có dữ liệu'}</span></div>
        <div class="summary-row"><span>Tiền ăn trung bình thực tế (số gợi ý)</span><span class="val">${avgFoodPerShift>0?fmtVND(avgFoodPerShift)+'/ca':'Chưa có dữ liệu'}</span></div>
        ${avgFoodPerShift<=0 ? `<div class="hint" style="margin-top:6px; color:var(--loss);">⚠️ Chưa đủ lịch sử vận hành để gợi ý tiền ăn trung bình — hãy tự nhập tay khoản này khi thêm công trình.</div>` : ''}
      </div>
      <div class="card" style="margin-top:8px;">
        <div class="field">
          <label>Đơn giá dầu dùng để mô phỏng (đ/lít)</label>
          <input type="text" inputmode="decimal" id="aps_fuelPrice">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Thuế suất VAT (%)</label>
          <input type="number" inputmode="decimal" id="aps_vatRate" value="${Number(state.settings.vatRatePercent)||0}">
        </div>
        <button class="btn btn-ghost btn-sm" id="saveAppraisalParamsBtn" style="margin-top:12px;">💾 Lưu Thông Số Mô Phỏng</button>
      </div>
      <div class="hint" style="margin-top:8px;">2 thông số này chỉ dùng riêng để mô phỏng thẩm định công trình ở đây, không ảnh hưởng tới đơn giá dầu ghi nhận trên từng ca thực tế. ${fuelPrice===0?'Chưa có đơn giá nào để mô phỏng — nhập ở trên rồi bấm "Lưu Thông Số Mô Phỏng".':'Để trống rồi Lưu sẽ khiến app tự lấy đơn giá dầu của ca gần nhất đã ghi.'}</div>
    </section>

    <section class="group">
      <h3>Danh Sách Công Trình Dự Kiến</h3>
      <div id="appraisalListWrap"></div>
      <button class="btn btn-accent btn-block" id="addAppraisalBtn" style="margin-top:10px;">+ Thêm Công Trình Dự Kiến</button>
    </section>

    ${projects.length>=2 ? `
    <section class="group">
      <h3>⚖️ So Sánh Song Song</h3>
      <div class="hint" style="margin-bottom:10px;">Công trình viền xanh có lãi gộp/chuyến cao nhất trong danh sách — cơ sở để Ông Chủ ưu tiên nhận việc.</div>
      <div class="appraisal-compare">
        ${projects.map(p=>{
          const m = metricsById[p.id];
          return `
          <div class="compare-card ${p.id===bestId?'best':''}">
            <h4>${escapeHtml(p.name||'(chưa đặt tên)')}${p.id===bestId?' <span class="rating-badge good">Đề xuất</span>':''}</h4>
            <div class="compare-row"><span>Doanh thu thuần/chuyến</span><span class="val">${fmtVND(m.netRevenuePerTrip)}</span></div>
            <div class="compare-row"><span>Dầu+lương chuyến+ăn+luật đường/chuyến</span><span class="val">${fmtVND(m.variableCostPerTrip)}</span></div>
            <div class="compare-row"><span>Lãi gộp/chuyến</span><span class="val" style="color:${m.grossProfitPerTrip>=0?'var(--profit)':'var(--loss)'}">${fmtVND(m.grossProfitPerTrip)}</span></div>
            <div class="compare-row"><span>Số chuyến/ca dự tính</span><span class="val">${m.tripsPerShift>0?m.tripsPerShift+' chuyến':'Chưa nhập'}</span></div>
            <div class="compare-row"><span>Số chuyến hoà vốn</span><span class="val">${m.breakEvenTrips!==null?m.breakEvenTrips+' chuyến':'Không hoà vốn'}</span></div>
            <div class="compare-row"><span>Số ca hoà vốn / tháng</span><span class="val">${m.breakEvenShifts!==null?m.breakEvenShifts+' ca':'—'}</span></div>
            <div class="compare-row"><span>Khả thi (so ngày công chuẩn ${m.standardWorkDays} ca)</span><span class="val">${m.feasible===null?'—':m.feasible?'<span class="rating-badge good">Khả thi</span>':`<span class="rating-badge warn">Thiếu ${m.shortfallShifts} ca</span>`}</span></div>
            <div class="compare-row"><span>Lợi nhuận dự kiến/tháng</span><span class="val" style="color:${m.projectedMonthlyProfit!==null&&m.projectedMonthlyProfit>=0?'var(--profit)':'var(--loss)'}">${m.projectedMonthlyProfit!==null?fmtVND(m.projectedMonthlyProfit):'—'}</span></div>
            <div class="compare-row"><span>ROI/tháng</span><span class="val">${m.roiPercent!==null?m.roiPercent.toFixed(1)+'%':'—'}</span></div>
          </div>`;
        }).join('')}
      </div>
    </section>` : ''}

    ${projects.length>=1 ? `
    <section class="group">
      <h3>🧑‍💼 Phân Tích Chuyên Gia</h3>
      <div class="hint" style="margin-bottom:10px;">AI đóng vai chuyên gia thẩm định vận tải, đọc đúng các số liệu đã tính ở trên (không tự bịa thêm) để nêu ưu/nhược điểm từng công trình và định hướng nên ưu tiên công trình nào — nếu số liệu chưa đủ rõ để kết luận chắc chắn, AI sẽ nói rõ thay vì đoán bừa.</div>
      ${!hasKey ? `<div class="banner">Chưa có Gemini API Key. Vào tab "⚙️ Cài Đặt" → mục "🤖 Trí Tuệ Nhân Tạo" → dán API Key để dùng được mục này.</div>` : ''}
      <button class="btn btn-accent btn-block ${aa.loading?'strategy-run-line':''}" id="runAppraisalAnalysisBtn" ${aa.loading?'disabled':''}>
        ${aa.loading ? 'Đang phân tích...' : '🧑‍💼 Phân Tích Chuyên Gia'}
        ${aa.loading ? HOWO_TRUCK_HTML : ''}
      </button>
      ${aa.loading ? `<div class="hint" id="appraisalRetryHint" style="margin-top:8px;"></div>` : ''}
      ${aa.generatedAt ? `<div class="hint" style="margin-top:8px;">Phân tích lúc: ${new Date(aa.generatedAt).toLocaleString('vi-VN')}</div>` : ''}
    </section>
    ${aa.error ? `<section class="group"><div class="card" style="color:var(--loss);">${escapeHtml(aa.error)}</div></section>` : ''}
    ${aa.result ? renderAppraisalAnalysisResult(aa.result) : ''}
    ` : ''}
  `;

  renderAppraisalList(metricsById);
  if(aa.loading){
    activeAppraisalTruckRun = startTruckRun(document.getElementById('runAppraisalAnalysisBtn'));
  } else {
    activeAppraisalTruckRun = null;
  }
  document.getElementById('appraisalBackBtn').addEventListener('click', ()=>{ renderAll(); restoreMainScroll(); });
  document.getElementById('addAppraisalBtn').addEventListener('click', ()=>openProjectAppraisalEditor(null));
  const runBtn = document.getElementById('runAppraisalAnalysisBtn');
  if(runBtn) runBtn.addEventListener('click', runAppraisalAnalysis);

  let apsFuelVal = state.settings.currentFuelUnitPrice;
  attachMoneyInput(document.getElementById('aps_fuelPrice'), apsFuelVal, v=>{ apsFuelVal=v; });
  document.getElementById('saveAppraisalParamsBtn').addEventListener('click', async ()=>{
    state.settings.currentFuelUnitPrice = apsFuelVal;
    state.settings.vatRatePercent = Number(document.getElementById('aps_vatRate').value)||0;
    await saveSettings();
    showToast('Đã lưu thông số mô phỏng.');
    renderProjectAppraisal();
  });
}

/// Renders the project cards into #appraisalListWrap — split out from
/// renderProjectAppraisal() so add/edit/delete can refresh just this list
/// without re-computing the whole comparison grid twice.
function renderAppraisalList(metricsById){
  const wrap = document.getElementById('appraisalListWrap');
  if(!wrap) return;
  const projects = state.siteAppraisals || [];
  if(projects.length===0){
    wrap.innerHTML = '<div class="empty"><div class="big">🏗️</div>Chưa có công trình dự kiến nào.<br>Bấm nút bên dưới để thêm.</div>';
    return;
  }
  wrap.innerHTML = projects.map(p=>{
    const m = metricsById[p.id] || computeAppraisalMetrics(p);
    return `
    <div class="card appraisal-project-card" data-id="${p.id}">
      <div class="driver-row">
        <strong>${escapeHtml(p.name||'(chưa đặt tên)')}</strong>
        <span>
          <button class="link-btn editAppraisalBtn" data-id="${p.id}">Sửa</button>
          <button class="link-btn delAppraisalBtn" data-id="${p.id}" style="color:var(--loss);">Xoá</button>
        </span>
      </div>
      <div class="hint" style="margin:6px 0;">${m.kmPerTrip.toLocaleString('vi-VN')} km/chuyến (khứ hồi) · ${(Number(p.loadPerTrip)||0).toLocaleString('vi-VN')} tấn/khối mỗi chuyến · Giá cước ${p.priceIncludesVat?'đã có VAT':'chưa VAT'}</div>
      <div class="summary-row"><span>Doanh thu thuần ước tính/chuyến</span><span class="val">${fmtVND(m.netRevenuePerTrip)}</span></div>
      <div class="summary-row"><span>Chi phí dầu thực tế/chuyến (${m.fuelLitersPerTrip.toFixed(1)} lít)</span><span class="val">${fmtVND(m.fuelCostPerTrip)}</span></div>
      <div class="summary-row"><span>Lương chuyến dự kiến</span><span class="val">${fmtVND(m.wagePerTrip)}</span></div>
      <div class="summary-row"><span>Tiền ăn dự kiến/chuyến</span><span class="val">${fmtVND(m.foodPerTrip)}</span></div>
      <div class="summary-row"><span>Tiền luật đường quy đổi/chuyến</span><span class="val">${fmtVND(m.roadFeePerTripEquivalent)}</span></div>
      <div class="summary-row total"><span>LỢI NHUẬN GỘP / CHUYẾN</span><span class="val" style="color:${m.grossProfitPerTrip>=0?'var(--profit)':'var(--loss)'}">${fmtVND(m.grossProfitPerTrip)}</span></div>
      <div class="summary-row"><span>Số chuyến dự tính chạy được/ca</span><span class="val">${m.tripsPerShift>0?m.tripsPerShift+' chuyến':'Chưa nhập'}</span></div>
      <div class="summary-row"><span>LỢI NHUẬN GỘP / CA</span><span class="val" style="color:${m.grossProfitPerShift!==null&&m.grossProfitPerShift>=0?'var(--profit)':'var(--loss)'}">${m.grossProfitPerShift!==null?fmtVND(m.grossProfitPerShift):'— (chưa nhập số chuyến/ca)'}</span></div>
      <div class="summary-row"><span>Chi phí cố định/tháng (lương cứng+nhà+khấu hao+vay+bảo hiểm+đăng kiểm+khác)</span><span class="val">${fmtVND(m.fixedCostMonthly)}</span></div>
      <div class="summary-row"><span>Số chuyến tối thiểu để hoà vốn</span><span class="val">${m.breakEvenTrips!==null?m.breakEvenTrips+' chuyến':'Không hoà vốn được với cơ cấu giá này'}</span></div>
      <div class="summary-row"><span>Số ca tối thiểu để hoà vốn</span><span class="val">${m.breakEvenShifts!==null?m.breakEvenShifts+' ca':'Chưa đủ dữ liệu (cần nhập số chuyến/ca)'}</span></div>
      <div class="summary-row"><span>So với ngày công chuẩn (${m.standardWorkDays} ca/tháng)</span><span class="val">${m.feasible===null?'—':m.feasible?'<span class="rating-badge good">Khả thi</span>':`<span class="rating-badge warn">Thiếu ${m.shortfallShifts} ca</span>`}</span></div>
      <div class="summary-row"><span>Lợi nhuận dự kiến/tháng (chạy đủ ngày công chuẩn)</span><span class="val" style="color:${m.projectedMonthlyProfit!==null&&m.projectedMonthlyProfit>=0?'var(--profit)':'var(--loss)'}">${m.projectedMonthlyProfit!==null?fmtVND(m.projectedMonthlyProfit):'—'}</span></div>
      <div class="summary-row"><span>ROI/tháng (lợi nhuận ÷ chi phí cố định)</span><span class="val">${m.roiPercent!==null?m.roiPercent.toFixed(1)+'%':'—'}</span></div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.editAppraisalBtn').forEach(btn=>btn.addEventListener('click', e=>{ e.stopPropagation(); openProjectAppraisalEditor(btn.dataset.id); }));
  wrap.querySelectorAll('.delAppraisalBtn').forEach(btn=>btn.addEventListener('click', async e=>{
    e.stopPropagation();
    if(confirm('Xoá công trình dự kiến này khỏi bảng so sánh?')){
      state.siteAppraisals = state.siteAppraisals.filter(p=>p.id!==btn.dataset.id);
      await saveSiteAppraisals();
      renderProjectAppraisal();
      showToast('Đã xoá.');
    }
  }));
}

/// Add/edit screen for ONE prospective project — the 7 input fields from
/// spec plus a live "Mô Phỏng Nhanh" preview that recomputes on every
/// keystroke via computeAppraisalMetrics(), so Ông Chủ sees the impact
/// immediately instead of only after saving.
function openProjectAppraisalEditor(id){
  // Số liệu CHI PHÍ CỐ ĐỊNH THẬT hiện tại của đội xe (đọc lại mỗi lần mở
  // màn hình này) — dùng làm số gợi ý điền sẵn cho công trình MỚI, và
  // dùng làm số tham chiếu hiển thị dưới mỗi ô ngay cả khi Sửa công
  // trình cũ, để Ông Chủ luôn biết "số thật hiện giờ" là bao nhiêu.
  const realFixed = historicalMonthlyFixedCostReal();
  const existing = id ? state.siteAppraisals.find(p=>p.id===id) : null;
  const draft = existing ? {
    ...existing,
    wagePerTripEstimate: existing.wagePerTripEstimate!=null ? existing.wagePerTripEstimate : 0,

// ========================= APPRAISAL EXPERT ANALYSIS (AI PROS/CONS + RECOMMENDATION) =========================
// Reuses the exact same Gemini call plumbing as the Strategy Assistant
// (callGeminiText / callGeminiWithRetry / startTruckRun) but with its own
// prompt, its own state (state.appraisalAnalysis), and its own truck-run
// handle — completely separate pipeline from strategyAnalysis so the two
// features can never clobber each other's loading state. Reads ONLY the
// numbers already produced by computeAppraisalMetrics() (the frozen math
// above); never recomputes or overrides them.

/// Handle for the HOWO truck run currently live on the appraisal screen's
/// analysis button — mirrors activeStrategyTruckRun, kept separate so the
/// two screens' animations never interfere with each other.
let activeAppraisalTruckRun = null;

/// Builds the Vietnamese expert-persona prompt. Explicitly forbids Gemini
/// from inventing figures not present in the payload, and explicitly
/// requires it to say "chưa đủ căn cứ" (not enough basis) rather than
/// force a pick whenever the projects are too close to call or there's
/// only one project to look at — this is the actual mechanism behind
/// "không được tự ý quyết định khi chưa chắc chắn".
function buildAppraisalComparisonPrompt(payload, fuelPerKm, fuelPrice){

async function runAppraisalAnalysis(){
  const aa = state.appraisalAnalysis;
  aa.loading = true; aa.error = null;
  renderProjectAppraisal();
  try{
    const projects = state.siteAppraisals || [];
    if(projects.length===0){
      aa.error = 'Chưa có công trình dự kiến nào để phân tích.';
      aa.loading = false;
      if(activeAppraisalTruckRun) await activeAppraisalTruckRun.finish();
      if(state.currentTab==='strategy' && state.strategyView==='appraisal') renderProjectAppraisal();
      return;
    }
    const fuelPerKm = historicalAvgFuelPerKm();
    const fuelPrice = currentFuelUnitPriceForAppraisal();
    const payload = projects.map(p=>{
      const m = computeAppraisalMetrics(p);
      return {
        name: p.name || '(chưa đặt tên)',
        kmPerTripKhuHoi: Math.round(m.kmPerTrip),
        khoiLuongMoiChuyen: Number(p.loadPerTrip)||0,
        giaCuocDaCoVat: !!p.priceIncludesVat,
        doanhThuThuanMoiChuyen: Math.round(m.netRevenuePerTrip),
        chiPhiDauThucTeMoiChuyen: Math.round(m.fuelCostPerTrip),
        luongChuyenDuKienMoiChuyen: Math.round(m.wagePerTrip),
        tienAnDuKienMoiChuyen: Math.round(m.foodPerTrip),
        tienLuatDuongQuyDoiMoiChuyen: Math.round(m.roadFeePerTripEquivalent),
        laiGopMoiChuyen: Math.round(m.grossProfitPerTrip),
        soChuyenDuTinhMoiCa: m.tripsPerShift || null,
        laiGopMoiCa: m.grossProfitPerShift!==null ? Math.round(m.grossProfitPerShift) : null,
        chiPhiCoDinhMoiThang: Math.round(m.fixedCostMonthly),
        soChuyenHoaVon: m.breakEvenTrips,
        soCaHoaVon: m.breakEvenShifts,
        ngayCongChuanMoiThang: m.standardWorkDays,
        khaThiTrongThang: m.feasible,
        loiNhuanDuKienMoiThang: m.projectedMonthlyProfit!==null ? Math.round(m.projectedMonthlyProfit) : null,
        roiPhanTramMoiThang: m.roiPercent!==null ? +m.roiPercent.toFixed(1) : null
      };
    });
    const prompt = buildAppraisalComparisonPrompt(payload, fuelPerKm, fuelPrice);
    const result = await callGeminiText(prompt, (attempt)=>{
      if(attempt>=3){
        const hintEl = document.getElementById('appraisalRetryHint');
        if(hintEl) hintEl.textContent = `Mạng đang chập chờn — đang tự động thử kết nối lại với Gemini (lần ${attempt})...`;
      }
    });
    aa.result = result;
    aa.generatedAt = new Date().toISOString();
  }catch(e){
    aa.error = e.message || 'Không phân tích được — thử lại.';
  }
  aa.loading = false;
  if(activeAppraisalTruckRun) await activeAppraisalTruckRun.finish();
  if(state.currentTab==='strategy' && state.strategyView==='appraisal') renderProjectAppraisal();
}

function currentMonthRange(){
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  const last = new Date(now.getFullYear(), now.getMonth()+1, 0);
  const toLocalISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return { from: toLocalISO(first), to: toLocalISO(last) };
}

function computeResultsGroup(shifts){
  const revenue = shifts.reduce((s,sh)=>s+shiftTotalRevenue(sh),0);
  const opCost = shifts.reduce((s,sh)=>s+shiftTotalCost(sh),0);
  const grossProfit = revenue - opCost;
  const margin = revenue>0 ? (grossProfit/revenue*100) : 0;
  const totalKm = shifts.reduce((s,sh)=>s+shiftOdoDriven(sh),0);
  const totalTrips = shifts.reduce((s,sh)=>s+(sh.siteLogs||[]).reduce((x,l)=>x+(Number(l.trips)||0),0),0);
  const fuelLiters = shifts.reduce((s,sh)=>s+shiftFuelConsumed(sh),0);
  const fuelCost = shifts.reduce((s,sh)=>s+shiftFuelCost(sh),0);
  const fuelPerKm = totalKm>0 ? fuelCost/totalKm : 0;
  const revenuePerKm = totalKm>0 ? revenue/totalKm : 0;
  const profitPerTrip = totalTrips>0 ? grossProfit/totalTrips : 0;
  return { revenue, opCost, grossProfit, margin, totalKm, totalTrips, fuelLiters, fuelCost, fuelPerKm, revenuePerKm, profitPerTrip };
}

function fmtShortVND(n){
  n = Number(n)||0;
  const abs = Math.abs(n);
  if(abs>=1000000) return (n/1000000).toLocaleString('vi-VN',{maximumFractionDigits:1})+'tr';
  if(abs>=1000) return (n/1000).toLocaleString('vi-VN',{maximumFractionDigits:0})+'k';
  return Math.round(n).toLocaleString('vi-VN');
}

// ---- Day/Night comparison bar chart (plain SVG, no external library) ----
function renderComparisonChartSVG(gDay, gNight){
  const metrics = [
    { label:'Doanh Thu', day:gDay.revenue, night:gNight.revenue },
    { label:'Chi Phí', day:gDay.opCost, night:gNight.opCost },
    { label:'Lợi Nhuận', day:gDay.grossProfit, night:gNight.grossProfit }
  ];
  const maxVal = Math.max(1, ...metrics.map(m=>Math.max(Math.abs(m.day), Math.abs(m.night))));
  const chartH = 150, groupW = 100, barW = 30, gap = 10, baseY = chartH + 20;
  const width = metrics.length * groupW + 20;
  let bars = '';
  metrics.forEach((m, i)=>{
    const gx = 20 + i*groupW;
    const dayH = Math.max(2, Math.abs(m.day)/maxVal*chartH);
    const nightH = Math.max(2, Math.abs(m.night)/maxVal*chartH);
    const dayY = baseY - dayH;
    const nightY = baseY - nightH;
    bars += `
      <rect x="${gx}" y="${dayY}" width="${barW}" height="${dayH}" rx="4" fill="var(--accent)"></rect>
      <text x="${gx+barW/2}" y="${dayY-6}" font-size="10" text-anchor="middle" fill="var(--ink)">${fmtShortVND(m.day)}</text>
      <rect x="${gx+barW+gap}" y="${nightY}" width="${barW}" height="${nightH}" rx="4" fill="var(--ink)"></rect>
      <text x="${gx+barW+gap+barW/2}" y="${nightY-6}" font-size="10" text-anchor="middle" fill="var(--ink)">${fmtShortVND(m.night)}</text>
      <text x="${gx+barW+gap/2}" y="${baseY+16}" font-size="11" text-anchor="middle" fill="var(--ink-soft)" font-weight="600">${m.label}</text>
    `;
  });
  return `
    <svg viewBox="0 0 ${width} ${baseY+30}" style="width:100%; height:auto;">
      <line x1="10" y1="${baseY}" x2="${width-10}" y2="${baseY}" stroke="var(--border)" stroke-width="1"></line>
      ${bars}
    </svg>
    <div style="display:flex; gap:16px; justify-content:center; margin-top:6px; font-size:12px;">
      <span style="color:var(--accent); font-weight:700;">■ Ca Ngày</span>
      <span style="color:var(--ink); font-weight:700;">■ Ca Đêm</span>
    </div>
  `;
}

// ---- Per-day breakdown within the selected range ----
/// Break-even: how many trips this period needs, at the period's own
/// average revenue/trip and fuel-cost/trip, to cover its fixed costs
/// (allocated base salary + housing across all shifts in range, plus the
/// road-fee figure already resolved for the period).
/// Full break-even analysis for the period, restructured per proper
/// transport-accounting practice:
///  - Revenue & trip volume split by Ca Ngày / Ca Đêm (production overview)
///  - Costs split into FIXED (doesn't move with trip count: allocated base
///    salary, housing, monthly road fee, repair/depreciation booked this
///    period) vs VARIABLE (moves with each trip run: fuel, trip wage, food
///    allowance, incidental cost)
///  - Gross profit = Revenue − Variable cost (the "contribution margin"
///    pool available to cover fixed cost)
///  - Break-even trips = Fixed cost ÷ average contribution margin per trip
function computeBreakEvenDetailed(inRangeShifts, roadFee, repairTotal){
  const dayShifts = inRangeShifts.filter(sh=>sh.shiftType==='day');
  const nightShifts = inRangeShifts.filter(sh=>sh.shiftType==='night');
  const tripsOf = shifts => shifts.reduce((s,sh)=>s+(sh.siteLogs||[]).reduce((x,l)=>x+(Number(l.trips)||0),0),0);
  const revenueOf = shifts => shifts.reduce((s,sh)=>s+shiftTotalRevenue(sh),0);

  const dayTrips = tripsOf(dayShifts), nightTrips = tripsOf(nightShifts);
  const dayRevenue = revenueOf(dayShifts), nightRevenue = revenueOf(nightShifts);
  const totalTrips = dayTrips + nightTrips;
  const totalRevenue = dayRevenue + nightRevenue;

  const fixedCost = inRangeShifts.reduce((s,sh)=>s+(Number(sh.baseSalaryAllocation)||0)+(Number(sh.housingAllocation)||0),0) + roadFee + repairTotal;
  const variableCost = inRangeShifts.reduce((s,sh)=>s+shiftFuelCost(sh)+shiftTotalTripWage(sh)+(Number(sh.foodAllowance)||0)+(Number(sh.incidentalCost)||0)+shiftTipCost(sh),0);
  const grossProfit = totalRevenue - variableCost;

  const base = { dayTrips, nightTrips, dayRevenue, nightRevenue, totalTrips, totalRevenue, fixedCost, variableCost, grossProfit, roadFee, repairTotal };

  if(totalTrips===0) return { ...base, breakEvenTrips:null, note:'Chưa có chuyến nào trong kỳ để tính điểm hoà vốn.' };
  const avgRevenuePerTrip = totalRevenue/totalTrips;
  const avgVariableCostPerTrip = variableCost/totalTrips;
  const marginPerTrip = avgRevenuePerTrip - avgVariableCostPerTrip;
  if(marginPerTrip<=0) return { ...base, avgRevenuePerTrip, avgVariableCostPerTrip, breakEvenTrips:null, note:'Doanh thu/chuyến hiện đang thấp hơn chi phí biến đổi/chuyến — không thể hoà vốn với cơ cấu giá hiện tại, dù chạy bao nhiêu chuyến.' };
  const breakEvenTrips = Math.ceil(fixedCost/marginPerTrip);
  return { ...base, avgRevenuePerTrip, avgVariableCostPerTrip, marginPerTrip, breakEvenTrips, actualTrips: totalTrips, surplusTrips: totalTrips-breakEvenTrips, note:null };
}

= ${be.breakEvenTrips!==null?be.breakEvenTrips+' chuyến':'Không xác định — '+escapeHtml(be.note||'')}</div>
    </div>

  `);
}

/// Cost-per-km for each of the last N calendar months (ALL shifts, not
/// filtered by the Results tab's selected period — a trend needs its own
/// fixed time axis) — surfaces whether operating cost is drifting up.
function computeCostPerKmTrend(monthsBack){
  const now = new Date();
  const buckets = [];
  for(let i=monthsBack-1;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const label = `${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    const monthStart = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;
    const monthEndDate = new Date(d.getFullYear(), d.getMonth()+1, 0);
    const monthEnd = `${monthEndDate.getFullYear()}-${String(monthEndDate.getMonth()+1).padStart(2,'0')}-${String(monthEndDate.getDate()).padStart(2,'0')}`;
    const shiftsInMonth = state.shifts.filter(sh=>sh.date>=monthStart && sh.date<=monthEnd);
    const totalKm = shiftsInMonth.reduce((s,sh)=>s+shiftOdoDriven(sh),0);
    const totalCost = shiftsInMonth.reduce((s,sh)=>s+shiftTotalCost(sh),0);
    buckets.push({ label, costPerKm: totalKm>0 ? totalCost/totalKm : 0, totalKm, totalCost });
  }
  return buckets;
}

function renderCostPerKmChartSVG(buckets){
  const maxVal = Math.max(1, ...buckets.map(b=>b.costPerKm));
  const chartH = 130, barW = 34, gap = 14, baseY = chartH + 20;
  const width = buckets.length * (barW+gap) + 20;
  let bars = '';
  buckets.forEach((b,i)=>{
    const x = 20 + i*(barW+gap);
    const h = b.totalKm>0 ? Math.max(2, b.costPerKm/maxVal*chartH) : 2;
    const y = baseY - h;
    bars += `
      <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="4" fill="${b.totalKm>0?'var(--accent)':'var(--border)'}"></rect>
      <text x="${x+barW/2}" y="${y-6}" font-size="9" text-anchor="middle" fill="var(--ink)">${b.totalKm>0?fmtShortVND(b.costPerKm):'—'}</text>
      <text x="${x+barW/2}" y="${baseY+16}" font-size="10" text-anchor="middle" fill="var(--ink-soft)">${b.label}</text>
    `;
  });
  return `<svg viewBox="0 0 ${width} ${baseY+28}" style="width:100%; height:auto;">
    <line x1="10" y1="${baseY}" x2="${width-10}" y2="${baseY}" stroke="var(--border)" stroke-width="1"></line>
    ${bars}
  </svg>`;
}

function computeDailyBreakdown(inRangeShifts){
  const byDate = {};
  for(const sh of inRangeShifts){
    if(!byDate[sh.date]) byDate[sh.date] = [];
    byDate[sh.date].push(sh);
  }
  return Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const shifts = byDate[date];
    const revenue = shifts.reduce((s,sh)=>s+shiftTotalRevenue(sh),0);
    const cost = shifts.reduce((s,sh)=>s+shiftTotalCost(sh),0);
    return { date, revenue, cost, profit: revenue-cost, shiftCount: shifts.length };
  });
}

// ---- Site profitability ranking (revenue per trip, proxy for site value) ----
function computeSiteRanking(inRangeShifts){
  const bySite = {};
  for(const sh of inRangeShifts){
    for(const s of (sh.siteLogs||[])){
      const name = (s.siteName||'(chưa đặt tên)').trim() || '(chưa đặt tên)';
      if(!bySite[name]) bySite[name] = { name, revenue:0, trips:0 };
      bySite[name].revenue += siteRevenue(s);
      bySite[name].trips += Number(s.trips)||0;
    }
  }
  return Object.values(bySite)
    .map(x=>({ ...x, revenuePerTrip: x.trips>0 ? x.revenue/x.trips : 0 }))
    .sort((a,b)=>b.revenuePerTrip-a.revenuePerTrip);
}

function sitePaymentsInRange(siteName, from, to){
  return state.sitePayments.filter(p=>p.siteName===siteName && p.date>=from && p.date<=to);
}

/// Full drill-down for ONE construction site within [from, to]: total
/// billed (revenue), total collected from the client/contractor, still
/// owed, a driver × trips breakdown, and a day-by-day activity log —
/// mirrors the original spreadsheet's per-site cash-flow view.
function computeSiteDetail(siteName, from, to){
  // Trip/driver activity respects the requested period (useful for browsing
  // a specific window of work), but every FINANCIAL total (billed,
  // collected, owed) is always ALL-TIME — debt is a running balance, not a
  // period concept, and mixing the two produced inconsistent "owed"
  // numbers between this view and the Đối Tác & Công Nợ overview.
  const inRange = state.shifts.filter(sh=>sh.date>=from && sh.date<=to);
  const tripsByDriver = {};
  const dailyActivity = [];
  for(const sh of inRange){
    const driverName = driverById(sh.driverId)?.name || sh.driverNameSnapshot || '(chưa gán tài xế)';
    for(const s of (sh.siteLogs||[])){
      const name = (s.siteName||'(chưa đặt tên)').trim() || '(chưa đặt tên)';
      if(name !== siteName) continue;
      const rev = siteRevenue(s);
      const cost = siteWageTotal(s);
      if(!tripsByDriver[driverName]) tripsByDriver[driverName] = { trips:0, revenue:0, cost:0 };
      tripsByDriver[driverName].trips += Number(s.trips)||0;
      tripsByDriver[driverName].revenue += rev;
      tripsByDriver[driverName].cost += cost;
      dailyActivity.push({ date: sh.date, driverName, trips: Number(s.trips)||0, volumePerTrip: s.volumePerTrip||0, revenue: rev, cost });
    }
  }
  dailyActivity.sort((a,b)=>a.date.localeCompare(b.date));

  const allTimeBilledEvents = computeAllSiteBilledEvents()[siteName] || [];
  const billed = allTimeBilledEvents.reduce((s,e)=>s+e.amount,0);
  const payments = state.sitePayments.filter(p=>p.siteName===siteName).sort((a,b)=>a.date.localeCompare(b.date));
  const collected = payments.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const owed = billed - collected;
  return { siteName, billed, collected, owed, tripsByDriver, dailyActivity, payments };
}

// ========================= PARTNERS & RECEIVABLES (ALL-TIME AR AGING) =========================
// Distinct from the period-filtered "Công Nợ Công Trình" block above (which
// answers "how much did I bill THIS period"), this module answers "how
// much is CURRENTLY owed, and since when" — a running balance that never
// resets with the Results date filter, computed with proper FIFO ageing
// (each payment received pays off the OLDEST outstanding billed amount
// first, exactly like real accounts-receivable bookkeeping) plus a
// reliability rating per business partner built from that ageing.

const ALL_TIME_FROM = '1900-01-01';
const ALL_TIME_TO = '2999-12-31';

/// Every construction site's full, all-time list of billed amounts —
/// one entry per shift-site contribution, dated by the shift's date.
function computeAllSiteBilledEvents(){
  const map = {};
  for(const sh of state.shifts){
    for(const s of (sh.siteLogs||[])){
      const name = (s.siteName||'(chưa đặt tên)').trim() || '(chưa đặt tên)';
      const rev = siteRevenue(s);
      if(rev<=0) continue;
      if(!map[name]) map[name] = [];
      map[name].push({ date: sh.date, amount: rev });
    }
  }
  return map;
}

/// FIFO ageing: applies the total pool of payments received against the
/// oldest billed amounts first. Returns which billed amounts remain
/// (fully or partially) unpaid, the oldest unpaid billing date, and the
/// resulting total still owed.
function computeFifoAging(billedEvents, paymentEvents){
  const billed = [...billedEvents].sort((a,b)=>a.date.localeCompare(b.date)).map(e=>({date:e.date, remaining:e.amount}));
  let paymentPool = paymentEvents.reduce((s,p)=>s+(Number(p.amount)||0),0);
  for(const b of billed){
    if(paymentPool<=0) break;
    const applied = Math.min(paymentPool, b.remaining);
    b.remaining -= applied;
    paymentPool -= applied;
  }
  const unpaidBuckets = billed.filter(b=>b.remaining > 0.5);
  const oldestUnpaidDate = unpaidBuckets.length ? unpaidBuckets[0].date : null;
  const totalOwed = unpaidBuckets.reduce((s,b)=>s+b.remaining,0);
  const today = todayLocalDateStr();
  const daysOutstanding = oldestUnpaidDate ? Math.floor((new Date(today) - new Date(oldestUnpaidDate)) / 86400000) : 0;
  return { totalOwed, oldestUnpaidDate, daysOutstanding, unpaidBuckets };
}

/// Picks the most-frequently-used partner name among a site's logged
/// payments — sites are usually tied to one ongoing contractor, so this
/// is a reliable proxy without needing a separate "assign partner" step.
function derivePartnerForSite(siteName){
  const payments = state.sitePayments.filter(p=>p.siteName===siteName);
  const counts = {};
  payments.forEach(p=>{ const n=(p.partnerName||'').trim(); if(n) counts[n] = (counts[n]||0)+1; });
  const names = Object.keys(counts);
  if(names.length===0) return null;
  names.sort((a,b)=>counts[b]-counts[a]);
  return names[0];
}

/// Deterministic reliability rating from the ageing result — the more
/// overdue the oldest unpaid amount, the higher the risk flag.
function partnerReliabilityRating(daysOutstanding, totalOwed){
  if(totalOwed <= 0) return { label:'Tốt — Không nợ', className:'good' };
  if(daysOutstanding <= 30) return { label:'Bình thường', className:'ok' };
  if(daysOutstanding <= 60) return { label:'Cần chú ý', className:'watch' };
  if(daysOutstanding <= 90) return { label:'Cảnh báo — Nợ lâu', className:'warn' };
  return { label:'Rủi ro cao — Nợ quá hạn', className:'risk' };
}

/// Full all-time roster of business partners derived from every site's
/// billed history + payment log, each with FIFO-aged outstanding balance,
/// payment-history statistics, and a reliability rating.
function computePartnersOverview(){
  const siteBilled = computeAllSiteBilledEvents();
  const partners = {};

  for(const siteName of Object.keys(siteBilled)){
    const partnerName = derivePartnerForSite(siteName) || siteName;
    const payments = state.sitePayments.filter(p=>p.siteName===siteName).map(p=>({date:p.date, amount:Number(p.amount)||0}));
    const aging = computeFifoAging(siteBilled[siteName], payments);
    const billedTotal = siteBilled[siteName].reduce((s,e)=>s+e.amount,0);
    const collectedTotal = payments.reduce((s,p)=>s+p.amount,0);
    const lastPaymentDate = payments.length ? payments.map(p=>p.date).sort().slice(-1)[0] : null;

    if(!partners[partnerName]) partners[partnerName] = {
      name: partnerName, sites: [], totalBilled:0, totalCollected:0, totalOwed:0,
      oldestUnpaidDate: null, paymentCount: 0, lastPaymentDate: null
    };
    const P = partners[partnerName];
    P.sites.push({ siteName, billed: billedTotal, collected: collectedTotal, owed: aging.totalOwed, daysOutstanding: aging.daysOutstanding });
    P.totalBilled += billedTotal;
    P.totalCollected += collectedTotal;
    P.totalOwed += aging.totalOwed;
    P.paymentCount += payments.length;
    if(aging.oldestUnpaidDate && (!P.oldestUnpaidDate || aging.oldestUnpaidDate < P.oldestUnpaidDate)) P.oldestUnpaidDate = aging.oldestUnpaidDate;
    if(lastPaymentDate && (!P.lastPaymentDate || lastPaymentDate > P.lastPaymentDate)) P.lastPaymentDate = lastPaymentDate;
  }

  const today = todayLocalDateStr();
  return Object.values(partners).map(P=>{
    const daysOutstanding = P.oldestUnpaidDate ? Math.floor((new Date(today)-new Date(P.oldestUnpaidDate))/86400000) : 0;
    return { ...P, daysOutstanding, rating: partnerReliabilityRating(daysOutstanding, P.totalOwed) };
  }).sort((a,b)=>b.totalOwed-a.totalOwed);
}

// ========================= FINANCIAL WARNING ENGINE (KẾT QUẢ KINH DOANH TAB ONLY) =========================
// Deterministic rules on real computed numbers — never AI, never a guess.
// Deliberately separate from computeShiftIssues() (per-shift data-entry
// completeness, shown only on the Shift List) and from computeAllWarnings()
// (vehicle-paperwork/maintenance deadlines, shown only on the Shift List):
// this is the ONLY warning source allowed inside Kết Quả Kinh Doanh, and it
// is re-derived fresh from live data on every render — there is no
// "dismissed" flag to manage or get out of sync. The instant the
// underlying numbers stop breaching a rule, that rule simply stops
// producing a warning object and the card disappears on its own.
const FUEL_SPIKE_THRESHOLD_PCT = 20;       // current period's đ/km vs all-time baseline
const FIXED_COST_RATIO_THRESHOLD_PCT = 15; // (sửa chữa + luật đường) ÷ doanh thu
const DEBT_OVERDUE_DAYS_THRESHOLD = 60;    // ngày nợ quá hạn mới tính là vượt mức thu hồi an toàn

function computeFinancialWarnings({ gTotal, finalNetProfit, repairTotal, roadFee, inRangeShifts, missingFuelPriceShifts, missingFuelPriceLiters, from, to }){
  const warnings = [];
  if(inRangeShifts.length===0) return warnings;

  // 1. Negative net margin
  if(finalNetProfit < 0){
    warnings.push({
      id:'negativeMargin', icon:'🔴',
      title:'Lợi nhuận ròng đang ÂM trong kỳ',
      text:`Sau khi trừ hết chi phí sửa chữa và luật đường, kỳ này đang lỗ ${fmtVND(Math.abs(finalNetProfit))}.`,
      detail:()=>renderFinancialWarningDetail('negativeMargin', { gTotal, finalNetProfit, repairTotal, roadFee })
    });
  }

  // 2. Fixed cost eating an unhealthy share of revenue
  if(gTotal.revenue > 0){
    const fixedRatio = (repairTotal+roadFee)/gTotal.revenue*100;
    if(fixedRatio >= FIXED_COST_RATIO_THRESHOLD_PCT){
      warnings.push({
        id:'fixedCostRatio', icon:'⚠️',
        title:'Chi phí cố định chiếm tỷ trọng cao trên doanh thu',
        text:`Sửa chữa + luật đường đang chiếm ${fixedRatio.toFixed(1)}% doanh thu kỳ này (ngưỡng an toàn ${FIXED_COST_RATIO_THRESHOLD_PCT}%).`,
        detail:()=>renderFinancialWarningDetail('fixedCostRatio', { gTotal, repairTotal, roadFee, fixedRatio })
      });
    }
  }

  // 3. Fuel cost/km spiking vs the all-time baseline (every shift OUTSIDE
  // the currently selected period — a large enough, independent sample).
  const baselineShifts = state.shifts.filter(sh=>!(sh.date>=from && sh.date<=to));
  const baselineKm = baselineShifts.reduce((s,sh)=>s+shiftOdoDriven(sh),0);
  const baselineFuelCost = baselineShifts.reduce((s,sh)=>s+shiftFuelCost(sh),0);
  if(baselineShifts.length>=5 && baselineKm>0 && gTotal.totalKm>0){
    const baselinePerKm = baselineFuelCost/baselineKm;
    const currentPerKm = gTotal.fuelCost/gTotal.totalKm;
    if(baselinePerKm>0){
      const increasePct = (currentPerKm-baselinePerKm)/baselinePerKm*100;
      if(increasePct >= FUEL_SPIKE_THRESHOLD_PCT){
        warnings.push({
          id:'fuelCostSpike', icon:'⛽',
          title:'Chi phí dầu / Km đang tăng vọt bất thường',
          text:`${fmtVND(currentPerKm)}/km trong kỳ này, cao hơn ${increasePct.toFixed(0)}% so với bình quân ${fmtVND(baselinePerKm)}/km các kỳ trước.`,
          detail:()=>renderFinancialWarningDetail('fuelCostSpike', { currentPerKm, baselinePerKm, increasePct })
        });
      }
    }
  }

  // 4. Fuel consumed but no đơn giá entered — silently understates cost
  if(missingFuelPriceShifts.length>0){
    warnings.push({
      id:'missingFuelPrice', icon:'⛽',
      title:'Có ca tiêu hao dầu nhưng chưa nhập đơn giá',
      text:`${missingFuelPriceShifts.length} ca, tổng ${Math.round(missingFuelPriceLiters).toLocaleString('vi-VN')} lít, đang tính 0đ tiền dầu — Tổng tiền dầu tiêu hao bên dưới đang bị TÍNH THIẾU.`,
      detail:()=>renderFinancialWarningDetail('missingFuelPrice', { missingFuelPriceShifts })
    });
  }

  // 5. Accounts receivable past the safe recovery threshold (all-time,
  // independent of the selected period — nợ là con số dồn từ trước tới giờ)
  const overduePartners = computePartnersOverview().filter(p=>p.totalOwed>0 && p.daysOutstanding>DEBT_OVERDUE_DAYS_THRESHOLD);
  if(overduePartners.length>0){
    const totalOverdue = overduePartners.reduce((s,p)=>s+p.totalOwed,0);
    warnings.push({
      id:'debtOverdue', icon:'💸',
      title:'Công nợ đã vượt hạn mức thu hồi an toàn',
      text:`${overduePartners.length} đối tác nợ quá ${DEBT_OVERDUE_DAYS_THRESHOLD} ngày, tổng ${fmtVND(totalOverdue)} chưa thu.`,
      detail:()=>renderFinancialWarningDetail('debtOverdue', { overduePartners, totalOverdue })
    });
  }

  return warnings;
}

// ---- Strategic advisory engine (deterministic rules on real numbers) ----
// NOTE: profit/loss status and the fixed-cost-ratio rule used to live here
// as insight #1 and #3. Both are now computed once, in one place, by
// computeFinancialWarnings() above — #1 surfaces as the negativeMargin
// warning card when the period is actually losing money (and is simply
// omitted when positive, since a positive figure only repeats the number
// already shown in "Lợi Nhuận Thực Tế Cuối Cùng"), and #3 as the
// fixedCostRatio warning. Keeping them in two places would mean the same
// number could show two different pieces of copy if the rules ever drift.
// What remains here is pure opportunity/comparison commentary — never a
// "something is broken" message — so it stays out of the Cảnh Báo Tài
// Chính block and never needs a [Chi Tiết] fix-it flow of its own.
function generateInsights({gDay, gNight, gTotal, finalNetProfit, repairTotal, roadFee, inRangeShifts, from, to, siteRanking}){
  const insights = [];

  if(gTotal.revenue===0 && inRangeShifts.length===0){
    insights.push({icon:'ℹ️', title:'Chưa có dữ liệu trong kỳ này', text:'Hãy chọn lại khoảng thời gian có ca đã ghi, hoặc ghi ca mới ở tab "Ca Làm Việc".'});
    return insights;
  }

  // 1. Day vs Night margin comparison
  if(gDay.revenue>0 && gNight.revenue>0){
    const diff = gNight.margin - gDay.margin;
    if(Math.abs(diff) >= 8){
      const better = diff>0 ? 'Ca Đêm' : 'Ca Ngày';
      const betterM = diff>0 ? gNight.margin : gDay.margin;
      const worseM = diff>0 ? gDay.margin : gNight.margin;
      insights.push({icon: diff>0?'🌙':'☀️', title:`${better} đang hiệu quả hơn rõ rệt`, text:`Biên lợi nhuận ${better} đạt ${betterM.toFixed(1)}%, cao hơn ca còn lại (${worseM.toFixed(1)}%). Nếu tài xế và công trình cho phép, nên ưu tiên sắp thêm ${better.toLowerCase()}.`});
    }
  }

  // 2. Utilization (operating days vs calendar days in range)
  const operatingDates = new Set(inRangeShifts.map(sh=>sh.date));
  const totalDaysInRange = Math.round((new Date(to+'T00:00:00') - new Date(from+'T00:00:00'))/86400000) + 1;
  if(totalDaysInRange > 0){
    const utilization = operatingDates.size/totalDaysInRange*100;
    if(utilization < 70){
      insights.push({icon:'📉', title:'Tỷ lệ ngày hoạt động còn thấp', text:`Xe chỉ có ca chạy ${operatingDates.size}/${totalDaysInRange} ngày trong kỳ (${utilization.toFixed(0)}%). Vì chi phí luật đường là cố định theo tháng dù chạy nhiều hay ít, tăng số ngày hoạt động sẽ giúp giảm chi phí cố định tính trên mỗi chuyến.`});
    }
  }

  // 3. Site profitability ranking
  if(siteRanking.length >= 2){
    const best = siteRanking[0], worst = siteRanking[siteRanking.length-1];
    if(best.revenuePerTrip > 0 && worst.revenuePerTrip < best.revenuePerTrip*0.7){
      insights.push({icon:'🏗️', title:'Chênh lệch hiệu quả giữa các công trình', text:`"${best.name}" đang cho doanh thu/chuyến cao nhất (${fmtVND(best.revenuePerTrip)}), trong khi "${worst.name}" thấp hơn nhiều (${fmtVND(worst.revenuePerTrip)}). Nếu được chọn, nên ưu tiên nhận thêm việc ở công trình có doanh thu/chuyến cao.`});
    }
  }

  return insights;
}

  const excludedShiftIds = getExcludedRecentShiftIds();
  const inRange = state.shifts.filter(sh=>sh.date>=from && sh.date<=to && !excludedShiftIds.has(sh.id));
  const pendingShiftsInRange = state.shifts.filter(sh=>sh.date>=from && sh.date<=to && excludedShiftIds.has(sh.id));
  const dayShifts = inRange.filter(sh=>sh.shiftType==='day');
  const nightShifts = inRange.filter(sh=>sh.shiftType==='night');

  const gDay = computeResultsGroup(dayShifts);
  const gNight = computeResultsGroup(nightShifts);
  const gTotal = computeResultsGroup(inRange);

  const repairsHere = repairsInRange(from, to);
  const repairTotal = repairsHere.reduce((s,r)=>s+(Number(r.amount)||0),0);
  const roadFee = state.resultsRoadFeeOverride!==null ? state.resultsRoadFeeOverride : state.settings.monthlyFixedRoadFee;

  // đơn giá dầu entered contributes 0đ to Tiền dầu tiêu hao (consumed × 0),

  // total fuel cost. Surface it so Ông Chủ can fix the source ca directly

  const financialWarnings = computeFinancialWarnings({ gTotal, finalNetProfit, repairTotal, roadFee, inRangeShifts:inRange, missingFuelPriceShifts, missingFuelPriceLiters, from, to });
  const breakEven = computeBreakEvenDetailed(inRange, roadFee, repairTotal);

/// Opens a modal letting the person pick WHICH of the partner's sites a new
/// payment belongs to, then hands off to openSitePaymentEditor. Skipped
/// entirely (goes straight to the editor) when the partner only has one site.
function openAddSitePaymentForPartner(partnerName){
  const partners = computePartnersOverview();
  const P = partners.find(x=>x.name===partnerName);
  if(!P || P.sites.length===0){ showToast('Đối tác này chưa có công trình nào.'); return; }
  if(P.sites.length===1){
    openSitePaymentEditor(null, P.sites[0].siteName, null, null, partnerName);
    return;
  }
  openModal(`
    <div class="modal-close-row"><button class="btn btn-ghost btn-sm" id="modalCloseBtn">Đóng ✕</button></div>
    <h3>Chọn Công Trình</h3>
    <div class="hint" style="margin-bottom:10px;">Khoản thu này thuộc công trình nào của đối tác "${escapeHtml(partnerName)}"?</div>
    <div class="field" style="margin-bottom:0;">
      <select id="pickSitePaymentSite">
        ${P.sites.map(s=>`<option value="${escapeHtml(s.siteName)}">${escapeHtml(s.siteName)}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-accent btn-block" id="pickSitePaymentBtn" style="margin-top:14px;">Tiếp Tục</button>
  `);
  document.getElementById('pickSitePaymentBtn').addEventListener('click', ()=>{
    const chosen = document.getElementById('pickSitePaymentSite').value;
    closeModal();
    openSitePaymentEditor(null, chosen, null, null, partnerName);
  });
}

/// Payment editor for money received from a partner/client. Always returns
/// to the PARTNER detail screen (openPartnerDetail), since collection is
/// now managed exclusively from there rather than from the site screen.
function openSitePaymentEditor(id, siteName, from, to, partnerName){
  const existing = id ? state.sitePayments.find(p=>p.id===id) : null;
  const resolvedSiteName = existing ? existing.siteName : siteName;
  const draft = existing ? {...existing} : { id: uid('pay'), siteName: resolvedSiteName, date: todayLocalDateStr(), partnerName: partnerName||'', amount:0, notes:'' };
  const goBack = () => openPartnerDetail(partnerName || draft.partnerName || derivePartnerForSite(draft.siteName) || draft.siteName);
  const app = document.getElementById('app');
  app.innerHTML = `
    <section class="group">
      <h3>${existing?'Sửa':'Ghi Nhận'} Khoản Thu — ${escapeHtml(resolvedSiteName)}</h3>
      <div class="card">
        <div class="field">
          <label>Ngày nhận tiền</label>
          <input type="date" id="sp_date" value="${draft.date}">
        </div>
        <div class="field">
          <label>Chủ công trình / Nhà thầu</label>
          <input type="text" id="sp_partner" value="${escapeHtml(draft.partnerName)}">
        </div>
        <div class="field">
          <label>Số tiền thu về</label>
          <input type="text" inputmode="decimal" id="sp_amount">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label>Nội dung thu tiền</label>
          <input type="text" id="sp_notes" value="${escapeHtml(draft.notes)}">
        </div>
      </div>
      <div style="display:flex; gap:10px; margin-top:10px;">
        ${existing ? '<button class="btn btn-danger" id="delSitePaymentBtn">Xoá</button>' : ''}
        <button class="btn btn-ghost" id="cancelSitePaymentBtn">Huỷ</button>
        <button class="btn btn-accent btn-block" id="saveSitePaymentBtn">Lưu</button>
      </div>
    </section>
  `;
  attachMoneyInput(document.getElementById('sp_amount'), draft.amount, v=>draft.amount=v);

  document.getElementById('saveSitePaymentBtn').addEventListener('click', async ()=>{
    draft.date = document.getElementById('sp_date').value || draft.date;
    draft.partnerName = document.getElementById('sp_partner').value.trim();
    draft.notes = document.getElementById('sp_notes').value.trim();
    const idx = state.sitePayments.findIndex(p=>p.id===draft.id);
    if(idx>=0) state.sitePayments[idx]=draft; else state.sitePayments.push(draft);
    await saveSitePayments();
    showToast('Đã lưu khoản thu.');
    goBack();
  });
  document.getElementById('cancelSitePaymentBtn').addEventListener('click', goBack);
  const delBtn = document.getElementById('delSitePaymentBtn');
  if(delBtn) delBtn.addEventListener('click', async ()=>{
    if(confirm('Xoá khoản thu này?')){
      state.sitePayments = state.sitePayments.filter(p=>p.id!==draft.id);
      await saveSitePayments();
      showToast('Đã xoá.');
      goBack();
    }
  });
}

  }
  refreshTypeOptions();

  document.querySelectorAll('#doc_scope button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      draft.scope = btn.dataset.val;
      document.querySelectorAll('#doc_scope button').forEach(b=>b.classList.toggle('active', b===btn));
      document.getElementById('doc_driverField').style.display = draft.scope==='driver' ? '' : 'none';
      refreshTypeOptions();
    });
  });

  document.getElementById('saveDocumentBtn').addEventListener('click', async ()=>{
    draft.type = document.getElementById('doc_type').value;
    draft.driverId = draft.scope==='driver' ? document.getElementById('doc_driver').value : null;
    draft.expiryDate = document.getElementById('doc_expiry').value || draft.expiryDate;
    draft.notes = document.getElementById('doc_notes').value.trim();
    if(draft.scope==='driver' && !draft.driverId){ showToast('Hãy thêm tài xế trước ở tab "Tài Xế".'); return; }
    const idx = state.documents.findIndex(d=>d.id===draft.id);
    if(idx>=0) state.documents[idx]=draft; else state.documents.push(draft);
    await saveDocuments();
    renderAll();
    showToast('Đã lưu giấy tờ.');
  });
  document.getElementById('cancelDocumentBtn').addEventListener('click', renderAll);
  const delBtn = document.getElementById('delDocumentBtn');
  if(delBtn) delBtn.addEventListener('click', async ()=>{
    if(confirm('Xoá giấy tờ này?')){
      state.documents = state.documents.filter(d=>d.id!==draft.id);
      await saveDocuments();
      renderAll();
      showToast('Đã xoá.');
    }
  });
}

function renderMaintenanceList(){
  const wrap = document.getElementById('maintenanceListWrap');
  if(!wrap) return;
  if(state.maintenanceSchedules.length===0){
    wrap.innerHTML = '<div class="hint" style="margin-bottom:10px;">Chưa có hạng mục bảo dưỡng nào.</div>';
    return;
  }
  const statuses = state.maintenanceSchedules.map(computeMaintenanceStatus).sort((a,b)=>a.kmRemaining-b.kmRemaining);
  wrap.innerHTML = statuses.map(m=>`
    <div class="card" data-id="${m.id}" style="padding:12px 14px;">
      <div class="driver-row">
        <strong>${escapeHtml(m.name)}</strong>
        <button class="link-btn editMaintenanceBtn" data-id="${m.id}">Sửa</button>

      <div class="hint">Chu kỳ ${m.intervalKm.toLocaleString('vi-VN')}km · Làm gần nhất ở Km ${Number(m.lastDoneOdo).toLocaleString('vi-VN')} (${formatDateVN(m.lastDoneDate)}) · <span class="rating-badge ${m.urgency.className}">${m.urgency.label}</span></div>

        <button class="btn btn-accent btn-block" id="saveRepairBtn">Lưu</button>
      </div>
    </section>
  `;

  attachMoneyInput(document.getElementById('rp_customAmount'), draft.driverCustomAmount, v=>{ draft.driverCustomAmount=v; refreshDeductionPreview(); });

  function refreshDeductionPreview(){
    const prev = document.getElementById('rp_deductionPreview');
    if(!prev) return;
    const deduction = repairDriverResponsibleAmount(draft);
    if(draft.responsibility==='custom' && (Number(draft.driverCustomAmount)||0) > (Number(draft.amount)||0)){
      prev.textContent = `Số tiền tài xế chịu không được vượt quá ${fmtVND(draft.amount)} (số tiền hoá đơn) — sẽ tự động giới hạn về ${fmtVND(deduction)} khi lưu.`;
      prev.style.color = 'var(--loss)';
      return;
    }
    prev.style.color = '';
    prev.textContent = deduction>0
      ? `Sẽ trừ ${fmtVND(deduction)} vào lương của tài xế được chọn khi xuất lương kỳ có ngày ${formatDateVN(draft.date)}${draft.responsibility==='custom' ? ' (phần còn lại '+fmtVND(Math.max(0,(Number(draft.amount)||0)-deduction))+' tính vào chi phí vận hành chung)' : ''}.`
      : 'Chủ xe chịu toàn bộ chi phí này — không trừ vào lương tài xế nào.';
  }
  refreshDeductionPreview();

  document.getElementById('rp_responsibility').addEventListener('change', e=>{
    draft.responsibility = e.target.value;
    document.getElementById('rp_driverField').style.display = draft.responsibility==='owner_full' ? 'none' : 'block';
    document.getElementById('rp_customAmountField').style.display = draft.responsibility==='custom' ? 'block' : 'none';
    refreshDeductionPreview();
  });
  document.getElementById('rp_driver').addEventListener('change', e=>{
    draft.responsibleDriverId = e.target.value || null;
    refreshDeductionPreview();
  });

  document.getElementById('saveRepairBtn').addEventListener('click', async ()=>{
    draft.date = document.getElementById('rp_date').value || draft.date;
    draft.item = document.getElementById('rp_item').value.trim();
    draft.invoiceCode = document.getElementById('rp_invoice').value.trim();
    draft.responsibility = document.getElementById('rp_responsibility').value;
    const driverSel = document.getElementById('rp_driver');
    draft.responsibleDriverId = draft.responsibility==='owner_full' ? null : (driverSel.value || null);
    if(draft.responsibility!=='owner_full' && !draft.responsibleDriverId){
      showToast('Chọn tài xế chịu trách nhiệm trước khi lưu.'); return;
    }
    if(draft.responsibility==='custom'){
      draft.driverCustomAmount = Math.max(0, Math.min(Number(draft.driverCustomAmount)||0, Number(draft.amount)||0));
      if(draft.driverCustomAmount<=0){
        showToast('Nhập số tiền cụ thể tài xế phải chịu trước khi lưu.'); return;
      }
    } else {
      draft.driverCustomAmount = 0;
    }
    const idx = state.repairs.findIndex(r=>r.id===draft.id);
    if(idx>=0) state.repairs[idx]=draft; else state.repairs.push(draft);
    await saveRepairs();
    renderAll();
    showToast('Đã lưu khoản sửa chữa.');
  });
  document.getElementById('cancelRepairBtn').addEventListener('click', renderAll);
  const delBtn = document.getElementById('delRepairBtn');
  if(delBtn) delBtn.addEventListener('click', async ()=>{
    if(confirm('Xoá khoản sửa chữa này?')){
      state.repairs = state.repairs.filter(r=>r.id!==draft.id);
      await saveRepairs();
      renderAll();
      showToast('Đã xoá.');
    }
  });
}

      // saved without pasting a new one) is never treated as "delete the
      // key" — only a non-empty value overwrites the saved one.
      if(typedKey) s.geminiApiKey = typedKey;
    }
    STATUS_OPTIONS.forEach(st=>{
      s.costPolicies[st.key] = {
        baseSalary: document.getElementById(`pol_${st.key}_base`).checked,
        food: document.getElementById(`pol_${st.key}_food`).checked,
        housing: document.getElementById(`pol_${st.key}_housing`).checked,
        operations: document.getElementById(`pol_${st.key}_ops`).checked
      };
    });
    showGeminiKeyInput = false; // collapse back to the masked "🔒 Đã có mã API" state
    await saveSettings();
    renderAll();
    showToast('Đã lưu cài đặt.');
  });

  document.getElementById('exportBtn').addEventListener('click', exportCSV);
  renderDocumentList();
  renderMaintenanceList();
  document.getElementById('addDocumentBtn').addEventListener('click', ()=>openDocumentEditor(null));
  document.getElementById('addMaintenanceBtn').addEventListener('click', ()=>openMaintenanceEditor(null));
  document.getElementById('backupBtn').addEventListener('click', exportBackupFile);
  document.getElementById('restoreBtn').addEventListener('click', triggerRestoreFilePicker);
  document.getElementById('resetBtn').addEventListener('click', async ()=>{
    if(confirm('Khôi phục toàn bộ Cài Đặt về mặc định gốc? (Không xoá dữ liệu ca/tài xế)')){
      state.settings = { standardWorkDaysPerMonth: 28, costPolicies: defaultCostPolicies(),
        defaultMonthlyBaseSalary: 15000000, defaultDailyFoodAllowance: 150000, defaultMonthlyHousingBudget: 5000000,
        monthlyFixedRoadFee: 25000000, geminiApiKey: state.settings.geminiApiKey,
        currentFuelUnitPrice: state.settings.currentFuelUnitPrice, vatRatePercent: 10 };
      await saveSettings();
      renderAll(); showToast('Đã khôi phục cài đặt gốc.');
    }
  });
}
