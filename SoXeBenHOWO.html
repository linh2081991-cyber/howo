<style>
  :root{
    --bg:#F7F5F1;
    --surface:#FFFFFF;
    --ink:#1F2A37;
    --ink-soft:#6B7280;
    --accent:#E8720C;
    --accent-soft:#FCE4CC;
    --profit:#1F7A4D;
    --profit-soft:#E4F3EA;
    --loss:#B23A2E;
    --loss-soft:#FAE6E3;
    --border:#E5E1D8;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  #shell{ max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }
  header.top{
    position:sticky; top:0; z-index:10; background:var(--bg);
    padding:16px 16px 12px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  header.top h1{ font-size:19px; margin:0; font-weight:700; letter-spacing:-0.2px; }
  header.top .sub{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  main{ flex:1; padding:14px 14px 90px 14px; overflow-y:auto; }
  .btn{
    appearance:none; border:none; border-radius:12px; padding:12px 16px;
    font-size:15px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
  }
  .btn-accent{ background:var(--accent); color:#fff; }
  .btn-accent:active{ opacity:0.85; }
  .btn-ghost{ background:var(--surface); color:var(--ink); border:1px solid var(--border); }
  .btn-danger{ background:var(--loss-soft); color:var(--loss); }
  .btn-block{ width:100%; justify-content:center; }
  .btn-sm{ padding:8px 12px; font-size:13px; border-radius:10px; }

  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:12px; }
  .shift-card{ display:flex; gap:12px; align-items:stretch; padding:0; overflow:hidden; }
  .shift-card .bar{ width:6px; flex-shrink:0; }
  .shift-card .body{ flex:1; padding:13px 14px; }
  .shift-card .row1{ display:flex; justify-content:space-between; align-items:baseline; }
  .shift-card .date{ font-weight:700; font-size:15px; }
  .shift-card .tag{ font-size:11px; padding:3px 8px; border-radius:20px; background:var(--accent-soft); color:var(--accent); font-weight:600; }
  .shift-card .driver{ font-size:13px; color:var(--ink-soft); margin-top:3px; }
  .shift-card .profit{ font-size:17px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:8px; }
  .empty{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty .big{ font-size:38px; margin-bottom:10px; }

  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
  .field .hint{ font-size:11px; color:var(--ink-soft); margin-top:4px; }
  input[type=text], input[type=number], input[type=date], select, textarea{
    width:100%; font-size:16px; padding:11px 12px; border-radius:10px;
    border:1px solid var(--border); background:var(--surface); color:var(--ink); font-family:inherit;
  }
  input[type=number]{ font-variant-numeric:tabular-nums; }
  .seg{ display:flex; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .seg button{ flex:1; padding:11px 0; border:none; background:var(--surface); font-size:14px; font-weight:600; color:var(--ink-soft); }
  .seg button.active{ background:var(--accent); color:#fff; }

  section.group{ margin-bottom:18px; }
  section.group h3{ font-size:13px; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); margin:0 0 10px 2px; }

  .site-row{ background:var(--bg); border:1px dashed var(--border); border-radius:12px; padding:12px; margin-bottom:10px; }
  .site-row .site-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .site-row .site-head strong{ font-size:13px; }
  .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .summary-row{ display:flex; justify-content:space-between; padding:8px 0; font-size:14px; }
  .summary-row.total{ border-top:1px solid var(--border); margin-top:6px; padding-top:12px; font-weight:800; font-size:17px; }
  .summary-row .val{ font-variant-numeric:tabular-nums; }

  nav.tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; max-width:520px; margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabbar button{
    flex:1; border:none; background:none; padding:10px 0 8px 0;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:11px; color:var(--ink-soft); font-weight:600;
  }
  nav.tabbar button .ic{ font-size:20px; }
  nav.tabbar button.active{ color:var(--accent); }

  .toast{
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:30px;
    font-size:13px; z-index:50; opacity:0; transition:opacity .25s;
    max-width:80%; text-align:center;
  }
  .toast.show{ opacity:1; }

  .banner{ background:var(--accent-soft); color:var(--accent); border-radius:12px; padding:12px 14px; font-size:13px; margin-bottom:14px; font-weight:600; }
  .swipe-del{ text-align:right; margin-top:8px; }
  .driver-row{ display:flex; justify-content:space-between; align-items:center; }
  .toggle-row{ display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .toggle-row:last-child{ border-bottom:none; }
  .switch{ position:relative; width:44px; height:26px; }
  .switch input{ display:none; }
  .switch .track{ position:absolute; inset:0; background:var(--border); border-radius:20px; transition:.2s; }
  .switch .track:before{ content:''; position:absolute; width:20px; height:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
  .switch input:checked + .track{ background:var(--accent); }
  .switch input:checked + .track:before{ transform:translateX(18px); }
  .link-btn{ background:none; border:none; color:var(--accent); font-weight:700; font-size:14px; padding:6px 0; }

  #loginScreen{
    display:none; position:fixed; inset:0; z-index:100; background:var(--bg);
    flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;
  }
  #loginScreen .big-icon{ font-size:60px; margin-bottom:14px; }
  #loginScreen h2{ margin:0 0 6px 0; font-size:22px; }
  #loginScreen p{ color:var(--ink-soft); margin:0 0 28px 0; font-size:14px; max-width:320px; }
  .google-btn{
    display:flex; align-items:center; gap:10px; background:#fff; color:#1F2A37;
    border:1px solid var(--border); border-radius:12px; padding:13px 24px;
    font-size:15px; font-weight:600; cursor:pointer;
  }
  .google-btn img{ width:20px; height:20px; }
  #loginScreen .login-hint{ margin-top:18px; font-size:12px; color:var(--ink-soft); max-width:300px; }
  #authLoadingScreen{
    display:flex; position:fixed; inset:0; z-index:101; background:var(--bg);
    flex-direction:column; align-items:center; justify-content:center; color:var(--ink-soft); font-size:14px;
  }

  .search-bar{ display:flex; gap:8px; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:8px 10px; margin-bottom:14px; }
  .search-bar .ic{ font-size:16px; }
  .search-bar input[type=date]{ border:none; flex:1; padding:6px 4px; }
  .search-bar button{ background:none; border:none; color:var(--ink-soft); font-size:13px; font-weight:700; }

  .date-range{ display:flex; gap:10px; margin-bottom:14px; }
  .date-range .field{ flex:1; margin-bottom:0; }

  table.dash{ width:100%; border-collapse:collapse; font-size:13px; }
  table.dash th, table.dash td{ padding:9px 6px; text-align:right; border-bottom:1px solid var(--border); font-variant-numeric:tabular-nums; }
  table.dash th:first-child, table.dash td:first-child{ text-align:left; font-weight:600; color:var(--ink-soft); font-variant-numeric:normal; }
  table.dash thead th{ color:var(--ink-soft); font-size:11px; text-transform:uppercase; letter-spacing:.02em; border-bottom:2px solid var(--border); }
  table.dash tbody tr:last-child td{ border-bottom:none; }
  .dash-wrap{ overflow-x:auto; }
  .dash-highlight td{ font-weight:800; color:var(--ink); }
</style>
</head>

const firebaseConfig = {

// ========================= FULL BACKUP / RESTORE (JSON FILE) =========================
// This is the safety net against losing the phone: export everything to one
// file the person saves elsewhere (Zalo Cloud, Email to self, Google Drive),
// and can load back on any phone via "Phục Hồi Từ File Sao Lưu".

function exportBackupFile(){
  const backup = {
    appName: 'SoXeBenHOWO',
    backupVersion: 2,
    exportedAt: new Date().toISOString(),
    drivers: state.drivers,
    shifts: state.shifts,
    repairs: state.repairs,
    settings: state.settings
  };
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`SaoLuu_SoXeBenHOWO_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);

}

function triggerRestoreFilePicker(){

async function handleRestoreFile(file){
  if(!file) return;
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(!backup || !Array.isArray(backup.drivers) || !Array.isArray(backup.shifts)){
      showToast('File này không đúng định dạng sao lưu.');
      return;
    }
    const confirmMsg = `File sao lưu này có ${backup.drivers.length} tài xế và ${backup.shifts.length} ca, xuất lúc ${new Date(backup.exportedAt).toLocaleString('vi-VN')}.\n\nPhục hồi sẽ THAY THẾ toàn bộ dữ liệu hiện tại trên máy này. Chắc chắn muốn tiếp tục?`;
    if(!confirm(confirmMsg)) return;
    state.drivers = backup.drivers;
    state.shifts = backup.shifts;
    state.repairs = Array.isArray(backup.repairs) ? backup.repairs : [];
    if(backup.settings) state.settings = Object.assign(state.settings, backup.settings);
    await saveDrivers(); await saveShifts(); await saveRepairs(); await saveSettings();
    renderAll();
    showToast('Đã phục hồi dữ liệu thành công.');
  }catch(e){
    showToast('Không đọc được file này. Kiểm tra lại đúng file sao lưu chưa.');

}

// ========================= FORMAT & COMPUTE =========================

function fmtVND(n){
  n = Number(n)||0;
  return Math.round(n).toLocaleString('vi-VN') + 'đ';
}
function toIntSafe(v){ return Math.round(Number(v)||0); }
/// Attaches live "1.540.000"-style thousands-separator formatting to a
/// text input representing a money amount. Digits typed are parsed as an
/// integer VND amount; the field always displays the grouped form.
function attachMoneyInput(el, initialValue, onChange){
  if(!el) return;
  el.value = toIntSafe(initialValue).toLocaleString('vi-VN');
  el.addEventListener('input', ()=>{
    const digits = el.value.replace(/[^\d]/g,'');
    const num = digits==='' ? 0 : parseInt(digits,10);
    el.value = num.toLocaleString('vi-VN');
    onChange(num);
  });
}
function statusLabel(key){ return (STATUS_OPTIONS.find(s=>s.key===key)||{}).label || key; }
function shiftTypeLabel(key){ return (SHIFT_TYPES.find(s=>s.key===key)||{}).label || key; }
function paymentLabel(key){ return (PAYMENT_OPTIONS.find(s=>s.key===key)||{}).label || key; }

function driverById(id){ return state.drivers.find(d=>d.id===id); }

function daysInMonth(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}
function dailyBaseSalary(driver){
  const days = state.settings.standardWorkDaysPerMonth || 1;
  return (driver.monthlyBaseSalary||0) / days;
}
function dailyHousing(driver, dateStr){
  const dim = daysInMonth(dateStr) || 30;
  return (driver.monthlyHousingBudget||0) / dim;
}

function siteRevenue(s){ return (Number(s.volumePerTrip)||0) * (Number(s.materialUnitPrice)||0) * (Number(s.trips)||0); }
function siteEffectiveWageTrips(s){
  return (s.wageQualifyingTripsOverride===null || s.wageQualifyingTripsOverride===undefined)
    ? (Number(s.trips)||0) : (Number(s.wageQualifyingTripsOverride)||0);
}
function siteWageTotal(s){ return siteEffectiveWageTrips(s) * (Number(s.driverWagePerTrip)||0); }

function shiftOdoDriven(sh){ return Math.max(0, (Number(sh.odoEnd)||0) - (Number(sh.odoStart)||0)); }
function shiftFuelConsumed(sh){ return Math.max(0, ((Number(sh.fuelStart)||0)+(Number(sh.fuelAdded)||0)) - (Number(sh.fuelEnd)||0)); }
function shiftFuelCost(sh){ return shiftFuelConsumed(sh) * (Number(sh.fuelUnitPrice)||0); }
function shiftTotalRevenue(sh){ return (sh.siteLogs||[]).reduce((sum,s)=>sum+siteRevenue(s),0); }
function shiftTotalTripWage(sh){ return (sh.siteLogs||[]).reduce((sum,s)=>sum+siteWageTotal(s),0); }
function shiftTotalCost(sh){
  return shiftFuelCost(sh) + shiftTotalTripWage(sh) + (Number(sh.baseSalaryAllocation)||0)
       + (Number(sh.foodAllowance)||0) + (Number(sh.housingAllocation)||0) + (Number(sh.incidentalCost)||0);
}
function shiftNetProfit(sh){ return shiftTotalRevenue(sh) - shiftTotalCost(sh); }

function chronoKey(dateStr, shiftType){
  const days = Math.floor(new Date(dateStr+'T00:00:00').getTime()/86400000);
  return days*2 + (shiftType==='night' ? 1 : 0);
}
function findPreviousShift(dateStr, shiftType, excludeId){
  const targetKey = chronoKey(dateStr, shiftType);
  let best=null, bestKey=-Infinity;
  for(const s of state.shifts){
    if(s.id===excludeId) continue;
    const k = chronoKey(s.date, s.shiftType);
    if(k<targetKey && k>bestKey){ best=s; bestKey=k; }
  }
  return best;
}

function allSiteNames(){
  const seen=new Set(), out=[];
  const sorted=[...state.shifts].sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));
  for(const sh of sorted){
    for(const s of (sh.siteLogs||[])){
      const n=(s.siteName||'').trim();
      if(n && !seen.has(n)){ seen.add(n); out.push(n); }
    }
  }
  return out;
}

// ========================= SHIFT LIST =========================
function renderShiftList(){
  const app=document.getElementById('app');

  const searchBarHtml = `
    <div class="search-bar">
      <span class="ic">🔎</span>
      <input type="date" id="searchDateInput" value="${state.searchDate||''}">
      ${state.searchDate ? '<button id="clearSearchBtn">Xoá</button>' : ''}
    </div>`;

  if(state.shifts.length===0){
    app.innerHTML = searchBarHtml + `
      <div class="banner">Bước đầu tiên: bấm "+ Tài Xế" ở tab Tài Xế để thêm người lái, rồi quay lại đây bấm "+ Ca Mới".</div>
      <div class="empty"><div class="big">🚛</div>Chưa có ca nào được ghi.<br>Bấm "+ Ca Mới" ở góc trên để bắt đầu.</div>`;
    bindSearchBar();
    return;
  }

  let list = [...state.shifts];
  if(state.searchDate){ list = list.filter(sh=>sh.date===state.searchDate); }
  list.sort((a,b)=>chronoKey(b.date,b.shiftType)-chronoKey(a.date,a.shiftType));

  const cardsHtml = list.length===0
    ? `<div class="empty"><div class="big">📅</div>Không có ca nào vào ngày ${state.searchDate?formatDateVN(state.searchDate):''}.</div>`
    : list.map(sh=>{
        const profit=shiftNetProfit(sh);
        const positive = profit>=0;
        const driverName = driverById(sh.driverId)?.name || sh.driverNameSnapshot || '(chưa chọn tài xế)';
        return `
          <div class="card shift-card" data-id="${sh.id}" onclick="openShift('${sh.id}')">
            <div class="bar" style="background:${positive?'var(--profit)':'var(--loss)'}"></div>
            <div class="body">
              <div class="row1">
                <span class="date">${formatDateVN(sh.date)} · ${shiftTypeLabel(sh.shiftType)}</span>
                <span class="tag">${statusLabel(sh.status)}</span>
              </div>
              <div class="driver">Tài xế: ${escapeHtml(driverName)}</div>
              <div class="profit" style="color:${positive?'var(--profit)':'var(--loss)'}">${positive?'+':''}${fmtVND(profit)}</div>
            </div>
          </div>`;
      }).join('');

  app.innerHTML = searchBarHtml + cardsHtml;
  bindSearchBar();
}
function bindSearchBar(){
  const input = document.getElementById('searchDateInput');
  if(input) input.addEventListener('change', e=>{ state.searchDate = e.target.value || null; renderShiftList(); });
  const clearBtn = document.getElementById('clearSearchBtn');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{ state.searchDate=null; renderShiftList(); });
}
function formatDateVN(dateStr){
  const [y,m,d]=dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openShift(id){
  const sh = state.shifts.find(s=>s.id===id);
  if(!sh) return;
  state.draftShift = JSON.parse(JSON.stringify(sh));
  state.draftShift.isNew=false;
  state.view='form';
  renderAll();
}

function startNewShift(){
  if(state.drivers.length===0){
    showToast('Hãy thêm tài xế trước ở tab "Tài Xế".');
    return;
  }
  const today=new Date();
  const dateStr=today.toISOString().slice(0,10);
  const shiftType='day';
  const prev = findPreviousShift(dateStr, shiftType, null);
  const driver = state.drivers[0];
  const policy = state.settings.costPolicies.active;
  const draft = {
    id: uid('shift'),
    isNew: true,
    date: dateStr,
    shiftType,
    driverId: driver.id,
    driverNameSnapshot: driver.name,
    status: 'active',
    odoStart: prev ? prev.odoEnd : 0,
    odoEnd: prev ? prev.odoEnd : 0,
    fuelStart: prev ? prev.fuelEnd : 0,
    fuelEnd: 0,
    fuelAdded: 0,
    fuelUnitPrice: 0,
    baseSalaryAllocation: policy.baseSalary ? dailyBaseSalary(driver) : 0,
    foodAllowance: policy.food ? driver.dailyFoodAllowance : 0,
    housingAllocation: policy.housing ? dailyHousing(driver, dateStr) : 0,
    incidentalCost: 0,
    incidentalNotes: '',
    advanceAmount: 0,
    advanceRecipientName: '',
    notes: '',
    paymentStatus: 'unpaid',
    siteLogs: []
  };
  state.draftShift = draft;
  state.view='form';
  renderAll();
}

function reapplyCostPolicyToDraft(){
  const sh = state.draftShift;
  const driver = driverById(sh.driverId);
  const policy = state.settings.costPolicies[sh.status] || {baseSalary:false,food:false,housing:false,operations:true};
  if(!driver){ sh.baseSalaryAllocation=0; sh.foodAllowance=0; sh.housingAllocation=0; return; }
  sh.baseSalaryAllocation = policy.baseSalary ? dailyBaseSalary(driver) : 0;
  sh.foodAllowance = policy.food ? driver.dailyFoodAllowance : 0;
  sh.housingAllocation = policy.housing ? dailyHousing(driver, sh.date) : 0;
}

  });
  wrap.querySelectorAll('.site-money').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const idx = Number(inp.dataset.idx), field=inp.dataset.field;

      const num = digits==='' ? 0 : parseInt(digits,10);
      inp.value = num.toLocaleString('vi-VN');
      sh.siteLogs[idx][field] = num;
      updateSiteCalc(idx);

      const idx = Number(btn.dataset.idx);
      sh.siteLogs.splice(idx,1);
      renderSiteRows();
      updateSummary();

function refreshFixedCostInputs(){
  const sh = state.draftShift;
  const fb=document.getElementById('f_baseSalary'), ff=document.getElementById('f_food'), fh=document.getElementById('f_housing');

  if(fh) fh.value = toIntSafe(sh.housingAllocation).toLocaleString('vi-VN');
}

async function saveDraftShift(){
  const sh = state.draftShift;
  if(!sh.driverId){ showToast('Hãy chọn tài xế trước khi lưu.'); return; }
  const idx = state.shifts.findIndex(s=>s.id===sh.id);
  const cleanShift = JSON.parse(JSON.stringify(sh));
  delete cleanShift.isNew;
  if(idx>=0) state.shifts[idx]=cleanShift; else state.shifts.push(cleanShift);
  await saveShifts();
  state.view='list'; state.draftShift=null;
  renderAll();
  showToast('Đã lưu ca thành công.');
}

function currentMonthRange(){
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth(), 1);
  const last = new Date(now.getFullYear(), now.getMonth()+1, 0);
  const toISO = d => d.toISOString().slice(0,10);
  return { from: toISO(first), to: toISO(last) };
}

function computeResultsGroup(shifts){
  const revenue = shifts.reduce((s,sh)=>s+shiftTotalRevenue(sh),0);
  const opCost = shifts.reduce((s,sh)=>s+shiftTotalCost(sh),0);
  const grossProfit = revenue - opCost;
  const margin = revenue>0 ? (grossProfit/revenue*100) : 0;
  const totalKm = shifts.reduce((s,sh)=>s+shiftOdoDriven(sh),0);
  const totalTrips = shifts.reduce((s,sh)=>s+(sh.siteLogs||[]).reduce((x,l)=>x+(Number(l.trips)||0),0),0);
  const fuelLiters = shifts.reduce((s,sh)=>s+shiftFuelConsumed(sh),0);
  const fuelCost = shifts.reduce((s,sh)=>s+shiftFuelCost(sh),0);
  const fuelPerKm = totalKm>0 ? fuelCost/totalKm : 0;
  const revenuePerKm = totalKm>0 ? revenue/totalKm : 0;
  const profitPerTrip = totalTrips>0 ? grossProfit/totalTrips : 0;
  return { revenue, opCost, grossProfit, margin, totalKm, totalTrips, fuelLiters, fuelCost, fuelPerKm, revenuePerKm, profitPerTrip };
}

function fmtShortVND(n){
  n = Number(n)||0;
  const abs = Math.abs(n);
  if(abs>=1000000) return (n/1000000).toLocaleString('vi-VN',{maximumFractionDigits:1})+'tr';
  if(abs>=1000) return (n/1000).toLocaleString('vi-VN',{maximumFractionDigits:0})+'k';
  return Math.round(n).toLocaleString('vi-VN');
}

function repairsInRange(from, to){

// ---- Day/Night comparison bar chart (plain SVG, no external library) ----
function renderComparisonChartSVG(gDay, gNight){
  const metrics = [
    { label:'Doanh Thu', day:gDay.revenue, night:gNight.revenue },
    { label:'Chi Phí', day:gDay.opCost, night:gNight.opCost },
    { label:'Lợi Nhuận', day:gDay.grossProfit, night:gNight.grossProfit }
  ];
  const maxVal = Math.max(1, ...metrics.map(m=>Math.max(Math.abs(m.day), Math.abs(m.night))));
  const chartH = 150, groupW = 100, barW = 30, gap = 10, baseY = chartH + 20;
  const width = metrics.length * groupW + 20;
  let bars = '';
  metrics.forEach((m, i)=>{
    const gx = 20 + i*groupW;
    const dayH = Math.max(2, Math.abs(m.day)/maxVal*chartH);
    const nightH = Math.max(2, Math.abs(m.night)/maxVal*chartH);
    const dayY = baseY - dayH;
    const nightY = baseY - nightH;
    bars += `
      <rect x="${gx}" y="${dayY}" width="${barW}" height="${dayH}" rx="4" fill="var(--accent)"></rect>
      <text x="${gx+barW/2}" y="${dayY-6}" font-size="10" text-anchor="middle" fill="var(--ink)">${fmtShortVND(m.day)}</text>
      <rect x="${gx+barW+gap}" y="${nightY}" width="${barW}" height="${nightH}" rx="4" fill="var(--ink)"></rect>
      <text x="${gx+barW+gap+barW/2}" y="${nightY-6}" font-size="10" text-anchor="middle" fill="var(--ink)">${fmtShortVND(m.night)}</text>
      <text x="${gx+barW+gap/2}" y="${baseY+16}" font-size="11" text-anchor="middle" fill="var(--ink-soft)" font-weight="600">${m.label}</text>
    `;
  });
  return `
    <svg viewBox="0 0 ${width} ${baseY+30}" style="width:100%; height:auto;">
      <line x1="10" y1="${baseY}" x2="${width-10}" y2="${baseY}" stroke="var(--border)" stroke-width="1"></line>
      ${bars}
    </svg>
    <div style="display:flex; gap:16px; justify-content:center; margin-top:6px; font-size:12px;">
      <span style="color:var(--accent); font-weight:700;">■ Ca Ngày</span>
      <span style="color:var(--ink); font-weight:700;">■ Ca Đêm</span>
    </div>
  `;
}

// ---- Per-day breakdown within the selected range ----
function computeDailyBreakdown(inRangeShifts){
  const byDate = {};
  for(const sh of inRangeShifts){
    if(!byDate[sh.date]) byDate[sh.date] = [];
    byDate[sh.date].push(sh);
  }
  return Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).map(date=>{
    const shifts = byDate[date];
    const revenue = shifts.reduce((s,sh)=>s+shiftTotalRevenue(sh),0);
    const cost = shifts.reduce((s,sh)=>s+shiftTotalCost(sh),0);
    return { date, revenue, cost, profit: revenue-cost, shiftCount: shifts.length };
  });
}

// ---- Site profitability ranking (revenue per trip, proxy for site value) ----
function computeSiteRanking(inRangeShifts){
  const bySite = {};
  for(const sh of inRangeShifts){
    for(const s of (sh.siteLogs||[])){
      const name = (s.siteName||'(chưa đặt tên)').trim() || '(chưa đặt tên)';
      if(!bySite[name]) bySite[name] = { name, revenue:0, trips:0 };
      bySite[name].revenue += siteRevenue(s);
      bySite[name].trips += Number(s.trips)||0;
    }
  }
  return Object.values(bySite)
    .map(x=>({ ...x, revenuePerTrip: x.trips>0 ? x.revenue/x.trips : 0 }))
    .sort((a,b)=>b.revenuePerTrip-a.revenuePerTrip);
}

// ---- Strategic advisory engine (deterministic rules on real numbers) ----
function generateInsights({gDay, gNight, gTotal, finalNetProfit, repairTotal, roadFee, inRangeShifts, from, to, siteRanking}){
  const insights = [];

  // 1. Final profit status
  if(gTotal.revenue===0 && inRangeShifts.length===0){
    insights.push({icon:'ℹ️', title:'Chưa có dữ liệu trong kỳ này', text:'Hãy chọn lại khoảng thời gian có ca đã ghi, hoặc ghi ca mới ở tab "Ca Làm Việc".'});
    return insights;
  }
  if(finalNetProfit < 0){
    insights.push({icon:'🔴', title:'Đang LỖ thực tế trong kỳ này', text:`Lợi nhuận gộp vận hành ${fmtVND(gTotal.grossProfit)} không đủ bù chi phí sửa chữa (${fmtVND(repairTotal)}) và chi phí luật đường (${fmtVND(roadFee)}). Lỗ ròng ${fmtVND(Math.abs(finalNetProfit))}. Cần tăng số chuyến/doanh thu, hoặc xem lại chi phí luật đường có đàm phán giảm được không.`});
  } else {
    const marginFinal = gTotal.revenue>0 ? (finalNetProfit/gTotal.revenue*100) : 0;
    insights.push({icon:'🟢', title:'Đang có LÃI thực tế trong kỳ này', text:`Sau khi trừ hết sửa chữa và luật đường, lãi ròng ${fmtVND(finalNetProfit)}, tương đương ${marginFinal.toFixed(1)}% trên doanh thu. Duy trì nhịp độ vận hành hiện tại.`});
  }

  // 2. Day vs Night margin comparison
  if(gDay.revenue>0 && gNight.revenue>0){
    const diff = gNight.margin - gDay.margin;
    if(Math.abs(diff) >= 8){
      const better = diff>0 ? 'Ca Đêm' : 'Ca Ngày';
      const betterM = diff>0 ? gNight.margin : gDay.margin;
      const worseM = diff>0 ? gDay.margin : gNight.margin;
      insights.push({icon: diff>0?'🌙':'☀️', title:`${better} đang hiệu quả hơn rõ rệt`, text:`Biên lợi nhuận ${better} đạt ${betterM.toFixed(1)}%, cao hơn ca còn lại (${worseM.toFixed(1)}%). Nếu tài xế và công trình cho phép, nên ưu tiên sắp thêm ${better.toLowerCase()}.`});
    }
  }

  // 3. Fixed cost burden ratio
  if(gTotal.revenue>0){
    const fixedRatio = (repairTotal+roadFee)/gTotal.revenue*100;
    if(fixedRatio >= 15){
      insights.push({icon:'⚠️', title:'Chi phí cố định đang chiếm tỷ trọng cao', text:`Sửa chữa + luật đường đang chiếm ${fixedRatio.toFixed(1)}% doanh thu trong kỳ. Nếu tỷ lệ này kéo dài, lợi nhuận thực tế sẽ khó dương. Cân nhắc tăng tần suất chạy xe để san đều chi phí cố định, hoặc kiểm tra lại các khoản sửa chữa có bất thường không.`});
    }
  }

  // 4. Utilization (operating days vs calendar days in range)
  const operatingDates = new Set(inRangeShifts.map(sh=>sh.date));
  const totalDaysInRange = Math.round((new Date(to+'T00:00:00') - new Date(from+'T00:00:00'))/86400000) + 1;
  if(totalDaysInRange > 0){
    const utilization = operatingDates.size/totalDaysInRange*100;
    if(utilization < 70){
      insights.push({icon:'📉', title:'Tỷ lệ ngày hoạt động còn thấp', text:`Xe chỉ có ca chạy ${operatingDates.size}/${totalDaysInRange} ngày trong kỳ (${utilization.toFixed(0)}%). Vì chi phí luật đường là cố định theo tháng dù chạy nhiều hay ít, tăng số ngày hoạt động sẽ giúp giảm chi phí cố định tính trên mỗi chuyến.`});
    }
  }

  // 5. Site profitability ranking
  if(siteRanking.length >= 2){
    const best = siteRanking[0], worst = siteRanking[siteRanking.length-1];
    if(best.revenuePerTrip > 0 && worst.revenuePerTrip < best.revenuePerTrip*0.7){
      insights.push({icon:'🏗️', title:'Chênh lệch hiệu quả giữa các công trình', text:`"${best.name}" đang cho doanh thu/chuyến cao nhất (${fmtVND(best.revenuePerTrip)}), trong khi "${worst.name}" thấp hơn nhiều (${fmtVND(worst.revenuePerTrip)}). Nếu được chọn, nên ưu tiên nhận thêm việc ở công trình có doanh thu/chuyến cao.`});
    }
  }

  if(insights.length === 0){
    insights.push({icon:'✅', title:'Các chỉ số đang cân bằng', text:'Không phát hiện điểm bất thường rõ rệt trong kỳ này. Tiếp tục theo dõi định kỳ để phát hiện sớm biến động.'});
  }

  return insights;
}

  const repairsHere = repairsInRange(from, to);

      state.repairs = state.repairs.filter(r=>r.id!==draft.id);
      await saveRepairs();
      renderAll();
      showToast('Đã xoá.');
    }
  });
}

function csvEscape(v){
  v = String(v ?? '');
  if(v.includes(',')||v.includes('"')||v.includes('\n')) return '"'+v.replace(/"/g,'""')+'"';
  return v;
}
// ---- Export the currently-viewed Results period as its own clean CSV ----
function exportResultsCSV({from, to, gDay, gNight, gTotal, repairTotal, roadFee, finalNetProfit, dailyBreakdown, siteRanking, rows}){
  const lines = [];
  lines.push(`Ket Qua Kinh Doanh,${formatDateVN(from)} - ${formatDateVN(to)}`);
  lines.push('');
  lines.push('LOI NHUAN THUC TE CUOI CUNG');
  lines.push(`Loi nhuan gop van hanh,${Math.round(gTotal.grossProfit)}`);
  lines.push(`Chi phi sua chua/khau hao,${Math.round(repairTotal)}`);
  lines.push(`Chi phi luat duong,${Math.round(roadFee)}`);
  lines.push(`LOI NHUAN THUC TE,${Math.round(finalNetProfit)}`);
  lines.push('');
  lines.push('TONG QUAN SUC KHOE TAI CHINH,Ca Ngay,Ca Dem,Tong Cong');
  rows.forEach(([label, fn]) => {
    lines.push(`${label},${fn(gDay)},${fn(gNight)},${fn(gTotal)}`);
  });
  lines.push('');
  lines.push('THONG KE THEO TUNG NGAY');
  lines.push('Ngay,Doanh Thu,Chi Phi,Loi Nhuan');
  dailyBreakdown.forEach(d => {
    lines.push(`${formatDateVN(d.date)},${Math.round(d.revenue)},${Math.round(d.cost)},${Math.round(d.profit)}`);
  });
  lines.push('');
  lines.push('XEP HANG CONG TRINH THEO DOANH THU/CHUYEN');
  lines.push('Cong Trinh,Doanh Thu,So Chuyen,Doanh Thu Moi Chuyen');
  siteRanking.forEach(s => {
    lines.push(`${csvEscape(s.name)},${Math.round(s.revenue)},${s.trips},${Math.round(s.revenuePerTrip)}`);
  });

  const csv = '\uFEFF' + lines.join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`KetQua_${from}_den_${to}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Đã xuất kết quả kỳ này ra Excel.');
}

function exportCSV(){
  const header = ['Ngày','Ca','Tài Xế','Trạng Thái','Odo Đầu','Odo Cuối','Odo Chạy',
    'Chỉ Số Dầu Đầu','Chỉ Số Dầu Cuối','Dầu Đổ Thêm','Dầu Tiêu Hao','Đơn Giá Dầu/Lít','Tiền Dầu Tiêu Hao',
    'Công Trình','Khối Lượng/Chuyến','Đơn Giá Vật Liệu','Số Chuyến','Thành Tiền',
    'Lương/Chuyến','Số Chuyến Tính Lương','Lương Chuyến Tổng',
    'Tổng Doanh Thu Ca','Lương Cứng Phân Bổ','Tiền Ăn','Tiền Nhà+Điện Nước',
    'Chi Phí Phát Sinh','Ghi Chú Phát Sinh','Ứng Lương/Đền Bù','Lái Xe Ứng','Ghi Chú Ca',
    'Tổng Chi Phí Ca','Lợi Nhuận Ròng Ca','Trạng Thái Thanh Toán'];
  const rows=[header.join(',')];
  const sorted=[...state.shifts].sort((a,b)=>chronoKey(a.date,a.shiftType)-chronoKey(b.date,b.shiftType));
  for(const sh of sorted){
    const driverName = driverById(sh.driverId)?.name || sh.driverNameSnapshot || '';
    const shared=[formatDateVN(sh.date), shiftTypeLabel(sh.shiftType), csvEscape(driverName), statusLabel(sh.status),
      sh.odoStart, sh.odoEnd, shiftOdoDriven(sh), sh.fuelStart, sh.fuelEnd, sh.fuelAdded, shiftFuelConsumed(sh),
      sh.fuelUnitPrice, shiftFuelCost(sh)];
    const trailing=[shiftTotalRevenue(sh), sh.baseSalaryAllocation, sh.foodAllowance, sh.housingAllocation,
      sh.incidentalCost, csvEscape(sh.incidentalNotes), sh.advanceAmount, csvEscape(sh.advanceRecipientName),
      csvEscape(sh.notes), shiftTotalCost(sh), shiftNetProfit(sh), paymentLabel(sh.paymentStatus)];
    if((sh.siteLogs||[]).length===0){
      rows.push([...shared, '','','','','','','',''  , ...trailing].join(','));
    } else {
      for(const s of sh.siteLogs){
        const siteFields=[csvEscape(s.siteName), s.volumePerTrip, s.materialUnitPrice, s.trips, siteRevenue(s),
          s.driverWagePerTrip, siteEffectiveWageTrips(s), siteWageTotal(s)];
        rows.push([...shared, ...siteFields, ...trailing].join(','));
      }
    }
  }
  const csv = '\uFEFF' + rows.join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`SoXeBen_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Đã xuất file CSV.');
}

// ========================= NAV & INIT =========================

function renderAll(){
  renderHeader();
  refreshSiteDatalist();
  if(state.currentTab==='shifts'){
    if(state.view==='form') renderShiftForm(); else renderShiftList();
  } else if(state.currentTab==='drivers'){
    renderDrivers();
  } else if(state.currentTab==='results'){
    renderResults();
  } else {
    renderSettings();
  }
  document.querySelectorAll('nav.tabbar button').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===state.currentTab);
  });
}
function refreshSiteDatalist(){
  const dl=document.getElementById('siteNamesList');
  dl.innerHTML = allSiteNames().map(n=>`<option value="${escapeHtml(n)}">`).join('');
}

document.querySelectorAll('nav.tabbar button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    state.currentTab = btn.dataset.tab;
    state.view='list'; state.draftShift=null;
    renderAll();
  });
});

document.getElementById('restoreFileInput').addEventListener('change', e=>{
  const file = e.target.files && e.target.files[0];
  handleRestoreFile(file);
  e.target.value = ''; // allow re-selecting the same file later
});
